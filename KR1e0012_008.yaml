body:
  text: 春秋釋例卷八晉杜預撰世族譜第四十五之上案此篇見永樂大典其原目亦存又案鄭樵通志引此篇作小公子譜魯魯國姬姓文王子周公旦之後也周公股肱周室成王封其子伯禽於曲阜為魯侯今魯國是也自哀以下九世二百一十七年而楚滅魯矣周公旦禽父魯公伯禽煬公熙獻公具煬公孫武公敖孝公稱惠公弗皇隱公息姑即位十一年桓公太子軌即位十八年莊公子同即位三十二年閔公啓方案孔穎達閔元年正義云漢景帝諱啓啓開因是而亂魯氏家閔公名開杜譜云名啓方從世本文即位二年僖公申即位三十三年文公興即位十八年成公黑肱即位十八年襄公午即位三十一年昭公稠父即位三十二年定公宋即位十五年哀公蔣即位二十七年悼公寧自哀十四年獲麟已上二百四十二年夫人元妃孟子惠公夫人聲子君氏惠公繼室生隱公夫人子氏仲子惠公妃生桓公夫人姜氏文姜桓公妃生莊公夫人姜氏哀姜莊公妃叔姜莊公妃生閔公孟任莊公妃生子般成風夫人風氏莊公妃生僖公夫人姜氏聲姜僖公妃出姜夫人姜氏哀姜文公妃生惡及視敬嬴夫人嬴氏文公妃夫人姜氏穆姜宣公妃生宋伯姬夫人姜氏齊姜成公妃夫人姒氏定姒成公妃胡女敬歸襄公妃生子野夫人歸氏齊歸襄公妃生昭公夫人孟子昭公妃公衍之母昭公妃公為之母昭公妃姒氏定姒定公妃公子子般莊公子子惡文公子子視子惡弟公子偃宣公子公子鉏宣公子公衡衡父成公子子野襄公子公衍昭公子公為公叔務人昭公子公果昭公子公賁昭公子公子荆哀公子公女紀伯姬紀叔姬惠公女把伯姬莊公女宋蕩伯姬鄫季姬子叔姬郯伯姬宋伯姬共姬宣公女把叔姬宣公女叔姬宣公女臧氏臧僖伯公子彄字子臧孝公子臧哀伯臧孫達臧文仲臧孫辰哀伯孫臧宣叔臧孫許文仲子臧武仲臧孫紇宣叔子定伯為臧昭伯賜定伯子臧㑹頃伯宣叔孫臧賔如臧㑹子臧宣叔妻鑄女及其姪臧疇臧宣叔子臧賈臧宣叔子臧石賔如之子臧倉賔如從兄案程公說春秋分記云世族譜云賔如從兄曰倉賔如既為㑹子則倉當是賜子又案此條永樂大典闕從春秋分記補入衆氏公子益師衆父孝公子衆仲衆父子仲孫氏慶父桓公子共仲也公孫敖穆伯慶父之子也難惠叔敖之子榖文伯亦敖之子也孟獻子穀之子仲孫蔑即孟孫也孟孺子速獻子之子莊子孺子秩莊子之子仲孫羯秩之弟孝伯孟僖子仲孫貜南宫敬叔說貜之子何忌懿子說之弟孺子泄懿子之子武伯彘也案程公說春秋分記云彘生捷世族譜闕又案定公𫝊八年孟懿子為公期築室杜氏注為孟氏支子則公期當系之懿子下世族譜並闕戴已聲巳巳氏並公孫敖妻泉丘人其僚並孟僖子妻子服氏懿伯子服仲叔也仲叔蔑之子孟椒子服惠伯子服椒子服昭伯惠伯子子服回子服景伯子服何叔孫氏公子牙慶父同母弟即僖叔也公孫兹牙之子戴伯也叔孫得臣牙之孫莊叔也叔孫僑如得臣之子叔孫宣伯叔孫豹僑如之弟穆叔也即穆子叔孫昭子叔孫豹之庶子叔孫婼也叔孫成子昭子之子叔孫不敢叔孫武叔成子之子叔孫州仇叔孫舒武叔之子文子也國姜叔孫豹妻生孟丙及仲壬庚宗婦人叔孫豹外妻生豎牛孟丙叔孫豹子仲壬丙之弟豎牛叔孫豹子叔仲氏叔仲惠伯叔牙孫叔仲彭生也叔仲昭伯惠伯之孫叔仲帶叔仲昭子即叔仲虺叔仲穆子帶之子叔仲小也即叔仲子也叔仲志定伯帶之孫也季孫氏公子友季友成季季子公子季友桓公子季孫行父季文子公子友之孫季孫宿行父之子武子也悼子紇宿之子平子意如悼子之子桓子斯平子之子康子肥桓子之子公甫季孫紇之子公之季孫紇之子季魴侯意如子季寤子言意如子小邾夫人生宋元夫人季孫宿女平子妻宋元夫人曹氏女秦歂之妻秦姬季孫宿女季公鳥季孫宿子季公亥公若季孫宿子申公亥子鮑氏季姒公鳥之妻齊鮑文子之女南孺子南氏季桓子妻生男季姬季孫斯女公鉏氏公彌季孫宿子公鉏也公鉏極彌之曽孫案程公說春秋分記云公彌生頃伯頃伯生隱侯伯隱侯伯生公鉏極世族譜闕不可續者二世至公鉏極杜注云桓子族子而不詳所系今考得以補公鉏氏闕文公父氏公父靖穆伯季孫紇子公父文伯桓子從父昆弟公父歜東門氏公子遂東門襄仲仲遂東門遂莊公子公孫歸父子家仲嬰齊昭子叔氏叔肸惠伯文公子公孫嬰齊肹之子子叔聲伯即子叔嬰齊叔老齊子嬰齊之子叔弓老之子敬子也叔輒子叔伯張弓之子叔鞅穆伯弓之子叔詣鞅之子叔還成子叔弓曽孫案杜預定十一年集解云叔還叔詣曽孫孫穎達正義云世族譜云叔還叔弓曽孫又世本云叔弓生定伯閲閲生西巷敬叔敬叔生成子還還為叔弓曽孫杜云叔詣曽孫𫝊寫誤耳陸德明經典釋文說同系又案程公說春秋分記云閲敬叔二人世譜闕不書叔青僖仲聲伯之母叔肸妻榮氏榮成伯榮駕鵝叔肸曽孫展氏司空無駭公子展之孫魯公族夷伯展氏桓父展禽食邑栁下諡曰惠展喜郈氏郈成叔郈孫也孝公八世孫郈昭伯郈孫施氏施孝叔惠公五世孫施氏婦孝叔妻齊管于奚女子家氏子家文伯歸父子莊公曽孫析子家懿伯莊公元孫子家子子家羈南氏南遺南蒯遺之子孔氏鄹人紇叔梁紇孔父嘉元孫孔丘仲尼孔子尼父孔父嘉以上並在宋譜秦氏秦堇父秦丕兹堇父之子苫氏苫夷即苫越陽州越之子雜人費伯庈父公子豫公子翬羽父挾未賜族申繻柔未賜族溺疾其専命故去氏也秦子梁子曹劌公子偃公右歂孫生公子結御孫圉人犖針巫氏針季公傅卜齮公子魚奚斯巫尫公子買子業夏父弗忌侯叔夏綿房甥公冶富父終甥公冉務人太史克禽鄭管于奚之子匡句須鮑國本齊臣師已匠慶狄虒彌臧堅秦周御叔申豐閔子馬閔馬父豐㸃孟公綽梓慎展莊叔展瑕展玉父顔莊叔公巫召伯仲鄫鼓父黨叔曽夭梁其脛曽阜萊書杜泄謝息公子憗子仲冶區夫司鐸射司徒老祁慮癸申須琴張公思展申夜姑饔人檀秦遄寺人僚柤鬷戾左師展郈魴假女賈公孫朝泄聲子野泄冉豎林雍顔鳴仲梁懷公山不狃子泄公何藐公斂處父公斂陽顔髙顔息叔孫輒子張案程公說春秋分記云輒州仇庶子也世族譜附在雜人非是兹無還林楚公若藐公若公南侯犯駟赤仲由季路子路申句須子貢衛賜樂頎富父槐正常共劉公賔庚公甲叔子析朱鉏微虎顔羽子羽有若冉求有子冉子邴泄管周父樊遲須孟之側案程公說春秋分記云孟之側注為孟氏世族譜乃載之雜人非也林不狃嬖童汪錡弦多本齊臣施父也太史固公孫有山公孫有山氏髙柴季羔本衛臣釁夏鉏啇公孫宿公孫成也郭重陽虎陽越陽虎從弟冉㑹冉猛冉㑹弟淡臺子羽卜楚邱之父施父公期右魯人二百九十七案本文實三百人周周氏黃帝之苗裔姬姓后稷之後也后稷封於邰及夏之衰后稷之子不窋失其官守竄于西戎至太王為狄所逼去邠至岐案隱元年𫝊正義引釋例至作居文王受命武王克殷而王有天下幽王見弒案隱元年正義引釋例此句作幽王為犬戎所殺平王遷都王城今河南縣是也案是字永樂大典無之從隱元年正義所引釋例增平王四十九年魯隱公之元年也敬王又遷成周今洛陽是也敬王三十九年魯哀公十四年獲麟之嵗也四十二年而敬王崩敬王子元王八年春秋之傳終矣元王以下十有一世二百二十六年而周亡后稷棄不窋髙圉僕不窋九世孫亞圉靈都太王亶父亞圉孫王季歷文王昌武王發成王誦康王釗昭王瑕穆王滿夷王燮穆王曽孫厲王胡宣王靖幽王宫涅平王宜臼幽王之子也桓王林平王之孫也莊王他桓王之子也僖王胡齊莊王之子也惠王閬僖王之子也襄王鄭惠王之子也頃王壬臣襄王之子也匡王班頃王之子也定王瑜匡王之弟也簡王夷定王之子也靈王泄心簡王之子也景王遺靈王之子也悼王猛景王之子也敬王丐悼王之母弟也王后后稷元妃姞姓太姒文王后邑姜武王后褒姒生伯服幽王后紀季姜桓王后王姚莊王后陳媯惠后惠王后隗氏狄后襄王后逆王后于齊靈王后穆后景王后王子擕王伯服幽王子王子狐平王子王子克子儀桓王子王子頽莊王子王子帶惠王之子太叔帶即甘昭公也儋季簡王子靈王弟儋括王子之子王子侫夫靈王子景王弟太子壽景王子王子朝景王之長庶子祭氏祭公謀父為周穆王作祈招詩者祭伯祭公祭叔尹氏尹子尹武公尹圉尹文公蘇氏蘇忿生己姓周武王司冦蘇公是蘇子溫毛氏毛伯衛毛伯過毛得毛伯得樊氏仲山甫宣王時樊侯樊皮樊仲皮樊頃子樊齊鄩氏鄩肸鄩羅成氏成肅公成子成簡公成桓公單氏單伯食采於單襄公單伯之子頃公襄公之子靖公頃公之子獻公靖公之子成公獻公之弟穆公單伯之子武公穆公之子平公甘氏甘成公甘景公甘簡公甘悼公過簡公弟甘平公輶成公孫甘桓公劉氏康公王季子也食采於劉定公即劉夏也又曰官師獻公摯定公之子也伯蚡卷獻公之庶子文公也案定四年正義引世族譜云伯蚡劉文公劉狄劉卷劉子為一人桓公文公之子南宫氏南宫極南宫嚚極之子也鞏氏鞏成公鞏簡公周氏周桓公周公黑肩宰周公宰孔周公閲周公忌父周公楚原氏原莊公原襄公原伯絞公子跪尋說曰絞弟原伯魯原夀過王叔氏王子虎王叔文公王叔桓公王叔陳生召氏召穆公賦棠棣者召伯廖召昭公召桓公召戴公召武公召襄公召莊公召伯奐召簡公召伯盈召桓公宣六年有召桓公成八年復有召桓公未知一人二出也凡氏凡伯周公之𦙍也雜人周任史佚檀伯達辛甲𥅆季陶叔宰咺武氏子辛有南季家父仍叔之子渠伯糾詹父辛伯榮叔王人子突蒍國子國邊伯子禽祝跪石速王子黨內史過內史叔興內史叔興父富辰伯服游孫伯頽叔桃子倉葛簡師父左鄢父原伯貫王孫滿叔服內史叔服王孫蘇聃啓甘歜子服王子札王子札蓋經文倒札字即王子捷也案孔穎達正義云傳稱此人為王子捷捷札一人而札在子上故疑經文倒札字也公羊傳曰王札子者何長庶之號也何休云天子之庶兄也左傳言札為王孫蘇所使非是尊貴不得為王為庶兄故譜以為雜人不知何王之子伯輿史狡瑕禽單公子愆期成愆尹言多王子瑕劉毅單蔑鞏成王子廖甘襄詹桓伯賔滑萇𢎞萇叔瑕辛宫嬖綽王孫沒劉州鳩隂忌老陽子泠州鳩賔起賔孟王子還摯荒姑發弱鬷延定稠王子處司徒醜子旅氏劉他尹辛隂不佞王子趙車富辛石張儋翩慶氏公族黨氏石尚庾皮之子過右周二百五人邾邾國曹姓案曹姓二字永樂大典無之從隱元年𫝊正義所引釋例增入顓頊之後有陸終氏産六子其第五子曰晏安邾即安之後也周武王封其苗裔邾挾為附庸居邾今魯國鄒縣是也自挾至儀父十二世案隱元年正義引釋例作自安至儀父十二世始見春秋齊桓公伯案公字隱元年正義引釋例作行儀父附從進爵稱子文公徙于繹桓公以下春秋後八世而楚滅之鄭鄭國姬姓周厲王子宣王母弟桓公友之後也宣王封友于鄭今京兆鄭縣是也及周幽王無道友徙其民于虢鄶案徙字隱元年𫝊正義引釋例作遷虢鄶之君分其地案本文虢鄶之君上似闕一字通鑑音注引世族譜作友徙其人於虢鄶之間遂有其人遂國焉今河南新鄭縣是也案隱十一年𫝊正義云漢書地理志云河南郡新鄭縣詩鄭桓公之子武公所國京兆鄭縣周宣王弟鄭桓公邑又云本周宣王弟友為周司徒食采於宗周畿內是為鄭桓公桓公問於史伯曰王室多故何所可以逃死史伯為桓公謀取虢鄶之地令寄帑與賄而虢鄶受之後二年幽王敗桓公死其子武公與平王東遷卒定虢鄶之地然則武公始居新鄭也今案正義所引本周宣王弟以下今本漢書無之附録於此以訂漢書之闕莊公之二十二年魯隱公之元年聲公二十年獲麟之嵗也三十三年而春秋之傳終矣聲公三十七年卒自聲公以下五世八十七年而韓滅鄭矣案昭四年正義引世族譜云鄭在春秋後五世九十一年韓滅鄭桓公友武公滑突莊公寤生公子忽太子忽昭公也公子突厲公突文公捷鄭捷公子蘭太子穆公蘭太子夷靈公子蠻公子堅襄公堅悼公費成公睔太子髠頑僖公簡公嘉定公寧獻公蠆聲公勝夫人武姜姜氏夫人生莊公太叔段武公夫人鄧曼生忽莊公夫人雍姞生厲公莊公妃媯氏昭公妃夫人芉氏文芉生二姬文公夫人姜氏文公妃燕姞生穆公文公妃宋子穆公妃圭媯穆公妃少妃姚子生靈公穆公妃陳媯子儀妃文公報之生子華及子臧公子公子亹莊公子鄭子儀莊公子弟語子人莊公子世子華子華文公子子臧文公子公子士文公子子俞彌文公子公子瑕文公子二姬文公女良氏子良公子去疾穆公子子耳公孫輒良霄伯有良止罕氏子罕公子喜成子穆公子子展公孫舍之桓子子皮罕虎冢宰子齹孺子嬰齊罕達子姚武子賸公孫鉏子罕子馬師氏罕朔罕魋子皮之弟豐氏子豐公子平穆公子子石伯石公孫段景伯豐施子施大季氏士子孔公子志穆公子大季子良孔氏公子嘉子孔司徒孔穆公子公孫泄孔張公孫申子張駟氏子駟公子騑武子穆公子子西公孫夏襄子駟帶子上定子子游駟偃襄子絲子瑕駟乞獻子駟􅞰子然莊子子般駟𢎞子思子晳氏案程公說春秋分記云世族譜既譜駟氏而於黑别譜為子晳氏不知子晳即駟氏也襄三十年傳曰駟良方爭伯有侈而愎子晳好在人上杜預注駟氏子晳良氏伯有未始分為子晳氏也公孫黑子晳子駟子公子印穆公子案程公說春秋分記云世族譜以子印為穆公之子誤也公子印乃公子睔印氏之别祖黑之子乃印爾當為穆公曽孫豈得以為穆公子國氏子國公子發惠子穆公子子産少正公孫僑子美成子國參子思桓子游氏公子偃子游宣子穆公子子蟜公孫蠆司馬子蟜桓子游昄子明昭子良昄子子太叔太叔游吉公孫蠆子游速子寬子寬渾罕子南氏公孫楚子南子游子穆公之孫印氏公子睔悼子子印穆公子子張公孫黑肱伯張印段子石獻子子栁印癸印堇父印氏别族然氏子然穆公子然丹子革案程公說春秋分記云然氏别祖子然生丹丹生鬷明世族譜然氏闕鬷明今考杜譜然明見雜人羽氏子羽公之子案孔頴逹襄二十六年正義引世族譜云子羽穆公子其後為羽氏即馬師頡翬穆是其孫非行人子羽公孫揮也羽頡馬師頡子羽孫案程公說春秋分記云羽氏别祖公孫羽生公孫申申生頡世族譜羽氏闕公孫申太叔氏共叔段京城太叔太叔段武公子公孫滑公父定叔子狐氏子狐孫擊孫惡祭氏祭仲祭封人仲足雍姬雍糾妻祭仲女皇氏皇武子皇戍皇耳尉氏尉止尉翩止之子子如氏公子班子如孫叔班之子公子駹班之弟孫知駹之子司氏司臣司齊雜人公子吕子封潁考叔潁谷封人原繁原伯泄駕泄伯泄氏曼伯檀伯宛良佐子元𥅆祝公孫閼子都强鉏叔盈公孫獲髙渠彌髙伯傅瑕公子閼詹叔詹高克聃伯孔叔孔氏申侯堵叔堵俞彌泄堵冦佚之孤燭之武孔將鉏石甲父石癸商人弦髙侯宣多外僕髠屯公子歸生子家師叔公子堅公子尨樂耳石楚公子宋子公共仲公子曼滿王子伯廖石制子服公子魚臣僕叔侯羽伯蠲公子繻姚句耳石首唐苟侯獳皇辰子熙子侯子丁堵汝父王子伯駢侯氏侯晉子師氏子師僕石􅎢石盂師悝師觸師蠲師茷師慧堵狗宛射犬公孫公孫揮子羽行人揮然明皇頡禆竈禆諶公孫肸僕展樂成豐卷子張馮簡子尹何徐吾犯富子子上屠擊祝􅍁豎柎里析公孫登商成公鄧析公孫林許瑕郟張鄭羅雍紏子人九案孔穎達僖二十八年正義云桓十四年鄭伯使其弟語來盟傳稱子人來盟杜云即弟語也其後為子人氏僖七年傳子華云泄氏孔氏子人氏三族實違君命子人九必是語之後也杜譜以九為雜人謬矣公孫申叔孫叔禽右鄭人二百三人宋宋國子姓其先契佐唐虞為司徒封于商成湯受命王有天下及紂無道周武王滅之而封其子武庚以紹殷後武庚作亂周公伐而誅之更封紂兄帝乙之元子微子啓為宋公都商邱今梁國睢陽縣是也微子卒其弟微仲代立穆公七年魯隱公之元年也景公三十六年魯哀公之十四年獲麟之嵗也昭公得之元年春秋之𫝊終矣其後五世百七十年而齊魏楚共滅宋案此條永樂大典闕佚從左傳隱元年正義所引釋例補入公子母弟辰公子地皆元公子案昭二十年傳華亥取太子欒與母弟辰公子地以為質朴集解云欒景公也辰及地皆元公弟孔穎達正義云定十年經書宋公之弟辰當景公之世辰及地不得為元公弟世族譜辰地皆元公子此諸本皆云元公弟當時傳寫誤耳世又案此條永樂大典闕佚據昭二十年正義所引族譜補入樂氏樂鉏將鉏案成十六年傳宋將鉏樂懼敗鄭師于汋皮杜集解云樂懼戴公六世孫將鉏樂氏族孔穎達正義云樂懼戴公六世孫世本有文也將鉏為樂氏之族不知所出杜譜于樂氏之下樂鉏將鉏為一人𫝊無樂鉏之文不知其故何也引又案此條永樂大典闕從成十六年正義所世族譜補入皇氏皇父充石皇瑗皇父充石八世孫案皇氏以下永樂大典闕從哀十八年正義所引世族譜補入劖般瑗世父案程公說春秋分記云哀十七年𫝊皇瑗之子麇奪其兄劖般邑世族譜誤謂劖般為瑗世父劖般蓋瑗之猶子麇之兄也從世族譜則是躋猶子為諸父而兄為從祖矣當從左傳今據此補入並正杜氏之失于此皇懷瑗昆弟案程公說春秋分記云案哀二十六年傳杜預云皇懷非我從昆弟非我瑗從子則懷亦瑗從子也世族譜乃謂懷為瑗昆弟是躋一世矣今據此補入並訂正于此皇鄖瑗從父昆弟皇野瑗昆弟案皇鄖皇野二條永樂大典並闕據程公說春秋分記所引世族譜補入皇緩充石十世孫案哀十八年傳宋使皇緩為右師杜集解云緩瑗從子孔穎達正義云據世族譜則緩為瑗從孫非從子二者必有一誤譜又案此條永樂大典闕從哀十八年正義所引世譜補入華氏華督司馬子伯督曽孫案此條永樂大典闕從程公說春秋分記所引釋例補入又案分記云世本華督子家家子御事世族譜並闕向氏向戌向寧戌曽孫向巢戌曽孫案程公說春秋分記云向氏别祖肸生訾守訾守生二子曰鱣曰戌戌生五子曰勝曰宜曰鄭曰行曰寧寧生羅羅生五子曰巢曰曰頎曰子車曰牛昭十九年傳鄅夫人宋向戌之女也故向寧請師杜預注寧向戌子也世族譜乃以寧為戌曽孫誤矣又世族譜云巢為戌曽孫據巢為戌曽孫則寧為戌子世族譜杜預所𫐠自異若此用正其誤又肸訾守饁世族譜並闕今據此補入鱗氏鱗矔桓公子鱗朱桓公孫案程公說春秋分記云鱗氏祖公子鱗生矔矔生文文生奏奏生朱世族譜誤以矔為桓公子以朱為桓公孫皆非也杜氏子成十五年傳注朱為矔孫又與世族譜大相矛盾蓋世族譜闕鱗文奏三世故于矔及朱之系前後錯亂耳今據此補人雜人子游案孔穎達桓十二年正義引世族譜云子游雜人不知何公之子吕封人豹華豹案昭二十一年傳公子城以晉師至與華氏戰于赭丘干犫御吕封人華豹張丐為右杜集解云吕封人華豹華氏黨孔穎達正義云吕邑封人官名豹即下文華豹是也本或豹上有華字王肅董遇益云吕封人華豹釋例譜一人再見名字不同皆兩載之宋雜人內有吕封人豹華豹為一人知此本無華字也今定本有華字正又案此條永樂大典闕佚從昭二十一年義所引釋例補人向勝向行向為人向帶案程公說春秋分記云向勝向行戌之子也為人及帶向氏族也世族譜置之雜人非是今據此補入高哀穆公曽孫案此條永樂大典闕據程公說春秋分記所引世族譜補入紀紀國侯爵姜姓也莊公四年齊滅之舊譜子爵蓋取于公羊非左氏之義紀侯紀季紀侯弟裂繻子帛紀大夫春秋釋例卷八
