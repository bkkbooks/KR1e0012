body:
  text: 春秋釋例卷十三晉杜預撰經傳長厯第四十五之四宣公元年正月己卯小二月戊申大三月戊寅大四月戊申小五月丁丑大六月丁未小七月丙子大八月丙午小九月乙亥大十月乙巳小十一月甲戌大十二月甲辰小宣公二年正月癸酉大二月癸卯小三月壬申大四月壬寅小五月辛未大閏五月辛丑小六月庚午大七月庚子小八月己巳大九月己亥小十月戊辰大十一月戊戌小十二月丁卯大二月壬子十日九月乙丑二十七日壬申朝于武宫十月五日也既有日無月冬又在壬申下明𫝊文無較例十月乙亥八日宣公三年正月丁酉小二月丙寅大三月丙申小四月乙丑大五月乙未小六月甲子大七月甲午小八月癸亥大九月癸巳小十月壬戌大十一月壬辰小十二月辛酉大十月丙戌二十五日宣公四年正月辛卯小二月庚申大三月庚寅小四月己未大五月己丑小六月戊午大七月戊子小八月丁巳大九月丁亥小十月丙辰大十一月丙戌大十二月丙辰小六月乙酉二十八日七月戊戌十一日宣公五年正月乙酉大二月乙卯小三月甲申大四月甲寅小五月癸未大六月癸丑小七月壬午大八月壬子小九月辛巳大十月辛亥小十一月庚辰大十二月庚戌小宣公六年正月己卯大二月己酉小三月戊寅大四月戊申大五月戊寅小閏五月丁未大六月丁丑小七月丙午大八月丙子小九月乙巳大十月乙亥小十一月甲辰大十二月甲戌小宣公七年正月癸卯大二月癸酉小三月壬寅大四月壬申小五月辛丑大六月辛未大七月辛丑小八月庚午大九月庚子小十月己巳大十一月己亥小十二月戊辰大宣公八年正月戊戌小二月丁卯大三月丁酉小四月丙寅大五月丙申小六月乙丑大七月乙未大八月乙丑小九月甲午大十月甲子小十一月癸巳大十二月癸亥小六月辛巳十七日壬午十八日戊子二十四日七月甲子日食既三十日十月己丑二十六日庚寅二十七日宣公九年正月壬辰大二月壬戌小三月辛卯大四月辛酉小五月庚寅大六月庚申大七月庚寅小八月己未大九月己丑小十月戊午大十一月戊子小十二月丁巳大九月辛酉九月無辛酉上有八月下有十月誤在日案孔穎逹正義云下有十月癸酉杜以長厯推之癸酉是十月十六日辛酉在前十二日耳故云九月無辛酉上有八月下有十月非月誤也十月癸酉十六日宣公十年正月丁亥小二月丙辰大三月丙戌大四月丙辰小五月乙酉大閏五月乙卯小六月甲申大七月甲寅小八月癸未大九月癸丑小十月壬午大十一月壬子小十二月辛巳大四月丙辰日食一日己巳十四日五月癸巳九日宣公十一年正月辛亥小二月庚辰大三月庚戌小四月己卯大五月己酉小六月戊寅大七月戊申小八月丁丑大九月丁未小十月丙子大十一月丙午小十二月乙亥大十月丁亥十二日宣公十二年正月乙巳小二月甲戌大三月甲辰小四月癸酉大五月癸卯小閏五月壬申大六月壬寅大七月壬申小八月辛丑大九月辛未小十月庚子大十一月庚午小十二月己亥大六月乙卯十四日丙辰十五日辛未三十日十二月戊寅十二月無戊寅十一月九日也日月必有誤也案孔穎逹正義云注不言月誤長厯云日月必有誤者案傳師人多寒若是十一月則今之九月未是寒時當月是而日誤也宣公十三年正月己巳小二月戊戌大三月戊辰小四月丁酉大五月丁卯小六月丙申大七月丙寅小八月乙未大九月乙丑小十月甲午大十一月甲子小十二月癸巳大宣公十四年正月癸亥小二月壬辰大三月壬戌小四月辛卯大五月辛酉小六月庚寅大七月庚申大八月庚寅小九月己未大十月己丑小十一月戊午大十二月戊子小五月壬申十二日宣公十五年正月丁巳大二月丁亥小三月丙辰大四月丙戌小五月乙卯大六月乙酉小七月甲寅大八月甲申小九月癸丑大十月癸未小十一月壬子大閏十一月壬午小十二月辛亥大六月癸卯十九日辛亥二十七日七月壬午二十九日宣公十六年正月辛巳小二月庚戌大三月庚辰小四月己酉大五月己卯小六月戊申大七月戊寅小八月丁未大九月丁丑小十月丙午大十一月丙子小十二月乙巳大三月戊申二十九日宣公十七年正月乙亥小二月甲辰大三月甲戌小四月癸卯大五月癸酉大六月癸卯小七月壬申大八月壬寅小九月辛未大十月辛丑小十一月庚午大十二月庚子小正月庚子二十六日丁未蔡侯申卒二月四日也有日而無月也六月癸卯日食一日己未十七日十一月壬午十三日宣公十八年正月己巳大二月己亥小三月戊辰大四月戊戌小五月丁卯大六月丁酉大七月丁卯小八月丙申大九月丙寅小十月乙未大十一月乙丑小十二月甲午大七月甲戌八日十月壬戌二十八日成公元年正月甲子小二月癸巳大三月癸亥小閏三月壬辰大四月壬戌小五月辛卯大六月辛酉大七月辛卯小八月庚申大九月庚寅小十月己未大十一月己丑小十二月戊午大二月辛酉二十九日三月癸未二十一日成公二年正月戊子小二月丁巳大三月丁亥大四月丁巳小五月丙戌大六月丙辰小七月乙酉大八月乙卯小九月甲申大十月甲寅小十一月癸未大十二月癸丑小四月丙戌四月無丙戌五月一日也六月壬申十七日癸酉十八日七月己酉二十五日八月壬午二十八日庚寅衛侯速卒據傳庚寅九月七日也有日而無月也十一月丙申十四日成公三年正月壬午大二月壬子大三月壬午小四月辛亥大五月辛巳小六月庚戌大七月庚辰小八月己酉大九月己卯小十月戊申大十一月戊寅大十二月戊申小正月辛亥三十日二月甲子十三日乙亥二十四日十一月丙午二十九日丁未三十日十二月甲戌二十七日成公四年正月丁丑大二月丁未小三月丙子大四月丙午小五月乙亥大六月乙巳小七月甲戌大閏七月甲辰小八月癸酉大九月癸卯小十月壬申大十一月壬寅小十二月辛未大三月壬申二月二十六日也書于三月從赴四月甲寅九日成公五年正月辛丑小二月庚午大三月庚子大四月庚午小五月己亥大六月己巳小七月戊戌大八月戊辰小九月丁酉大十月丁卯小十一月丙申大十二月丙寅小十一月己酉十四日十二月己丑二十四日成公六年正月乙未大二月乙丑小三月甲午大四月甲子小五月癸巳大六月癸亥小七月壬辰大八月壬戌大九月壬辰小十月辛酉大十一月辛卯小十二月庚申大二月辛巳十七日四月丁丑十四日六月壬申十日成公七年正月庚寅小二月己未大三月己丑小四月戊午大五月戊子小六月丁巳大七月丁亥小八月丙辰大閏八月丙戌小九月乙卯大十月乙酉大十一月乙卯小十二月甲申大八月戊辰十三日成公八年正月甲寅小二月癸未大三月癸丑小四月壬午大五月壬子小六月辛巳大七月辛亥小八月庚辰大九月庚戌小十月己卯大十一月己酉小十二月戊寅大十月癸卯二十五日成公九年正月戊申大二月戊寅小三月丁未大四月丁丑小五月丙午大六月丙子小七月乙巳大八月乙亥小九月甲辰大十月甲戌小十一月癸卯大閏十一月癸酉小十二月壬寅大七月丙子六月一日也書七月從赴十一月戊申六日庚申十八日城中城閏月城之在十一月之後十二月之前故傳云書時也案孔穎逹正義云長厯推此年閏十一月𫝊城中城文在十二月上而云書時也即是閏月城之閏月半後即是十二月節故水昏已正而城之是得時也成公十年正月壬申大二月壬寅小三月辛未大四月辛丑小五月庚午大六月庚子小七月己巳大八月己亥小九月戊辰大十月戊戌小十一月丁卯大十二月丁酉小五月辛巳十二日丙午晉侯獳卒據𫝊丙午六月七日有日無月也六月戊申九日成公十一年正月丙寅大二月丙申大三月丙寅小四月乙未大五月乙丑小六月甲午大七月甲子小八月癸巳大九月癸亥小十月壬辰大十一月壬戌小十二月辛卯大三月己丑二十四日成公十二年正月辛酉小二月庚寅大三月庚申小四月己丑大五月己未大閏五月己丑小六月戊午大七月戊子小八月丁巳大九月丁亥小十月丙辰大十一月丙戌小十二月乙卯大五月癸亥五日成公十三年正月乙酉小二月甲寅大三月甲申大四月甲寅小五月癸未大六月癸丑小七月壬午大八月壬子小九月辛巳大十月辛亥小十一月庚辰大十二月庚戌小四月戊午五日五月丁亥五日六月丁卯十五日己巳十七日成公十四年正月己卯大二月己酉小三月戊寅大四月戊申大五月戊寅小六月丁未大七月丁丑小閏七月丙午大八月丙子小九月乙巳大十月乙亥小十一月甲辰大十二月甲戌小八月戊戌二十三日庚子二十五日十月庚寅十六日成公十五年正月癸卯大二月癸酉小三月壬寅大四月壬申大五月壬寅小六月辛未大七月辛丑小八月庚午大九月庚子小十月己巳大十一月己亥小十二月戊辰大三月乙巳四日癸丑十二日八月庚辰十一日十一月辛丑三日成公十六年正月戊戌小二月丁卯大三月丁酉小四月丙寅大五月丙申大六月丙寅小七月乙未大八月乙丑小九月甲午大十月甲子小十一月癸巳大十二月癸亥小四月辛未六日戊寅十三日六月丙寅朔日食一日癸巳二十八日甲午晦二十九日七月戊午二十四日十月乙亥十二日十二月乙丑三日乙酉二十三日成公十七年正月壬辰大二月壬戌小三月辛卯大四月辛酉小五月庚寅大六月庚申小七月己丑大八月己未小九月戊子大十月戊午小十一月丁亥大十二月丁巳小𫝊閏十二月丙戌大案傳有閏月乙卯晦之文故此條特加𫝊字六月戊辰九日乙酉二十六日七月壬寅十四日九月辛丑十四日十月庚午十三日十一月壬申十一月無壬申公羊穀梁傳及諸儒皆以為十月十五日也十月庚午圍鄭十三日也推至壬申誠在十五日然據傳曰十一月諸侯還自鄭壬申至于貍脤而卒此非十月分明誤在日也十二月丁巳朔日食一日壬午二十六日閏月乙卯晦三十日成公十八年正月丙辰小二月乙酉大三月乙卯大四月乙酉小五月甲寅大六月甲申小七月癸丑大八月癸未小九月壬子大十月壬午小十一月辛亥大十二月辛巳小正月庚申五日庚午十五日辛巳二十六日案孔頴逹正義云服䖍本作辛未晉語亦作辛巳孔朝云以辛未盟入國辛巳朝祖廟取其新也案晉語稱庚午大夫迸于清原傳云庚午盟而入迸日即盟非辛未也傳與晉語皆云辛巳朝于武宮服本自誤耳孔朝强欲合之非也甲申晦二十九日二月乙酉朔一日八月己丑七日十二月丁未二十七日春秋釋例卷十三
