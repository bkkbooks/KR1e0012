body:
  text: 春秋釋例後序春秋左氏漢初本無傳者劉子駿始建明之欲立學官諸儒莫應然傳之者亦巳衆多賈景伯服子慎並為訓解及晉而杜元凱又作經傳集解三十卷釋例四十卷且歷詆劉賈之違獨不言服氏豈或不見服氏書乎亦不應不見也世族譜本之劉向世本地志本之泰始郡國圖長厯本之劉洪乾象厯世多言其天文星厯為長然説經多依違以就傳似不得為左氏忠臣者南北分裂館陶趙世業家有服氏春秋是晉永嘉舊寫華隂徐生往讀之遂撰春秋義章以教學者是永嘉時猶未尚杜氏青州刺史杜坦及其第驥世傳其業故齊地亦多習之坦元凱之玄孫也姚文安秦道靜初亦學服氏後更兼講杜説劉蘭張吾貴之徒則又隱括兩家同異義例無窮嗚呼漢初習經者専門而今河洛習傳者宗服子慎江左尚杜元凱矣晉劉兆始取公榖及左氏説作春秋調人而今蘭吾貴又會服杜之説矣聖人之道不自是而愈散哉自唐孔頴逹春秋正義一用杜氏非徒劉賈之説不存服義亦不盡見固不若兩存之以見服杜之為孰愈也今釋例具在有劉蕡序蕡太和中對賢良䇿譏切人主斥罵宦者文極激其學一本春秋與漢董生天人三䇿相為上下蕡亦自擬董生且曰昔董仲舒為漢武帝言之未盡者今臣復為陛下言之壯哉蕡乎至為此序獨不類唐文之衰至此極矣吳萊序
