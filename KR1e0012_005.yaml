body:
  text: 春秋釋例卷五晉杜預撰土地名第四十四之一案此篇見永樂大典惟篇目佚今從孔穎逹集解序正義補篇又案酈道元水經注引杜預此並作春秋釋地地名三十八隱八年春宋公衛侯遇于垂傳曰宋公以幣請于衛請先相見衛侯許之故遇于犬丘十一年夏公會鄭伯于時來傳曰夏公會鄭伯于郲謀伐許也宣七年冬公會晉侯宋公衛侯鄭伯曹伯于黑壤傳曰盟于黃父公不與盟以賂免故黑壤之盟不書諱之也昭九年春云云許遷于夷傳曰二月庚申楚公子棄疾遷許于夷實城父十八年冬許遷于白羽傳曰楚子使王子勝遷許于析實白羽定十年夏公會齊侯于夾谷傳曰夏公會齊侯于祝其實夾谷十三年春齊侯衛侯次于垂葭傳曰春齊侯衛侯次于垂葭實氏地有二名七十九錯綜其七釋例曰天有列宿之號地有山川之名尚矣與人倫並今其遺文禹貢及山海經載其大略而春秋經國邑之名又詳然書契以來歷代七百餘年數千其名號處所因緣改變加以四方之語音聲有楚夏文字有異同或一地二名或二地一名或他國之人錯得他國田邑縣以為己屬既難綜練且多繆誤疑闕自禹貢之經猶與輿地實相錯舛況傳記雜書而可必據異同端迹似是而非似非而是者甚衆非精敏兼通不能淹濟其始終以獨見于千載之表也六合之內山川國邑道塗關津春秋多見其事盟會侵伐各有所趣周旋迂直可得而推日月逺近可得而校然詳而究之非書無以志古非圗無以志形坐于堂宇之內瞻天下之廣居究古今之委曲可以行可以言可以鑑可以觀多識山川分野之别賢愚成敗得失之迹雖千載之外若指諸掌圗書之謂也以據今天下郡國縣邑之名山川道塗之實爰及四表自人迹所逮舟車所通皆圗而備之然後以春秋諸國邑盟會地名各所在附列之名曰古今書春秋盟會圗别集疏一卷附之釋例博而備矣春秋地名之變易經傳有起發者有經書所改之名則傳以實明之遷許于夷實城父齊侯衛侯次于垂葭實郹氏之比是也經書未改之名傳發所改為文而稱經以為實者遷許于析實白羽公會齊侯于祝其實夾谷之比是也皆謂所在之地舊名絶于當時而史記有遺文者也若二名當時並存案隱八年正義引釋例此句作若一傳二名當時並有則直兩文互見黑壤犬丘時來之屬是也此皆經傳起事之常猶卿大夫名氏互見非例也傳曰閨門之外實薰隧者薰隧之地在門外非地名也其明年子産數子析之罪稱薰隧之盟是以丘明就于盟文並見薰隧參傳微旨多此學者推以求之其庶幾矣案昭九年孔穎逹正義云杜以地名經傳不同而傳言實者則以為各有改易也傳不言實則以為二名並存也言實凡有二義經書未改之名傳以所改實名之則昭十八年許遷于白羽傳云遷許于析實白羽定十五年會齊侯于夾谷傳云會于祝其實夾谷是也若經書已改之名則傳亦舉其已改實其未改之號許遷于夷傳云遷許于夷實城父定十三年齊侯衛侯次于垂葭傳云次于垂葭實郹氏是也此四者或經書未改或經書已改傳皆上句舉其已改之名下句實其未改之號凡一地前後二名者非謂經時為未改之名傳時為已改之名乃于經傳以前上世之時亦有所改夫子集史記而為經丘明采簡牘而作傳史記或書其舊名者即白羽夾谷是也或書其後名者即夷與垂葭是也丘明據簡牘為傳以所改後名而實之故僖二十五年秦取析矣襄二十六年聲子云析公之亂皆舉白羽改為析之後但簡牘稱析故杜云于傳時白羽改為析正謂簡牘之時非丘明作傳時也疆場之邑一彼一此所屬無常如陳之焦夷後為楚邑莒魯之鄆亦無一定故今地名唯以先者為主其變改移易學者可尋而知世人以河東汾隂為齊桓所盟葵丘又為犨縣魚山陂為楚子所次楚師分涉于彭為豫章之彭澤吳人入棘櫟為河南之陽翟末學之徒各牙所見若此皆甚多古人之教戒以闕疑苟不廣見乃亦不知所疑也今所記注雖事迹相切名號相附而未有顯證者皆稱今有並以示疑其絶無形類者則闕以待多聞之士焉今所畫圖本依官司空圖據泰始之初郡國為正時孫氏僭號于吳故江表所記特示略咸寧六年吳乃平定案晉書是年改元太康實咸寧六年也孫氏居八郡之地隨其宜增廣今江表凡十四郡皆貢圖籍新國始通文記所載猶未詳備若足以審其大略自荆揚徐江內郡縣人以各還其舊城故此三州未界大江之表皆改從今為正不復依用司空圖也所載博備則圖體廣大非儒學世家恐不能有之故復别為小圖指舉春秋國邑盟會以參所在郡縣簞食荷擔之學約之通焉地名大凡一千二百一十二其五百五十九闕案本文地名實一千二百二十六條其闕者實五百六十五條其百七十周及大小國附庸其三十一闕案本文闕者實三十五條八百九十九地名其四百八十一闕案本文地名實九百一十五條其闕者實四百八十六條四十四夷其二十一闕案本文闕者實十八條四十五山其十二闕案本文實四十二山五十八水其十四闕案本文實五十九水魯地隱元年魯魯國魯縣案晉書地理志魯縣屬魯郡蔑姑蔑二名魯國卞縣南有姑蔑城案此句集解作卞縣有姑城又案晉書地理志卞縣屬魯郡即髙平方與縣東南有郁即亭二年潛闕唐棠二名高平方與縣北有武唐亭魯侯觀魚臺唐即棠本宋地也案隱五年正義引釋例云舊説棠魯地據傳云公辭欲略地則指魯境也又釋例土地名棠在魯部內云本宋地蓋宋魯之界上也方又案劉昭續漢書郡國志注引杜説云武唐亭在與縣西南七年中丘琅琊臨沂縣東北中丘亭八年許田近許之田九年防琅琊防縣東南防地十年鄧闕十一年菟裘泰山梁甫縣南菟裘城案晉書地理志續漢書郡國志並作菟裘聚社圃闕桓三年歡濟北蛇丘縣西有下歡亭案晉書地理志下歡作下灌五年祝丘闕六年成泰山巨平縣東南成地七年咸丘髙平巨野縣南有咸亭案劉昭續漢書郡國志注引杜説縣南作縣西十一年闞東平西昌縣東南有闞城十二年曲池魯國汶陽縣北有曲水亭案晉書地理志汶陽縣屬魯郡十六年向闕十七年趡闕奚闕莊九年蔇琅琊繒縣北有蔇亭生竇闕十年長勺闕乘丘闕十一年鄑闕二十七年洮闕二十八年郿闕二十九年諸城陽縣也案晉書地理志諸縣屬城陽郡三十一年薛闕秦東平范縣北有秦亭三十二年逵泉闕閔二年密琅琊費縣北有密如亭夷闕僖元年酈闕汶陽之田棘二名汶水北地也濟北蛇丘縣北棘亭又云兗州龔鄉縣東北七十五里有棘鄉案晉書地理志兗州所屬無龔鄉縣又案隋書地理志魯郡下云舊兗州龔丘屬焉後齊曰平原縣開皇十六年改舊唐書地理志云兗州隨部武德五年平徐圓朗置兗州龔丘北齊平原縣隋改為龔丘則龔丘乃隋縣又云以下蓋後人所增非杜氏本文也謹訂于此費琅琊縣也案晉書地理志費縣屬琅琊國七年寧母高平方與縣東有泥母亭音如寧十七年卞魯國卞縣案晉書地理志卞縣屬魯郡二十二年升陘闕二十九年昌衍魯縣東南有昌平亭案集解昌平亭作昌平城三十一年濟西田濟水西田重館髙平方與縣西北有重鄉城文七年郚五梧二名卞縣南有郚鄉城十一年鹹闕十二年鄆鄆田二名此東鄆莒魯所爭者城陽姑幕縣南有貟亭或曰鄆即貟也疑十五年句鼆闕戾丘闕宣八年平陽此東平陽也泰山有平陽縣案晉書地理志泰山郡新泰縣故曰平陽十八年笙魯地也闕或曰境外疑也成二年蜀泰山博縣西北有蜀亭龍在泰山博縣西南巢丘闕陽橋闕九年中城東海厚丘縣西南中鄉城案厚丘永樂大典誤廩丘集解各本並同考晉書地理志東海縣屬有厚丘無廪丘而劉照注續漢書郡國志于東海郡厚丘條下引杜説云左傳成九年城中城杜曰縣西南有中鄉城今據此改正十六年壞隤闕鄆此西鄆昭公所出居者東郡廩丘東有鄆城晉書地地理志無東郡廪丘屬濮陽國注云故屬東郡晉初分東郡置又云今鄆州鄆城縣是魯西鄆也案成四年經冬城鄆正義云公欲叛晉故城鄆以為備當是西鄆也又案隋書地理志東平郡下云後周置魯州尋廢開皇十年置鄆州鄆域屬焉縣本後周置曰清澤開皇初改曰萬安十八年改鄆州為東平郡大業初改縣曰鄆域舊唐書地理志鄆州隋東平郡之須昌縣武德四年平徐圖朗置鄆州鄆城漢夀良地隋改為萬安尋改鄆城則鄆州鄆城縣皆隋所置又云以下蓋後人所增非杜氏本文也謹訂于此十八年鹿囿闕襄四年蒲圃場名闕十年聊魯國魯縣東南莝城也十一年五父之衢魯國魯縣東南十二年台琅琊費縣南有台亭十五年劉闕案孔穎逹正義云蓋魯城外之近地遇闕十六年海陘闕十七年桃魯國卞縣東南有桃虛陽關泰山巨平縣東陽關城旅松闕案孔頴逹正義云旅松近防地十九年武城泰山南武城縣有淡臺子羽冢也二十二年御闕二十六年高魚東郡廩丘縣東北高魚城三十一年陽州闕昭四年庚宗闕丘蕕闕五年蚡泉闕塞關闕八年紅沛國蕭縣西有紅亭迂逺疑商衛泰山奉高縣西北有衛亭或曰魯衛西界商宋疑十一年比蒲闕泉丘闕二十二年昌間闕二十五年郈東平無鹽縣東南郈鄉亭炊鼻闕二十七年且知闕定五年東野闕十年龜隂之田泰山博縣北有龜山田在其北十三年蛇逺囿闕十四年莒父闕霄闕哀三年啓陽琅琊開陽縣五年毗闕六年邾瑕任城亢父縣北有邾瑕城七年鄫鄫衍二名琅琊鄫縣負瑕高平南平陽縣西北有瑕丘城八年闡東平剛平縣北闡鄉城案酈道元水經汶水注引杜預釋地無平字東陽或曰泰山南城縣西東安城是也疑案晉書地理志南城作南武城而劉昭續漢書郡國志注引杜説仍作南城縣與續漢書縣名合故仍之蠶室闕十一年稷曲闕十四年大野髙平巨野縣東北大澤丘輿泰山南城縣西北有輿城十五年輸闕十七年蒙東莞蒙隂縣西故蒙隂城案晉書地理志蒙隂屬琅琊國不屬東莞郡二十七年平陽西平陽也高平有南平陽縣陵阪闕周地隱元年周雒邑王城郟鄏陌五名河南縣西有郟鄏陌也三年溫蘇二名河內溫縣成周河南洛陽縣六年周扶風雍縣東北周城也案劉昭續漢書郡國志注引杜説云周城在扶風美陽縣西北八年瓦屋闕十一年原河內沁水縣西北原城絺河內野王縣西南有絺城樊陽樊二名河內野王縣西南有陽城隰隰郕二名河內懷縣西南有隰城欑茅汲郡修武縣西北有欑城向河內軹縣西北有地名向上盟孟津二名河內河陽縣南孟津州河內州縣陘闕隤汲郡修武縣北有隤城懷河內懷縣莊元年單闕十六年夷闕二十一年酒泉闕僖二十四年召扶風雍縣東南有召亭案孔穎逹莊二十七年正義云召康公之封召當在西都畿內春秋時召伯猶是召公之後西都既已賜秦則東都别有召地不復知其所在甘河南縣西南有甘水案劉昭續漢書郡國志注引杜説甘水作甘泉坎欿河南鞏縣東地名坎欿也二十九年翟泉河南洛陽新城縣北太倉西南池案續漢書郡國志雒陽周時號成周有狄泉在城中劉昭注云左傳僖二十九年盟于狄泉杜預曰城內太倉西南池水或曰本在城外定元年城成周乃繞之案此水晉時在東宫西北帝王世紀曰狄泉本殷之墓地在成周東北然則翟泉的在洛陽城中新城乃戎蠻子地相去殊逺本文新城二字疑有訛誤文十七年邥垂河南新城縣北有邥垂亭成十一年鄄闕田河內懷縣西南有人亭十三年成闕襄二十一年轘轅河南緱氏縣東南有轘轅關三十年平畤闕昭元年京周京周長安縣西有鎬京邑四年景亳河南鞏縣西南有湯亭或言亳即偃師也岐陽岐山之南宫始平鄠縣東有靈臺九年閻闕頴闕十二年郊闕十七年甘鹿闕二十二年皇河南鞏縣西南有黃亭案劉昭續漢書郡國志注引杜説西南作西北榮錡河南鞏縣西有榮錡澗要闕餞闕揚闕領闕平畤闕京京楚二名闕圃車闕前城闕東圉河南洛陽縣東南有圉鄉社闕隂闕侯氏闕溪泉河南鞏縣西南有明溪泉汜闕解河南洛陽縣西南有大解小解任人闕二十三年鄩河南鞏縣西南有地名鄩中也平隂河南河隂縣也澤邑闕訾東訾二名河南鞏縣西南訾城也牆人闕直人闕阪道闕唐或曰河南洛陽縣東南有唐亭疑西闈闕蒯河南縣西南有蒯鄉案劉昭續漢書郡國志注引晉地道記蒯鄉作蒯亭二十四年塢緱氏縣西南有塢聚乾祭闕瑕闕杏闕二十六年尸氏尸二名河南鞏縣西南偃師城施谷闕渠闕禇氏河南洛陽縣南有禇氏亭萑谷闕闕塞闕外二名河南洛陽縣西南伊闕鞏河南鞏縣莒闕圉澤闕隄上闕擕闕彘平陽永安縣東北彘二十九年鄻闕魯縣河南魯陽縣也定六年馮闕負黍河南陽城縣西南有負黍亭狐人闕姑蕕闕七年儀栗闕窮谷闕八年榖城河南縣西有榖城簡城闕盂闕哀四年梁河南有梁縣也霍河南梁縣南有霍陽山邾地隱元年邾魯國鄒縣案晉書地理志鄒縣屬魯郡翼闕僖元年偃闕虛丘闕案孔頴逹正義云服虔以虛丘為魯邑杜不從其説三十三年訾婁闕文十三年繹魯國鄒縣北有繹山案孔頴逹正義云邾既遷都于此竟內别有繹邑宣十年公孫歸父帥師伐邾取繹取彼之别邑不取邾之國都也但邾是小國彼繹邑亦取繹山為名應近邾之都耳襄四年狐駘駘上二名魯國番縣東南有目駘亭案孔頴逹正義云魯國地理志云番讀如藩屏之藩言魯國南藩也汝南陳子遊為魯相子遊者藩之子也國人避諱遂改藩而為番字因而不改也又案晉書地理志鄒縣屬魯郡二十一年漆髙平南陽縣東北有漆鄉案漆鄉續漢書郡國志晉書地理志並作漆亭又案酈道元水經泗水注引杜説漆鄉下有郭字閭丘髙平南平陽縣西有顯閭亭昭十九年蟲闕二十三年離姑闕三十一年濫東海昌慮縣所治濫鄉城哀二年漷東田漷水東田沂西田沂水西田也絞闕七年茅髙平縣西南有茅鄉亭鄭地隱元年鄭滎陽宛陵縣西南有新鄭城案隱元年傳正義云地理志河南郡有宛陵縣又有新城縣于漢則宛陵新城各自為縣晉世分河南而立滎陽廢新城而入宛陵故鄭在宛陵西南也考晉書滎陽郡泰始二年置宛陵漢書晉書並作苑陵續漢書作菀陵鄢鄢陵二名潁川鄢陵縣制虢二名滎陽故虢國京滎陽京縣也廪延二名陳留酸棗縣北有延津城潁闕潁谷闕五年長葛潁川長社縣北有長葛城案酈道元水經洧水注引杜説長葛城作長葛鄉制北虎牢二名河南成臯縣八年祊琅琊國費縣東南有祊城十一年時來郲二名滎陽縣東有釐城塢河南緱氏縣西南有塢聚劉河南緱氏縣西北有劉亭蒍闕邘闕狐壤闕桓五年繻葛闕十一年祭陳留長垣縣東北有祭城十二年武父陳留濟陽縣東南有武父城十四年東郊闕牛首闕十五年櫟河南陽翟縣莊三年滑陳留襄邑縣西北有滑亭十四年大陵闕二十一年弭闕二十三年扈滎陽卷縣西北有扈亭二十八年桐丘潁川許昌縣東北有桐丘城閔二年清滎陽中牟縣西有清陽亭案清陽亭程公説春秋分記引釋例作陽清亭今考劉昭續漢書郡國志注引杜説亦作清陽亭則程本訛也僖六年新城密二名滎陽密縣二十二年柯澤闕二十四年汜此南汜也周公出居于汜楚伐鄭師于汜襄城縣南汜城是也案孔頴逹正義云南汜在襄城縣南鄭之西南竟南近楚西近周故王處于汜楚伐鄭師于汜皆以為南汜其東汜在中牟縣南去鄭城既近秦晉圍鄭秦軍汜南則為東汜杜各隨其所近而言也城又案晉書地理志襄縣屬襄城郡二十八年踐土闕衡雍滎陽卷縣所治垣雍城也二十三年函陵闕汜此東汜也秦軍汜南晉伐鄭師于汜滎陽中牟縣南有汜澤三十三年原圃原二名滎陽中牟縣西有圃田澤鄶城滎陽密縣東北有鄶城故鄶國文元年綿訾闕匡潁川新汲縣東北有匡城二年垂隴滎陽縣東有垂隴城八年暴暴隧二名闕申闕九年狼淵潁川潁隂縣西南有狼陂十三年棐闕十七年鯈闕宣元年棐林滎陽宛陵縣東南有林鄉北林滎陽中牟縣西南有林亭在鄭北三年郔闕南里闕九年厲闕栁棼闕十二年邲闕又云今鄭州管城縣東有古邲城也案隋書地理志滎陽郡下云舊鄭州開皇十六年置管川大業初復曰鄭州管城縣屬焉縣舊曰中牟開皇初改內牟十六年析置管城十八年改內牟為圃田屬焉又杜佑通典鄭州下云後周置滎州後改為鄭州隋置管州楊帝初復為鄭州尋廢州置滎陽郡則鄭州周置管城縣隋置又云以下蓋後人所增非杜氏本文也謹訂于此管滎陽京縣東北有管城古管國也滎澤滎陽縣東滎澤成三年伯牛闕又云汴州雍丘縣北有伯牛城案漢書地理志雍丘屬陳留郡杜佑通典汴州下云漢置陳留郡晉改為陳留國東魏置梁州後周改為汴州則汴州後周置又云以下蓋後人所增非杜氏本文也謹訂于此鄤闕丘輿闕四年汜祭河南成臯縣東有汜水五年蟲牢陳留封丘縣北有桐牢亭六年繞角闕又云汝州魯山縣南有繞角故一名涉城案杜佑通典汝州下云隋初置伊州煬帝初改為汝州後廢州以其地分屬襄城頴川二郡唐為汝州魯山屬焉古繞角城在縣東南隋書地理志襄城郡下云開皇初為伊州大業初改汝州而魯山縣則作魯縣舊唐書地理志則云魯山隋舊縣是汝州魯山縣並隋置又云以下蓋後人所增非杜氏本文也謹訂于此十年修澤滎陽卷縣東有修武亭案酈道元水經濟水注引杜説修武亭作武修亭十二年瑣澤闕交剛闕十三年訾闕十六年鳴鴈陳留雍丘縣西北有鳴鴈亭督揚闕制田滎陽宛陵縣東有制澤十七年柯陵闕高氏河南陽翟縣西南有高氏亭獻童闕曲洧潁川新汲縣所治曲洧城襄元年鄫陳留襄邑縣東南有鄫城五年城棣陳留酸棗縣西南有棣城七年鄬闕鄵闕九年戲闕隂版洧津隂口闕十年梧闕陽陵闕傳曰諸侯之師還鄭而南至于陽陵晉與楚夾潁而軍此則陽陵在潁北也或以為襄城舞陽縣者非十一年亳城北闕蕭魚闕向潁川長社縣東北向鄉瑣滎陽宛陵縣西北有瑣侯亭濟隧闕十六年湛阪襄城昆陽北有湛水東入汝十八年汾襄城縣東北有汾丘城魚陵南陽犨縣北魚齒山上棘闕胥靡闕獻于闕雍梁河南陽翟縣東北有雍氏城二十四年棘澤闕二十六年城麇闕樂氏闕二十八年黃崖黃水之崖三十年斗城闕酸棗陳留酸棗縣昭元年薰隧城門外道名四年釣臺河南陽翟縣南有釣臺陂五年菟氏闕索氏河南成臯縣東有大索城圉闕傳曰晉韓宣子如楚送女韓起反鄭伯勞諸圉或以為陳留扶溝縣東北有圉城迂逺非案續漢書郡國志扶溝屬陳留郡晉書地理志無此縣六年柤闕二十年萑苻之澤闕定四年臯鼬繁昌縣東南有城臯亭案晉書地理志繁昌屬襄城郡哀十三年黃池陳留封丘縣南有黃亭近濟水傳曰會于黃池在縣南吳子執子服景伯以還及戶牖然則黃池當在戶牖西北或以為陳留外黃縣東溝非矣戶牖陳留外黃縣西北東昏城宋地隱元年宋商商丘三名梁國睢陽縣也傳曰陶唐氏之火正閼伯居商丘祀大火又曰宋大辰之虛也然則商丘在宋地或以為漳水之南故殷虛為商丘者非也黃陳留外黃縣東有黃城十年菅闕郜濟隂成武縣東南郜城宋邑也今鄭取之或以為郜國非也僖二十年郜子來朝則郜非滅也防高平昌邑縣西南有西防城老桃闕桓二年稷闕十二年榖丘句瀆之丘二名闕虛闕龜闕十五年袲沛國相縣西南有侈亭莊二十二年蒙澤梁國蒙縣亳梁國蒙縣西北有亳城中有成湯冢其西有箕子冢案酈道元水經汳水注引杜説亳城作薄伐城薄又案説文繫傳引杜釋例作亳在梁國蒙澤縣北城中有湯冢凡三亳也十六年幽闕三十二年梁丘髙平昌邑縣西南梁丘鄉案酈道元水經濟水注引杜説梁丘鄉上有有字僖元年柳犖二名陳國陳縣西北有柳城案續漢書郡國注陳縣屬陳國晉書地理志晉武帝合陳郡于梁國陳縣屬梁國又案酈道元水經渠水注云杜預云柳即犖也在陳縣西北為非柳小城也在陳郡西南二年貫梁國蒙縣西北有貰城字與貫字相似或曰齊有貫澤公羊曰貫澤之會九年葵丘陳留外黃縣東有葵丘或曰河南汾隂縣為葵丘非也經夏會葵丘九月乃盟晉為地主無緣欲會而不及盟也案孔頴逹正義云莊八年傳連稱管至父戍葵丘杜云齊地臨淄縣西有地名葵丘此與彼異者傳稱齊侯不務德而勤逺略西為此會則此地逺處異地不得近在臨淄故釋例以為宋地二十一年鹿上汝隂有原鹿縣盂闕二十三年緡高平昌邑縣東有東緡城二十八年孟諸梁國睢陽縣東北文十一年承筐陳留襄邑縣西承筐城長丘闕十四年新城梁國榖熟縣西有新城宣二年大棘陳留襄邑縣南有棘鄉成十六年沙隨梁國寧陵縣北有沙隨亭案酈道元水經汳水注引杜預釋地沙隨亭作沙陽亭汋陂闕夫渠闕汋陵闕十八年彭城彭城縣也案晉書地理志彭城縣屬彭城國朝郟闕城郜闕幽丘闕靡角之谷闕襄元年呂彭城呂縣留彭城留縣犬丘闕或曰譙國酇縣東北有犬丘城迂回疑十年訿母闕十二年楊梁梁國睢陽縣東南有地名楊梁有楊亭有梁城縣昭十三年良下邳有良城縣二十七年鬼閻潁川長平縣西北有閻亭二十一年橫梁國睢陽縣南有橫亭南里闕廚闕鴻口梁國睢陽縣東有鴻口亭新里闕公里闕赭丘闕二十五年曲棘陳留外黃縣城中有曲棘里定十五年老丘闕哀九年雍丘陳留雍丘縣十一年城鉏闕十二年彌作頃丘玉暢嵒戈錫上六田宋鄭之間隙地也十四年鞍闕逢澤地理志言在滎陽開封縣東北逺疑案孔穎逹正義云漢書地理志開封縣逢澤在東北或曰宋之逢澤也臣瓚案汲郡古文梁惠王廢逢忌之藪以賜民今浚儀縣有逢忌陂是也土地名宋都睢陽計去開封四百餘里非輕行可到故杜以逺疑非也二十六年空澤闕連中闕空桐梁國虞縣東南有地名空桐有桐亭唐盂闕紀地隱元年紀東莞劇縣八年浮來東莞縣北有邳鄉西有公來山號邳來之間案晉書地理志東莞縣屬東莞郡莊元年郱東莞臨朐縣東南有郱城鄑北海東昌縣西有訾城案續漢書郡國志都昌屬北海國考晉書地理志故漢北海地分屬齊國及濟南城陽東莞諸郡無北海國亦無都昌縣郚東莞朱虛縣東南郚城也三年酅齊國東安平縣衛地隱三年衛殷虛二名汲郡朝歌縣四年清濟北東阿縣東北有清亭五年牧闕七年楚丘濟隂成武縣之西南有楚丘城八年垂犬丘二名濟隂句陽縣東北有垂亭桓元年越闕近垂地三年蒲陳留長垣縣西南有蒲城十年桃丘齊北東阿縣東南有桃丘案集解桃丘作桃城劉昭續漢書郡國志注酈道元水經濟水注引杜説並作桃城十六年莘陽平縣西北有莘亭案晉書地理志陽平縣屬陽平郡十八年首止陳留襄邑縣東南有首鄉城莊十四年鄄東郡鄄城案晉書地理志晉初分東郡置漢陽國鄄城屬濮陽二十七年城濮闕閔二年熒澤戰而又及河則非河南熒澤闕案杜預集解云此熒澤當在河北孔穎逹正義云禹貢豫州滎陂既潴導沇水入于河溢為滎是滎在河南此時衛都河北為狄所敗乃東徙渡河故知此熒澤當在河北但沇水入河乃泆被河南多故專得滎名其北雖少亦稱滎也共滕衛别邑也案杜隱六年集解云諸地名闕者不復記其闕孔穎逹正義云如翼侯奔隨注云隨晉地鄭人侵衛牧注云衛邑如此所類者皆言闕是也據此則僅言某國之邑皆杜所闕矣後倣此曹衛下邑案孔頴逹正義云曹當在河南近楚丘僖十三年鹹東郡濮陽縣東南有鹹城案晉書地理志晉初分東郡置濮陽國濮陽縣屬濮陽國十五年匡陳留長垣縣西南有匡城十八年菟圃闕訾婁闕二十三年五鹿衛縣西北地名有五鹿案晉書地理志衛縣屬頓丘郡陽平元城縣東亦有五鹿案程公説春秋分記引釋例云濮陽縣南三十里有五鹿城元城縣東亦有五鹿墟與永樂大典小異二十八年斂盂闕襄牛闕酅闕宛濮陳留長垣縣西南有宛亭近濮水三十一年帝丘古帝顓頊之墟故曰帝丘昆吾氏因之故曰昆吾之墟東郡濮陽縣是也文元年戚頓丘衛縣西戚城在枯河東又相州臨河縣東有戚城也案魏書地形志云司州治鄴城太祖天興四年置相州天平元年遷都改隋書地理志臨河縣屬汲郡開皇六年置舊唐書地理志相州下云漢魏郡也後魏道武改為相州唐因之臨河屬焉縣本隋分黎陽縣置杜佑通典亦云後魏道武置相州取河亶申居相之義東魏靜帝初遷都于此唐仍為相州臨河其支縣也則相州元魏置臨河縣隋置此條又相州以下斷非杜氏本文謹訂于此宣十二年清丘東郡濮陽縣東南有清丘成二年鞫居闕新築闕六年針闕七年馬陵陽平元城縣東南有地名馬陵襄十四年近關闕丘宫闕阿澤濟北東阿縣西南有大澤十九年柯魏郡內黃縣東北有柯城二十年澶淵頓丘縣南繁汙地案晉書地理志頓丘縣屬頓邱郡又案酈道元水經河水元注引杜説作澶淵在頓丘縣南今名繁淵二十六年茅氏闕圉闕西鄙懿氏戚城西北有懿氏城羊角東郡廩丘縣所治羊角城案晉書地理志晉初分東郡置濮陽國廪丘縣屬濮陽又滑州東南有羊角故城案隋書地理志東郡下云開皇九年置把州十六年改為滑州則滑州隋置此條又滑州以下非杜氏本文謹訂于此昭十三年平丘陳留長垣縣西南平丘城二十年平夀闕死鳥闕定四年武父傳曰封畛土略自武父以南則武父衛之北境也非河南武父其地闕無處也有閻之土闕相土之東都闕六年豚澤闕七年沙璅二名陽平元城縣東南有沙亭八年瓦東郡燕縣東北有瓦亭案續漢書郡國志燕縣屬東郡考晉書地理志故漢東郡地分屬濮陽國及陽平頓丘諸郡無東郡亦無燕縣曲濮闕鄟澤闕十三年垂葭郹氏二名髙平巨野縣西南有郹亭十四年牽脾上梁之間二名魏郡黎陽縣東北有牽城盂闕哀二年鐡戚城南有鐵丘十一年犂闕外州闕巢闕鄖闕少禘闕十六年平陽東郡燕縣東北有平陽亭十七年藉圃闕二十五年彭闕泠闕城鉏外里二名闕二十六年平莊之上闕春秋釋例卷五
