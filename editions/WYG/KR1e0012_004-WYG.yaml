body:
  text: 春秋釋例卷四晉杜預撰執大夫行人例第二十六案此篇見永樂大典惟篇目佚今補桓十一年秋云云九月宋人執鄭祭仲傳曰宋雍氏宗有寵于宋莊公故誘祭仲而執之曰不立突將死云云歸而立之秋九月丁亥昭公奔衛己亥厲公立莊十七年春齊人執鄭詹傳曰春齊人執鄭詹鄭不朝也僖四年夏云云齊人執陳轅濤塗傳曰陳轅濤塗謂鄭申侯曰師出于陳鄭之間國必甚病若出于東方觀兵于東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見云云齊侯説與之虎牢執轅濤塗秋伐陳討不忠也文十四年冬單伯如齊齊人執單伯齊人執子叔姬傳曰襄仲使告于王請以王寵求昭姬于齊冬單伯如齊請叔姬齊人執之又執子叔姬十五年夏云云單伯至自齊傳曰齊人許單伯請而赦之使來致命書曰單伯至自齊貴之也成十六年秋云云九月晉人執季孫行父舎之于苕丘傳曰宣伯使告郤犨云云晉人執季文子于苕丘公還待于鄆使子叔聲伯請季孫于晉云云乃許魯平赦季孫襄十一年秋云云楚人執鄭行人良霄傳曰鄭人使良霄太宰石􅎢如楚告將服于晉云云楚人執之書曰行人言使人也十八年夏晉人執衛行人石買十七年傳曰衛石買孫蒯伐曹取重丘曹人愬于晉十八年傳曰夏晉人執衛行人石買于長子執孫蒯于純留為曹故也二十六年秋云云晉人執衛甯喜傳曰六月公㑹晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田云云于是衛侯㑹之晉人執甯喜北宫遺使女齊以先歸昭八年夏四月云云楚人執陳行人干徵師殺之傳曰徵師赴于楚且告有立君公子勝訴之于楚楚人執而殺之云云書曰楚人執陳行人干徵師殺之罪不在行人也冬十月壬午楚師滅陳執陳公子招放之于越十一年冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之傳曰楚子滅蔡用隠太子于岡山申無宇曰不祥五牲不相為用況用諸侯乎十三年秋云云八月晉人執季孫意如以歸傳曰邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共以魯之故晉侯不見公云云公不與盟晉人執季孫意如云云以平子歸十四年春云云意如至自晉傳曰春意如至自晉尊晉罪已也尊晉罪已禮也二十三年春王正月云云晉人執我行人叔孫婼傳曰邾人城翼還將自離姑云云遂取邾師獲鉏弱地邾人愬于晉晉人來討叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也二十四年春王二月云云婼至自晉傳曰婼至自晉尊晉也定元年春王三月晉人執宋仲幾于京師傳曰晉魏舒合諸侯之大夫于狄泉將以城成周云云宋仲幾不受功云云乃執仲幾以歸三月歸諸京師六年秋晉人執宋行人樂祁犂傳曰宋樂祈言于景公曰諸侯惟我事晉今使不往晉其憾矣云云公謂樂祁曰唯寡人説子之言子必往云云趙簡子逆而飲之酒于緜上獻楊楯六十于簡子云云范獻子言于晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁七年秋云云齊人執衛行人北宫結以侵衛傳曰齊侯鄭伯盟于鹹徵㑹于衛衛侯欲叛晉諸大夫不可使北宫結如齊而私于齊侯曰執結以侵我齊侯從之昭四年秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之傳曰楚子以諸侯伐呉云云使屈申圍朱方八月甲申克之執齊慶封而盡滅其族云云使言曰無或如齊慶封弑其君弱其孤以盟其大夫右執大夫行人及叔姬并書至凡二十釋例曰古之諸侯享頫聘問相繫于時所以抒人情蠲煩惑合嘉好也及作征伐㑹盟軍之所興兵之所加各有本志志于懲治不軌伐叛柔服而已使以行人言之言之以接事案此二句襄十一年正義引釋例作使以行言言以接事信令之要于是乎在舉不以怒則刑不濫刑不濫則兩國之情得通兵有不交而解者皆行人之勲也是以雖飛矢在上走驛在下及其末節不統大理更遷怒肆忿快意于行人譬諸豺狼求食而已傳曰鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也故夫子特顯行人之例案例字襄十一年正義引釋例作文行人有六而發𫝊有三者因良霄以顯其稱行人之事因干徵師以示其非罪因魯叔孫婼以同外内大夫則餘三人皆隨例而為義也諸以行人為名通及外内以卿出使義取于非其罪也若濤塗甯喜之類案類字襄十一年正義引釋例作屬罪在其身鄭叔詹魯行父之等以執政受罪本非出使故不稱行人從實而書皆以罪之也案杜預集解云齊桓始伯鄭既伐宋又不朝齊詹為鄭執政大臣詣齊見執不稱行人罪之也孔穎達正義云劉炫以注云詣齊見執釋例云詹本非出使謂其自相矛盾今攷齊不朝而責于鄭鄭令詹詣齊謝罪齊人執之故釋例云原非出聘之使與集解文異事同劉炫不尋此義乃為規過非也鄭祭仲之如宋也非㑹非聘與于見誘而以行人應命不能死節挾偽以篡其君故經不稱行人以罪之也伯仲叔季固人字之常然古今亦有以為名者而公羊守株專謂祭氏以仲為字既謂之字無辭可以善之因託以行權人臣而善其行權逐君是亂人倫壞大教也説左氏者知其不可更云鄭人嘉之以字告故書字此為因有告命之例欲以苟免未是春秋之實也宰渠伯紏蕭叔大心皆以伯叔為名然則仲亦名也傳又云祭仲足或偏稱仲案此句永樂大典無之從桓五年正義所引釋例増入或偏稱足葢名仲字仲足也單伯天子之卿也為我如齊故書其行齊人無禮逆執王使并及叔姬是以季文子如晉求助晉無救䘏之實而單伯能敷宣王命以免于執叔姬見釋遂還致命皆單伯之力故魯人嘉之而告廟傳曰書曰單伯至自齊貴之也又曰齊人來歸子叔姬王故也此皆歸功單伯明晉無令政也意如至自晉𫝊言尊晉罪己也婼至自晉傳復重發但言尊晉意如以罪見執宜在罪己婼本者使人不應見執故尊晉而已内大夫行還皆不書至異于公也今此二人執而見釋更以書至見義也晉在王城執仲幾不即歸之天子而送歸于國後乃致之王所故但書其執而不書其歸言失節也慶封得罪于齊絶位奔呉呉與之朱方為呉大夫今見殺而經書齊者楚人以齊罪殺之故告以齊明此慶封非異人也賈氏以為書執行父舎于苕丘言失其所不書至者刺晉聽讒執之示已無罪也按傳曰囚之苕丘以别晉都無義例也公待于鄆與行父俱歸從于公故不書行父入至也案從于公二句成十六年正義引釋例作厭于公尊故不書行父至耳若欲示無罪則宜于執見義今既直書其執處更絶不書至乃所以示不終于見執非示無罪也書諡例第二十七案此篇永樂大典全闕釋例曰諡者興于周之始王變質從文于是有諱焉傳曰周人以諱事神名終將諱之故易之以諡末世滋蔓降及匹夫爰暨婦人婦人無外行于禮當繫夫之諡以明所屬詩稱莊姜宣姜即其義也隠元年正義引釋例諡法云隠拂不成曰隠吕祖謙春秋集解引釋例書叛例第二十八案此篇永樂大典全闕釋例曰古之大夫或錫之田邑或分之都城故有千室之邑百乘之家君之禄義則進否則奉身以退若專禄以周旋雖無危國害主之實皆書曰叛叛者反背之辭也庶賤之人不齒于列雖有善惡不章顯名氏若乃披邑害國則以地重以書其名且終顯其惡也適魯則書地曰來奔來奔則叛可知葢記事外内之辭也劉賈説三叛人以地來奔不書叛謂不能專也此直外内之辭既以地來妻公之姑姊還其大邑不得復言不能專也襄二十六年正義引釋例齊侯鄭伯詐朝于紀欲以襲之紀人大懼而謀難于魯請王命以求成于齊公告不能齊遂偪之遷其三邑國有旦夕之危而不能自入為附庸故分季以酅使請事于齊大去之後季為附庸先祀不廢社稷有奉季之力也故書字不書名書入不書叛也叛分也傳曰始分為紀侯大去張本也劉賈謂紀季以酅奔齊不言叛不能專酅也𫝊稱紀侯不能下齊以與紀季季非叛也紀亡之後叔姬歸于酅明為附庸猶得專酅故可歸也莊三年正義引釋例書次例第二十九案此篇見永樂大典惟篇目佚今補釋例曰凡師一宿為舎再宿為信過信為次此周公之典以詳録師出入行止遲速因為之名也兵事尚速老師費財不可以久故春秋以告命三日以上必告其次舎之與信不書者輕碎不以告也兵未有所加所次則書之以示遲速公次于滑師次于郎是也既書兵所加則不書其所次以事為宜非虚次諸久兵而不書次是也既書兵所加而又書次者案句首既書兵三字永樂大典脱從莊三年正義所引釋例増義有取于次案此句永樂大典作義有所次從莊三年正義所引釋例改正遂伐楚次于陘盟于牡丘遂次于匡是也所紀或次在事前次以成事也或次在事後事成而次也皆隨事實無義例也案莊三年正義云杜言既書兵所加則不書其次者或伐或戰曠日持久其間必有三日之次既書戰伐則不書次雖次在事前次在事後皆不書也既書兵所加而又書次者義有取于次齊侯伐楚楚彊齊欲綏之以徳故不速進而次于陘盟于牡丘本為救徐各使大夫救徐次匡以為之援義取于次故書兵所加而又書其次次在事前謂僖元年齊師宋師曹師次于聶北救邢也次在事後謂襄二十三年叔孫豹帥師救晉次于雍榆也聶北之下公羊傳曰曷為先言次而後言救君也雍榆之下公羊傳曰曷為先言救而後言次先通君命也左傳先儒取彼為説言齊桓君也進止自由故先次後救叔孫臣也先通君命故先救後次杜以傳無此言故改正其謬言此二事或次以成事或事成而次皆隨事實先後而書之無義例也楚子蔡侯次于厥貉宋公鄭伯陳侯麇子不書于經者陳鄭自息而從楚子宋公勢卑以苟免在列鄭伯為楚僕任受令于司馬麇子恥之遂逃師而歸三君失位降爵故不列諸侯宋鄭猶然則陳侯必同也叔孫豹救晉次于雍榆傳曰禮者善其宗助盟主非以次為禮也齊桓次于聶北救邢亦以存邢具其器用而還師人無私見善不在次也而賈氏皆即以為善次次之與否自是臨時用兵之宜非禮之所素制也若魯公次于乾侯之比非為用師不應在例而復例之亦為濫也遷降例第三十案此篇見永樂大典惟篇目佚今補釋例曰邢遷于夷儀則以自遷為文宋人遷宿齊人遷陽則以宋齊為文各從彼此所遷之實記注之常辭亦非例也劉賈依二傳以為鄣紀之遺邑計紀侯去國至此二十七年紀侯猶不堪齊而去則邑不得獨存此葢附庸小國若邿鄟者也案自劉賈依二傳以下永樂大典無之從莊三十年正義所引釋例増須句子魯之私屬若顓臾之比魯謂之社稷之臣故來奔及反不書于經賈氏云但因成風來不見公亦未安以歸例第三十一案此篇永樂大典全闕釋例曰據宗廟社稷已亡而君見獲于敵君身雖在與亡無異皆以滅為文則定六年鄭游速帥師滅許以許男斯歸是也若社稷宗廟不亡君身見獲于敵則云以歸以蔡侯獻舞歸是也莊十年正義引釋例夫人内女歸寧例第三十二案此篇見永樂大典其篇目亦存莊十二年春王三月紀叔姬歸于酅二十七年冬把伯姬來傳曰把伯姬來歸寧也𫝊例曰凡諸侯之女歸寧曰來出曰來歸夫人歸寧曰如某出曰歸于某僖十四年夏六月季姬及鄫子遇于防使鄫子來朝傳曰鄫季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝十五年秋九月云云季姬歸于鄫二十八年秋把伯姬來文九年春云云夫人姜氏如齊三月夫人姜氏至自齊十五年冬云云十有二月齊人來歸子叔姬傳曰齊人來歸子叔姬王故也十八年冬十月云云夫人姜氏歸于齊傳曰夫人姜氏歸于齊大歸也宣五年冬齊髙固及子叔姬來傳曰冬來反馬也十六年秋郯伯姬來歸傳曰秋郯伯姬來歸出也成五年春王正月把叔姬來歸右夫人内女歸寧出凡十一桓十八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊傳曰春公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗莊二年冬十有二月夫人姜氏㑹齊侯于禚傳曰冬夫人姜氏㑹齊侯于禚書姦也七年春夫人姜氏㑹齊侯于防傳曰春文姜㑹齊侯于防齊志也僖十七年秋夫人姜氏㑹齊侯于卞傳曰秋聲姜以公故㑹齊侯于卞右夫人行十一錯綜其四以包通之釋例曰歸寧者女子既嫁有時而歸問父母之寧否父母殁則使卿歸問兄弟也出者謂犯七出而見絶者也歸者有所往之稱來者有所反之言也故嫁謂之歸而寧謂之來見絶而出則以來歸為辭來而不返也如某者非終安之稱歸于某者亦不反之辭也叔姬以娣而適紀紀侯大去其國而死叔姬歸于魯紀季自定于齊姬得歸酅全守節義以終婦道故繫之于紀而以初嫁為文賢之也不書其來既非常寧又非大歸也鄫姬季以禮來寧公怒而絶之故亦不書來寧遂留之至明年九月乃遣故更書歸明前年已絶于鄫也齊人執子叔姬魯請于王而後齊人送之故與直出者異文禮送女謙不敢自安留其所送之馬三月廟見而後夫家遣使返其馬今髙固因返馬禮遂與子叔姬俱寧情近于瀆故經并書其來而𫝊見返馬以示譏也婦人無外事見兄弟不踰閾故其他行非禮所及亦例所不存而當時實有出入或以事宜或以淫縱小君之行不得不書故直書其行而其善惡各繫于本㑹于禚𫝊稱書姦夫人入齊地也㑹于防𫝊稱齊侯志齊侯入魯地也案齊侯二字永樂大典脱從莊七年正義所引釋例増于經無例𫝊以實言也凡内女見經而不書歸者時史之闕漏而賈氏皆以為適世子故也按把桓公以僖二十三年即位襄六年卒凡在位七十一年文成之世經書叔姬二人一人卒一人出皆把桓公夫人也而經皆不書歸知雖正夫人歸或亦有所不載非唯適世子也凡八百六十六字經傳三百九十四字釋例四百七十二字案經傳實三百八十九字釋例實四百八十字共八百六十九字大夫奔例第三十三案此篇見永樂大典其篇目亦存文八年冬云云宋司城來奔傳曰宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫云云司城蕩意諸來奔效節于府人而出公以其官逆之皆復之亦書以官皆貴之也十四年秋云云九月云云宋子哀來奔傳曰宋髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來奔貴之也宣十年夏四月云云齊崔氏出奔衛傳曰崔杼有寵于惠公髙國畏其偪也公卒而逐之奔衛書曰崔氏非其罪也且告以族不以名𫝊例曰凡諸侯之大夫違告于諸侯曰某氏之守臣某失守宗廟敢告所有玉帛之使者則告不然則否十八年冬十月云云歸父還自晉至笙遂奔齊傳曰公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季文子云云遂逐東門氏子家還及笙壇帷復命于介既復命袒括髪即位哭三踊而出遂奔齊書曰歸父還自晉善之也成十二年春周公出奔晉十一年傳曰周公楚惡惠襄之偪也且與伯與爭政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉十二年傳曰春王使以周公之難來告書曰周公出奔晉𫝊例曰凡自周無出周公自出故也襄二十年秋云云陳侯之弟黄出奔楚傳曰陳慶虎慶寅畏公子黄之偪愬諸楚曰與蔡司馬同謀楚人以為討云云書曰陳侯之弟黄出奔楚言非其罪也二十九年秋九月云云齊髙止出奔北燕傳曰秋九月齊公孫蠆公孫竈放其大夫髙止于北燕乙未出書曰出奔罪髙止也髙止好以事自為功且專故難及之昭元年夏秦伯之弟鍼出奔晉傳曰秦后子有寵于桓如二君于景其母曰不去懼選癸夘鍼適晉其車千乘書曰秦伯之弟鍼出奔晉罪秦伯也二十年夏曹公孫㑹自鄸出奔宋釋例曰奔者迫窘而去逃死四隣不以禮出也放者受罪黜免宥之以逺也臣之事君三諫不從有待放之禮案放者以下二十四字永樂大典脱佚從宣元年正義所引釋例補人故傳曰義則進否則奉身以退迫窘而出奔及以禮見放俱去其國故𫝊通以違為文仲尼修春秋又以所稱為優劣也懷寵之人皆身及禍難唯子哀不義宋公先機而發是以貴而書字也若乃稱司城以貴效節于府人書歸父之還以善復命于介因齊人告辭以著崔氏之無罪葢隨事以示褒貶也𫝊既云書曰崔氏以明非罪復云且告以族不以名知典策之書舊當以名通也齊國雖謬以族告適合仲尼新襃貶之實因而不革以示無罪且明春秋之作或因仍舊史成文不必皆有改也夫立功立事者國之厚益而身之表的也表髙的明雖女人猶欲彎弓案女人襄二十九年正義引釋例作婦人而況當塗之士是以君子慎之道家貴善行者無轍跡功遂而身退髙止既犯其始又專以終之免死為幸斯乃賢聖之篤戒故變放言奔文致其罪以示過曹公孫㑹雖小國之卿當有玉帛之使于魯曹人以告而書也陳公子黄偪而出奔既稱弟以明無罪故不復變本告之名賈氏以為稱名以貶陳黄之偪是不復顧有非罪之文一黄之身或罪或否也逃潰例第三十四案此篇見永樂大典惟篇目佚今補莊十七年秋鄭詹自齊逃來僖五年秋八月云云鄭伯逃歸不盟傳曰王使周公召鄭伯曰吾撫汝以從楚輔之以晉可以少安鄭伯喜于王命而懼其不朝于齊也故逃歸不盟孔叔止之云云弗聽逃其師而歸襄七年冬云云十有二月云云陳侯逃歸傳曰二慶使告陳侯于㑹曰楚人執公子黄矣君若不來羣臣不忍宗廟社稷懼有二圖陳侯逃歸僖四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰傳曰秋齊侯以諸侯之師侵蔡蔡潰遂伐楚成九年冬十有一月楚公子嬰齊帥師伐莒庚申莒潰傳曰冬十一月楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒云云楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也豫備不虞善之大者也釋例曰傳曰衆保于城城保于徳言上能以徳附衆以功庇下民信其徳恃其固故能交相依懷以衛社稷苟無固志盈城之衆一朝而散如積水之敗故曰潰潰者衆敗流遁之辭也國君而逃師棄盟違其典儀棄其車服羣臣不知其謀社稷不保其安此與匹夫逃竄無異是以在衆為潰在君為逃案僖五年正義引釋例此句作在上曰逃以别上下之名無取于别國邑也賈穎以為舉國曰潰一邑曰叛案左氏無此義也𫝊文廧咎如潰上失民也今經但言伐廧咎如無廧咎潰之文若經本無此文則丘明為横益經文而加失民之𫝊也案𫝊文以下四十五字永樂大典闕佚從成三年正義所引釋例増傳曰陳侯如楚慶氏以陳叛此則舉國不必言潰也叛者舉城而屬他非民潰之謂也例之潰逃指謂一國一軍一邑君民相須為用變文以别之也鄭詹見囚于齊自齊逃來此為逸囚無下可逃春秋指事而書所謂民逃非在上之逃也而賈氏復申以入例亦不安也殺世子大夫例第三十五案此篇永樂大典全闕釋例曰古者討殺其大夫各以罪狀宣告諸侯所以懲不義重刑戮也晉侯使以殺太子申生之故來告衛殺孔達𫝊載其辭辭雖有臨時之狀其告則常也莊二十二年正義引釋例晉魯久不交使而告殺申生則所告不必嘗有玉帛之使但欲廣聲其罪耳僖五年正義引釋例魯哀之可諫者甚衆未聞仲尼之苦言至于陳恒弑其君孔子沐浴而朝告于哀公求討不義顯事施舎足以致益者固人臣之所當造膝也若乃情色之惑君不能得之于臣父不能得之于子臣子而欲顯直于其君父適所以益謗而致罪也陳靈公宣淫悖徳亂倫志同禽獸非盡言所救􅂥冶進無匡濟逺策退不危行言孫安昬亂之朝慕匹夫之直忘蘧氏可卷之徳死而無益故經同罪賤之文𫝊特稱仲尼以明之忠為令徳非其人猶不可況不令乎此其義也宣九年正義引釋例陳之叛楚罪在子辛共王既不能明法示教以肅大臣陳叛之日又不能嚴㫁威刑以謝小國而擁其罪人以興兵致討暴師經年加禮于陳陳恨彌篤乃愠而歸罪子辛子辛之貪雖足以取死然共王用刑為失其節故君子論之以為不刑也襄五年正義引釋例大臣相殺死者無罪則兩稱名字以示殺者之罪王札子殺召伯毛伯是也若死者有罪則不稱殺者名氏晉殺其大夫陽處父是也若為賊者衆因亂而殺則亦稱國人殺者主名不分故也主名不分死者雖名氏可知亦隨而去之嫌于罪死者也士殺大夫則書曰盜盜殺鄭公子騑公子發公孫轍是也文七年正義引釋例作新門廐例第三十六案此篇永樂大典全闕其篇目則見敬鉉續明三傳例説略釋例曰門戸道橋城郭墻塹官民之開閉不可一日闕者也故特隨壊時而修之皆當其時而訖不必用土功之常時也故𫝊既曰書不時又曰啓塞從時重發以明二義其他急事亦包之也僖二十年正義引釋例春秋分而晝夜等謂之日中凡馬春分百草始繁則牧于坰野秋分農功始藏水寒草枯則皆還廐此周典之制也今春而作廐已失民務又違馬節故曰書不時也言新意所起言作以興事通謂興起功役之事也總而言之不復分别因舊與造新也經書延廐稱新而不言作𫝊言新作延廐書不時也此稱經文而以不時為譏義不在作也然尋𫝊足以知經闕作字也而劉賈云言新有故木言作有新木延廐不書作所用之木非公命也凡諸興造固當有新固當有因今謂春秋㣲意直記别此門此觀有新木故木既已鄙近且材木者立廐之具也公命立廐則衆用皆隨之矣焉有所用之木非公命也此為匠人受命立廐而盜供其用豈然乎哉莊二十九年正義引釋例作主禘例第三十七案此篇見永樂大典惟篇目佚今從敬鉉續明三傳例説略補僖八年秋七月禘于太廟用致夫人傳曰秋禘而致哀姜焉非禮也𫝊例曰凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也文二年秋云云八月丁卯大事于太廟躋僖公傳曰秋八月丁卯大事于太廟躋僖公逆祀也宣八年夏六月云云辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥傳曰有事于太廟襄仲卒而繹非禮也釋例曰凡君薨卒哭而祔祔而作主特祀于主烝嘗禘于廟此諸侯之禮故稱君君既𦵏反虞則免喪故曰卒哭卒止也以新死者之神祔之于祖尸柩既已逺矣神形又不可得而見矣孝子之思彌篤徬徨求索不知所至故造木主立几筵特用喪禮祭祀于寢不同之于宗廟宗廟則復用四時烝嘗之禮也三年喪畢致新死者之主以進于廟廟之逺主當遷入祧于是乃大祭于太廟以審定昭穆謂之禘此皆自諸侯上達天子之制也莊公喪未闋閔公吉禘故傳曰速也哀姜以罪受戮不薨于寢淫而與弑故疑其禮八年乃致之也于例既不應加吉禘之禮也已過用致夫人言以此夫人與致禮也文公二年僖公之喪未終未應行吉禘之禮而于太廟行之其譏已明徒以躋僖而退閔公故特大其事而異其文定八年亦特書順祀皆所以起非常也有事于武宫及順祀𫝊皆稱禘則知大事有事于太廟亦禘也禘于太廟禮之常也各于其宫時之為也雖非三年大祭而書禘用禘禮也昭二十五年傳曰將禘于襄公亦其義也三年之禘自國之常常事不書故惟書此數事祭雖得常亦紀仲遂叔弓之非常也今推厯僖以十一月薨則文元年三月于禮應𦵏今四月乃𦵏通計閏為七月故為緩又禮𦵏訖當卒哭作主而至三年乃作主故二年經書作僖公主傳曰書不時也以此推之𫝊發𦵏僖公之緩又云作主非禮因開明凡例當繼于文元年𦵏僖公之經也既議𦵏緩又重之以作主非禮明作主當在訖𦵏故連譏之也今𫝊見于僖公之末年殆簡編之錯繆以失其次非丘明之正也舊説以為諸侯喪三年之後乃烝嘗按𫝊襄公十五年冬十一月晉侯周卒十六年春𦵏晉悼公改服修官烝于曲沃㑹于溴梁其冬穆叔如晉且言齊故晉人答以寡君之未禘祀其後晉人徵朝于鄭鄭公孫僑曰溴梁之明年公孫夏從寡君以朝于君見于嘗酎與執膰焉此皆春秋之明證也舊説或以為經所書禘皆夏祭之名非三年之禘魯周公之故也周家祭于夏則曰礿無縁兼取殷家祭名也且按其月又非時祭之月益可知也凡三年喪畢然後禘案僖三十三年正義引釋例然後作而後於是遂以三年為常節當仍計除喪即吉之月卜日而後行事故無復常月也是以經書禘及大事𫝊唯見禘莊公之速他無非時之譏也賈氏以為僖公始不順祀生則致哀姜終則小寢以慢典常故其子文公縁事生邪志作主陵遲于是文公復有夫人歸嗣子罹咎原注或作名字𫝊故上繫此文于僖公篇迂哉得獲例第三十八案此篇見永樂大典惟篇目佚今補定九年夏云云得寳玉大弓傳曰夏陽虎歸寳玉大弓書曰得得器用也𫝊例曰凡獲器用曰得得用曰獲僖元年冬十月壬午公子友帥師敗莒師于酈獲莒拏傳曰冬莒人來求賂公子友敗諸酈獲莒子之弟拏非卿也嘉獲之也十五年冬云云十一月壬戌晉侯及秦伯戰於韓獲晉侯傳曰晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子云云許賂中大夫既而皆背之賂秦伯以河外列城五云云既而皆不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉云云秦獲晉侯以歸宣二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗續獲宋華元傳曰宋師敗績囚華元獲樂吕襄八年夏云云鄭人侵蔡獲蔡公子爕傳曰庚寅鄭子國子耳侵蔡獲蔡司馬公子燮昭二十三年秋七月云云戊辰呉敗頓胡沈蔡陳許之師於雞父胡子髠沈子逞滅獲陳夏齧傳曰呉子以罪人三千先犯胡沈與陳獲胡沈之君及陳大夫云云書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也哀十一年夏云云五月云云公㑹吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書傳曰大敗齊師獲國書十四年春西狩獲麟傳曰春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之釋例曰獲得也得亦獲也實同而文異故假其異文以别事器用亦于人可為人用者得用焉曰獲謂用諸物以有所獲也又繫于器用曰獲則凡以器而獲皆在用例敵國交兵亦有兵器之獲欲殊别君臣故於君曰滅於臣曰獲國君者社稷之主百姓之望當與社稷宗廟共其存亡者也而見獲于敵國雖存若亡死之與生皆與滅同至于偏軍元帥君之臣僕出身致命榮辱得失自其常事故傳曰胡子髠沈子逞滅獲陳夏齧君臣之辭也諸以戰傷死雖敗績而不見禽故經皆不曰滅也晉侯背施無親愎諫違卜宜在貶絶故不齒君列下從衆臣之名同曰獲也華元在經書獲而在𫝊稱囚國書見獲于呉傳云歸其元此稱獲通死生之文也西狩獲麟亦是田狩之獲獲例無來儀之文而賈穎曰書稱鳳凰來儀今麟不言來非外麟也春秋據其得不見其來故但曰獲若必以内外為義則虞舜奚獨外鳳乎執諸侯例第三十九案此篇見永樂大典其篇目亦存僖五年冬晉人執虞公傳曰晉侯復假道于虞以伐虢云云師還館于虞遂襲虞滅之執虞公及其大夫井伯云云故書曰晉人執虞公罪虞且言易也十九年春王三月宋人執滕子嬰齊夏六月云云己酉邾人執鄫子用之傳曰夏宋公使邾文公用鄫子于次睢之社欲以屬東夷司馬子魚曰云云今一㑹而虐二國之君又用諸淫昬之鬼將以求覇不亦難乎得死為幸二十一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋冬云云十有二月癸丑公㑹諸侯盟于薄釋宋公傳曰春宋人為鹿上之盟以求諸侯于楚楚人許之云云秋諸侯㑹宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之于是楚執宋公以伐宋冬㑹于薄以釋之二十八年春云云二月丙午晉侯執曹伯畀宋人傳曰晉侯圍曹丙午入曹數之以其不用僖負覉而乘軒者三百人也且曰獻狀云云執曹伯而分曹衛之田以畀宋人冬云云晉人執衛侯歸之于京師傳曰衛侯與元咺訟云云衛侯不勝云云執衛侯歸之于京師寘諸深室成九年秋七月云云晉人執鄭伯傳曰秋鄭伯如晉晉人討其貳于楚也執諸銅鞮十五年春王二月云云晉人執曹伯歸于京師十三年傳曰秋負芻殺其太子而自立也諸侯乃請討之晉人以其役之勞請俟他年十五年傳曰春㑹于戚討曹成公執而歸諸京師書曰晉侯執曹伯不及其民也𫝊例曰凡君不道于其民諸侯討而執之則曰某人執某侯不然則否襄十六年春云云二月云云晉人執莒子邾子以歸傳曰春云云㑹于溴梁命歸侵田以我故執邾宣公莒犁比公且曰通齊楚之使十九年春王正月云云晉人執邾子傳曰盟于督揚曰大母侵小執邾悼公以其伐我故昭四年夏云云楚人執徐子傳曰六月丙午楚子合諸侯于申云云徐子呉出也以為貳焉故執諸申哀四年春王二月云云宋人執小邾子夏云云晉人執戎蠻子赤歸于楚傳曰單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒云云士蔑請諸趙孟趙孟曰晉國未寧安能惡于楚必速與之士蔑乃致九州之戎將裂田以與蠻子而城之且將為之卜蠻子聽卜遂執之與其五大夫以畀楚師于三戸釋例曰諸侯不道于其民諸侯討而執之則曰某人執某諸侯見執者以身在罪賤之地書名與否非例所加故但言執某侯也天生蒸民而樹之君使司牧之勿使失性若乃肆惡于民上人懐怨讟案怨讟成十五年正義引釋例作怨讎諸侯致討則稱某人執某侯衆討之文也不然則否謂諸侯雖身犯不義而惡不及民則不稱人以執之晉人執曹伯是也虞公昧于貨賄貪以自亡國非其國臣非其臣晉人取之若執一夫故稱人以執而不言晉滅罪虞且言易也凡諸侯無加民之惡而稱人以執皆時之赴告欲重其罪以加民為辭國史承之以書之于䇿而簡牘之記具存夫子因示虛實故左傳隨實而著其本末以明其得失也案此二句僖十九年正義引釋例作故𫝊隨而著其本狀以明得失也滕子鄫子皆稱人見執宋欲重二國之罪故以不道見赴或名或不名從所告之文也案昭十六年正義引釋例所告作所赴𫝊具載子魚之辭以虐二國之君見義明非罪也宋襄志于好古貪于為善而不知其節先為鹿上之㑹見其易而不慮其難遂有覇心召諸侯于是諸侯與之好㑹因執以伐宋不稱人以執者罪不加民也不稱國者總見衆國諸侯同志也𫝊稱楚執宋公以伐宋者言宋公所因亡也晉許執戎蠻子以送于是深恥諱之故稱人以告欲云蠻子無道于民執諸侯當歸于京師而或以歸或歸于諸侯皆失其所從實而顯之義可知也喪稱例第四十案此篇永樂大典全闕其篇目則見本書第二篇㑹盟朝聘例釋例曰父雖未𦵏喪服在身踰年則于其國内即位稱君伐鄭之役宋公衛侯是也春秋書魯事皆踰年即位稱公不可曠年無君則知他國亦同然據文未𦵏于其國内雖得伸其尊若以接鄰國則違禮失制也恒十三年正義引釋例位彌髙者事彌重重慮周於經逺故義制異于凡人存其實篤其志足以叙親疎之情通萬事之理而已故諸列國之君在喪或不得已而修㑹盟之事唯公侯特稱子以别尊卑僖九年正義引釋例衛文公欲平莒于魯未終而薨故衛子尋父之志魯人由此亦修文公之好此孝子之至感而人情之所篤故成公雖已免喪至于此盟㑹降從在喪自名猶武王伐紂稱太子發故經隨而書子𫝊從而釋之曰修文公之好也僖二十五年正義引釋例厲公見殺悼公自外紹立本非君臣無喪制也成十八年正義引釋例告朔例第四十一案此篇永樂大典全闕釋例曰人君者設官分職以為民極逺細事以全委任之責從諸下以盡知力之用總成敗以效能否執八柄以明誅賞故自非機事皆委心焉誠信足以相感事實盡而不擁故受位居職者思效忠善日夜自進而無所顧忌也天下之細事無數一日二日萬端人君之明有所不照人君之力有所不堪則不得不借問近習有時而用之如此則六鄉六遂之長雖躬履此事躬造此官當皆移聽于内官迴心于左右政之粃亂恒必由此聖人知其不可故簡其節敬其事因月朔朝廟遷坐正位㑹吏而聽大政攷其所行而決其煩疑非徒議將然也乃所以攷已然又惡其密聽之亂公也故顯衆以㫁之是以上下交泰官人以理萬民以察天下以治也文公謂閏非常月縁以闕禮𫝊因所闕而明言典制雖朝于廟則如勿朝故經稱猶朝于廟也經稱告月𫝊言告朔明告月必以朔也毎月之朔必朝于廟因聽政事事敬而禮成故告以特羊然則朝廟正告朔視朔皆同日之事所從言之異耳文六年正義引釋例戕殺例第四十二案此篇永樂大典全闕釋例曰列國之君而受害于臣子其所由來者積㣲而起所以相測量非一朝一夕之漸故改殺為弑戕者卒暴之名有國之君當重門設險而輕近暴客變起倉卒亦因事而見戒也臣弑其君子弑其父世之惡逆君子難言故春秋謂自内虐其君者通以弑為文也春秋弑君多矣其戕惟此一事自弑其君足明無道臣罪之例戕者外人所殺為無防被害皆是君自招之縱使君或無道其惡不加外國不得從弑君之例也若戰死則書滅此謂在國見殺耳宣十八年正義引釋例蔡侯般弑父自立楚子欲顯刑誅以章伯業誘而殺之蔡人深怨故稱名以告春秋從而書之成十六年正義引釋例春秋釋例卷四
