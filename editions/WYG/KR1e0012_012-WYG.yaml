  text: 春秋釋例巻十二晉杜預撰經傳長厯第四十六之三僖公元年正月乙巳小二月甲戌大三月甲辰小四月癸酉大五月癸卯小六月壬申大七月壬寅小八月辛未大九月辛丑小十月庚午大十一月庚子大閏十一月庚午小十二月己亥大七月戊辰二十七日十月壬午十三日十一月丁巳十九日僖公二年正月己巳小二月戊戌大三月戊辰小四月丁酉大五月丁卯小六月丙申大七月丙寅小八月乙未大九月乙丑小十月甲午大十一月甲子小十二月癸巳大五月辛巳十五日僖公三年正月癸亥小二月壬辰大三月壬戌小四月辛卯大五月辛酉小六月庚寅大七月庚申大八月庚寅小九月己未大十月己丑小十一月戊午大十二月戊子小僖公四年正月丁巳大二月丁亥小三月丙辰大四月丙戌小五月乙卯大六月乙酉小七月甲寅大八月甲申小九月癸丑大十月癸未小十一月壬子大十二月壬午小十二月戊申二十七日僖公五年正月辛亥大二月辛巳大三月辛亥小四月庚辰大五月庚戌小六月己卯大七月己酉小八月戊寅大九月戊申小十月丁丑大十一月丁未小十二月丙子大閏十二月丙午小正月辛亥朔日南至一日案孔頴達正義云冬至者十一月之中氣中氣者月半之氣也月朔而已得中氣是必前月閏閏前之月則中氣在晦閏後之月則中氣在朔閏者聚殘餘分之月其中無中氣半屬前月半屬後月是去年當閏十二月十六日已得此年正月朔大雪節故此正月朔得冬至也而杜長厯僖元年閏十一月此年閏十二月又閏之相去厯家大率三十三月耳杜於此閏相去凡五十月不與厯數同者杜推勘春秋日月上下置閏或稀或數自準春秋時法故不與常厯同八月甲午十七日九月戊申朔日食一日十二月丙子朔一日僖公六年正月乙亥大二月乙巳小三月甲戌大四月甲辰大五月甲戌小六月癸卯大七月癸酉小八月壬寅大九月壬申小十月辛丑大十一月辛未小十二月庚子大僖公七年正月庚午小二月己亥大三月己巳小四月戊戌大五月戊辰小六月丁酉大七月丁卯大八月丁酉小九月丙寅大十月丙申小十一月乙丑大傳閏十一月乙未小案左傳有閏月惠王崩之文故此條獨加傳字十二月甲子大僖公八年正月甲午小二月癸丑大三月癸巳小四月壬戌大五月壬辰小六月辛酉大七月辛卯小八月庚申大九月庚寅大十月庚申小十一月己丑大閏十一月己未小十二月戊子大十二月丁未二十二日僖公九年正月戊午小二月丁亥大三月丁巳小四月丙戌大五月丙辰小六月乙酉大七月乙卯小八月甲申大九月甲寅小十月癸未大十一月癸丑大十二月癸未小三月丁丑二十一日七月乙酉七月無乙酉八月二日也日月必有誤九月戊辰十五日甲子十一日僖公十年正月壬子大二月壬午小三月辛亥大四月辛巳小五月庚戌大六月庚辰小七月己酉大八月己卯小九月戊申大十月戊寅小十一月丁未大十二月丁丑小僖公十一年正月丙午大二月丙子大三月丙午小四月乙亥大五月乙巳小六月甲戌大七月甲辰小八月癸酉大九月癸卯小十月壬申大十一月壬寅小十二月辛未大僖公十二年正月辛丑小二月庚午大閏二月庚子大三月庚午小四月己亥大五月己巳小六月戊戌大七月戊辰小八月丁酉大九月丁卯小十月丙申大十一月丙寅小十二月乙未大三月庚午日食一日十二月丁丑十一月十二日也書於十二月從赴也僖公十三年正月乙丑小二月甲午大三月甲子小四月癸巳大五月癸亥大六月癸巳小七月壬戌大八月壬辰小九月辛酉大十月辛卯小十一月庚申大十二月庚寅小僖公十四年正月己未大二月己丑小三月戊午大四月戊子小五月丁巳大六月丁亥小七月丙辰大八月丙戌大九月丙辰小十月乙酉大十一月乙卯小十二月甲申大八月辛卯六日僖公十五年正月甲寅小二月癸未大三月癸丑小四月壬午大五月壬子小六月辛巳大七月辛亥小八月庚辰大九月庚戌大十月庚辰小十一月己酉大十二月己卯小經五月日有食之傳曰不書朔與日官失之也九月壬戌十三日己卯晦三十日案孔穎達正義云公羊穀梁傳皆以晦為𠖇謂晝日暗𠖇也杜以長厯推己卯晦九月三十日春秋值朔書朔值晦書晦無義例也十一月壬戌十四日丁丑二十九日僖公十六年正月戊申大二月戊寅小三月丁未大四月丁丑小五月丙午大六月丙子小七月乙巳大八月乙亥小九月甲辰大十月甲戌小十一月癸卯大十二月癸酉小正月戊申朔一日三月壬申二十六日四月丙申二十日七月甲子二十日十一月乙卯十三日僖公十七年正月壬寅大二月壬申大三月壬寅小四月辛未大五月辛丑小六月庚午大七月庚子小八月己巳大九月己亥小十月戊辰大十一月戊戌小十二月丁卯大閏十二月丁酉小十月乙亥八日十二月乙亥九日辛巳十五日僖公十八年正月丙寅大二月丙申小三月乙丑大四月乙未小五月甲子大六月甲午大七月甲子小八月癸巳大九月癸亥小十月壬辰大十一月壬戌小十二月辛卯大五月戊寅十五日八月丁亥葬齊桓公經傳俱言八月無丁亥誤也僖公十九年正月辛酉小二月庚寅大三月庚申小四月己丑大五月己未小六月戊子大七月戊午小八月丁亥大九月丁巳小十月丙戌大十一月丙辰大十二月丙戌小六月己酉二十二日僖公二十年正月乙卯大二月乙酉小三月甲寅大閏三月甲申小案趙汸春秋屬辭引長厯僖二十年閏二月當是𫝊寫之訛四月癸丑大五月癸未小六月壬子大七月壬午小八月辛亥大九月辛巳小十月庚戌大十一月庚辰小十一月己酉大五月乙巳二十三日僖公二十一年正月己卯小二月戊申大三月戊寅大四月戊申小