月而云非常下句始言唯正月之朔有用幣伐鼓之禮明此經雖書六月實非六月故云非常鼓之月長厯推此辛未為七月之朔由置閏失所故誤使七月為六月也劉炫云知非五月朔者昭二十四年五月日有食之傳云日過分而未至此若是五月亦應云過分而未至也今言恩未作則是已作之辭故知非五月案二十四年八月丁丑夫人薑氏入從彼推之則六月辛未朔非有差錯杜云置閏失所者以二十四年八月以前誤置一閏非八月以來始錯也莊公二十六年正月戊戌大二月戊辰小三月丁酉大四月丁卯小五月丙申大六月丙寅小七月乙未大八月乙丑小九月甲午大十月甲子小十一月癸巳大十二月癸亥小十二月癸亥朔日食一日莊公二十七年正月壬辰大二月壬戌小三月辛卯大四月辛酉大五月辛卯小六月庚申大七月庚寅小八月己未大九月己丑小十月戊午大十一月戊子小十二月丁巳大莊公二十八年正月丁亥小二月丙辰大三月丙戌小閏三月乙卯大四月乙酉小五月甲寅大六月甲申小七月癸丑大八月癸未小九月壬子大十月壬午小十一月辛亥大十二月辛巳大三月甲寅二十九日四月丁未二十三日莊公二十九年正月辛亥小二月庚辰大三月庚戌小四月己卯大五月己酉小六月戊寅大七月戊申小八月丁丑大九月丁未小十月丙子大十一月丙午小十二月乙亥大莊公三十年正月乙巳小二月甲戌大閏二月甲辰小三月癸酉大四月癸卯小五月壬申大六月壬寅小七月辛未大八月辛丑小九月庚午大十月庚子大十一月庚午小十二月己亥大四月丙辰十四日八月癸亥二十三日九月庚午朔日食一日莊公三十一年正月己巳小二月戊戌大三月戊辰小四月丁酉大五月丁卯小六月丙申大七月丙寅小八月乙未大九月乙丑小十月甲午大十一月甲子小十二月癸巳大莊公三十二年正月癸亥小二月壬辰大三月壬戌小閏三月辛卯大四月辛酉小五月庚寅大六月庚申大七月庚寅小八月己未大九月己丑小十月戊午大十一月戊子小十二月丁巳大七月癸巳四日八月癸亥五日十月己未二日閔公元年正月丁亥小二月丙辰大三月丙戌小四月乙卯大五月乙酉小六月甲寅大七月甲申小八月癸丑大九月癸未小十月壬子大十一月壬午小十二月辛亥大六月辛酉八日閔公二年正月辛巳小二月庚戌大三月庚辰大四月庚戌小五月己卯大閏五月己酉小六月戊寅大七月戊申小八月丁丑大九月丁未小十月丙子大十一月丙午小十二月乙亥大五月乙酉七日八月辛丑二十五日春秋釋例卷十一
