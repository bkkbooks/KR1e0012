body:
  text: 春秋釋例卷二晉杜預撰滅取入例第七案此篇見永樂大典惟篇目佚今補莊十年冬十月齊師滅談談子奔莒傳曰齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至冬齊師滅談談無禮也談子奔莒同盟故也閔二年冬云云十二月狄入衛傳曰冬十二月狄人伐衛云云衛懿公云云及狄人戰于熒澤衛師敗績遂滅衛衛侯不去其旗是以甚敗云云狄入衛僖十年春王正月云云狄滅溫溫子奔衛傳曰春狄滅溫蘇子無信也蘇子叛王即狄又不能于狄狄人伐之王不救故滅蘇子奔衛十二年夏楚人滅黃傳曰黃人恃諸侯之睦于齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黃十九年冬云云梁亡傳曰梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某冦將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁二十二年春公伐邾取須句二十一年傳曰邾人滅須句須句子來因成風也成風為之言于公曰崇明祀保小寡周禮也蠻夷滑夏周禍也若反須句是崇皥濟而修祀紓禍也二十二年傳曰春伐邾取須句而反其君焉禮也二十五年春王正月丙午衛侯燬滅邢傳曰正月丙午衛侯燬滅邢同姓也故名二十六年秋楚人滅夔以夔子歸傳曰夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉秋楚成得臣鬭宜申帥師滅夔以夔子歸文五年秋楚人滅六傳曰六人叛楚即東夷楚成大心仲歸帥師滅六云云臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉七年春公伐邾三月甲戌取須句傳曰春公伐邾間晉難也三月甲戌取須句置文公子焉非禮也十五年夏云云六月云云晉郤缺帥師伐蔡戊申入蔡傳曰新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還傳例曰凡勝國曰滅之獲大城焉曰入之宣九年秋取根牟傳曰秋取根牟言易也十五年夏云云六月癸卯晉師滅赤狄潞氏以潞子嬰貌歸傳曰潞子嬰兒之夫人晉景公之姊也鄷舒為政而殺之又傷潞子之目晉侯將伐之云云六月癸卯晉荀林父敗赤狄于曲梁辛亥滅潞十六年春王正月晉人滅赤狄甲氏及留吁傳曰春晉士會帥師滅赤狄甲氏及留吁鐸辰成六年春云云取鄟傳曰取鄟言易也襄六年冬云云十二月齊侯滅萊傳曰十一月齊侯滅萊萊恃謀也十年夏五月甲午遂滅逼陽傳曰夏四月戊午會于柤云云晉荀偃士丐帥卒攻逼陽親受矢石甲午滅之書曰遂滅逼陽言自會也十三年夏取邿傳曰夏邿亂分為三師救邿遂取之傳例曰凡書取言易也用大師焉曰滅弗地曰入昭四年秋云云九月取鄫傳曰九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取傳例曰凡克邑不用師徒曰取哀八年春王正月宋公入曹以曹伯陽歸傳曰春宋公伐曹將還褚師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城強以歸殺之釋例曰先王之命天子之地一圻列國一同自是以衰故九服之內有萬國焉聞諸前史周之興也姬姓之國五十有五興廢繼絶仍有舊封者千有八百其後禮樂征伐自諸侯出大侵小衆暴寡漢陽諸姬楚實盡之霍陽虞虢滅而入晉故春秋見于經傳通及古國附庸蠻夷無爵而為國者凡百四十五而已定哀之末又存者大半案自先王之命以下永樂大典無之從敬鉉續明三傳例説略補入夫興滅繼絶帝王之逺典也勤而撫之五伯之所以役王命也兄弟甥舅侵敗王略王命伐之則有征討之事兵之所加不可細舉故策書之典以例而言用大師起大衆重力以陷敵因而有之故名勝國通以滅為文也案名字僖三年正義引釋例作曰字以成師重力雖獲大城得而弗有故直以出入為辭曰入之而已城不苞地國不苞邑滅邑必主大師故再發例取者乘其衰亂或受其潰叛或用少師而不頓兵勞力則直言取如取如攜言其易也傳四發取例者邿以師取案襄十三年正義引釋例取作徒鄫以叛而來根牟東夷鄟附庸國名各不同故也邿為小國非邑非夷故以凡例附之談黃萊六之滅傳但見四國之咎有以取之非所以解滅例也狄滅而書入者狄無文告衛之君臣死盡齊桓存之以告諸侯言狄已去不能有其土地也蘇子叛王即狄又不能于狄狄滅而居之此中國之狄也作事不時則怨讟動于民彼梁伯者虛興無虞之功詐稱無害之寇環溝其宫案環溝僖十九年正義引釋例作遂溝以蕩百姓之心開大國之志是妖興之先徴自亡之實應故不言秦滅梁而以自亡為辭也案為辭僖十九年正義引釋例作為文衛侯滅邢無異罪同姓故名夔子承祝融鬻熊之胤世紹其祀而欲移之于楚見責又不以禮服罪狀由于不祀宜在見罪故無異譏晉侯滅虞而修虞祀供其職貢傳稱罪虞且言易亦其義也狄有五罪伐之正也不書林父士會從告辭也會以訓上下敘德刑遂滅逼陽言滅生于會非本意也曹人背晉而姦宋是以致討宋公既還而不忍褚師之詬怒而反兵一舉滅曹滅非本志故以入告也氏族例第八案此篇永樂大典全闕釋例曰别而稱之謂之氏合而言之謂之族子孫繁衍枝布葉分始承其本末取其别故其流至于百姓萬姓隱八年正義引釋例尋按春秋諸氏族之稱甚多參差而先儒皆以為例欲托之于外赴則患有人身自來者例不可合因以僻陋未賜族為説弒君不書族者四事州吁無知不稱公子公孫賈氏以為弒君取國故以國言之按公子商人亦弒君取國而獨稱公子宋督賈氏以為督有無君之心故去氏按傳自以先書弒君見義不在于氏也宋萬賈氏以為未賜族按傳稱南宫長萬則為巳氏南宫不得為未賜族也執殺大夫不書族者二事楚殺得臣與宜申賈氏皆以為陋按楚殺大夫公子側大夫成熊之等六七人皆稱氏族無為獨于此二人陋也欲以為通例則有若此之錯欲以為無義例則傳曰嘉之故不名書曰仲孫嘉之書曰崔氏非其罪翬溺帥師皆曰疾之稱族尊君命舍族尊夫人尊晉罪巳之文炳然著明以此推之知亦非仲尼所遺也斯蓋非史策舊法故無凡例當時諸國以意而赴其或自來聘使者辭有詳略仲尼修春秋因采以示義義之所起則刊而定正之否則即因而示之不皆刊正也故蔡人嘉赴而經從稱季傳曰蔡人嘉之書崔氏傳亦曰且告以族明皆從其本也書司馬華孫來盟亦無他比知非大例也然則總而推之春秋之義諸侯之卿當以名氏備書于經其加貶損則直稱人若有褒異則或稱官或但稱氏若內卿有貶則特稱名文不言魯人故異于外也若夫褒無貶傳所不發者則皆就舊文或未賜族或時有詳略也推尋經文自莊公以上諸弒君者皆不書氏閔公以下皆書氏亦足以明時史之異同非仲尼所皆刊也隱四年正義引釋例舊説以為大夫有功德者則生賜族非也至于鄭祭仲為祭封人後升為卿經書祭仲以生賜族者檢傳既無同華氏之文則祭者是仲之舊氏也隱八年正義引釋例傳云公子遂如齊逆女尊君命也遂以夫人婦薑至自齊尊夫人也叔孫僑如逆女則往曰稱族還曰舍族然則公子公孫繫公之常言非族也宣元年正義引釋例禍福不告則不書然則國之大事見告則皆承告而書貴賤各以所告為文也福莫大于享國有家禍莫甚于骨肉相殘故公子取國及為亂見殺者亦皆書之不必繫于為卿故子紏意恢以公子見書于經也莊九年正義引釋例爵命例第九案此篇永樂大典全闕釋例曰天子錫命其詳未聞諸侯或即位而見錫或厯年乃加錫或已薨而追錫魯桓薨後見錫則亦衛襄之比也魯文即位見錫則亦晉惠之比也魯成八年齊靈二十四年乃見錫隨恩所加得失存乎其事莊元年正義引釋例周官王之五路及卿大夫士服車各有名又有良車散車不在等者其用無常襄十九年正義引釋例先路者革路若木路或云先或云次蓋以就數為差其受之于王則稱大成二年正義引釋例公侯伯子男及其卿大夫士命數周官具有等差當春秋時漸已變改是以仲尼丘明據時之宜仍其行事從而然之不復與周官同也而先儒考合周官禮記各致異端今詳推經傳國之大小皆據當時土地人民不復依爵故書齊楚之卿而略于滕薛也諸侯大國之卿皆必有命固無所疑其總名亦曰大夫也故經傳卿大夫之文相涉晉殺三卿而經書大夫邢丘之會傳稱大夫亦皆卿也蜀之盟齊國之大夫湨梁之盟小邾之大夫此不命一命之大夫故不書也命者謂其君正爵命之于朝其宫室車旗衣服禮儀各如其命數則皆以卿禮書之于經衛之于晉不得比次國則邾莒把鄫之屬固已微矣此等諸國當時附隨大國不得列于會者甚多及其得列上不能自通于天子下無暇于備禮成制故與于會盟戰伐甚多唯曹之公子首得見于經其餘或命而禮儀不備或未加命數故皆不書之也邾畀我之等其奔亡亦多所書唯數人而已知其合制者少也又邾庶其等傳皆言非卿以地來雖賤必書紀裂繻來逆女傳曰卿為君逆知此等微國亦應有卿有卿則應書于經徒以卑陋制不合禮失禮之例把降為夷華耦具官君子貴之至于此等卿而不備禮亦所以見其略賤也諸儒以為邾莒無命卿既自違傳劉賈又云春秋之序三命以上乃書于經穎氏以為再命稱人傳曰叔孫昭子三命踰父兄昭公十年昭子始加三命而先此叔孫皆自見經知所書皆再命也襄二十一年正義引釋例內外君臣逆女例第十案此篇見永樂大典惟篇目佚今補隱二年秋云云九月紀裂繻來逆女傳曰紀裂繻來逆女卿為君逆也七年春王三月叔姬歸于紀桓三年秋七月云云公子翬如齊逆女傳曰公子翬如齊逆女修先君之好故曰公子九月齊侯送薑氏于歡傳曰齊侯送薑氏非禮也傳例曰凡公女嫁于敵國姊妹則上卿送之以禮于先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之夫人薑氏至自齊冬齊侯使其弟年來聘傳曰齊仲年來聘致夫人也八年冬十月云云祭公來遂逆王后于紀傳曰祭公來遂逆王后于紀禮也九年春紀季薑歸于京師傳曰紀季薑歸于京師傳例曰凡諸侯之女行唯王后書莊元年夏單伯送王姬二十二年冬公如齊納幣二十四年夏公如齊逆女秋公至自齊八月丁丑夫人薑氏入戊寅大夫宗婦覿用幣傳曰秋哀薑至公使宗婦覿用幣非禮也僖五年夏公孫兹如牟傳曰夏公孫兹如牟娶焉二十五年夏四月云云宋蕩伯姬來逆婦三十一年冬把伯姬來求婦文二年冬云云公子遂如齊納幣傳曰襄仲如齊納幣禮也傳例曰凡君即位好舅甥修婚姻娶元妃以奉粢盛孝也孝禮之始也四年夏逆婦薑于齊傳曰逆婦薑于齊卿不行非禮也君子是以知出薑之不允于魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壞其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也宣元年春王正月云云公子遂如齊逆女傳曰公子遂如齊逆女尊君命也三月遂以夫人婦薑至自齊傳曰遂以夫人婦薑至自齊尊夫人也五年秋九月齊髙固來逆叔姬傳曰齊髙固來逆女自為也故書曰逆叔姬卿自逆也成八年春云云宋公使華元來聘傳曰宋華元來聘聘共姬也夏宋公使公孫夀來納幣傳曰宋公使公孫夀來納幣禮也冬十月云云衛人來媵傳曰衛人來媵共姬禮也傳例曰凡諸侯嫁女同姓媵之異姓則否九年春云云二月伯姬歸于宋夏季孫行父如宋致女晉人來媵傳曰晉人來媵禮也十年夏云云五月云云齊人來媵十四年秋叔孫僑如如齊逆女傳曰宣伯如齊逆女稱族尊君命也九月僑如以夫人婦薑氏至自齊傳曰僑如以夫人婦薑氏至自齊舍族尊夫人也君子曰春秋之稱微而顯志而晦婉而成章盡而不汙懲惡而勸善非聖人誰能修之襄十五年春云云劉夏逆王后于齊傳曰官師從單靖公逆王后于齊卿不行非禮也釋例曰凡稱君即位修婚姻娶元妃謂諒隂既終嘉好之事通于內外內外之禮始備此除凶之即位也古者諸侯之娶嫡夫人及左右媵各有姪娣皆同姓之國國三人凡九女參骨肉至親所以息隂訟息隂訟案隱元年傳正義引釋例此句作隂訟息所以廣繼嗣也當時雖無其人必待年長而送之所以絶淫逸案淫逸成八年正義引釋例作望求塞非常也辭稱蠢愚不教故遣大夫隨之而亦謂之媵臣所以將謙敬之實也夫人薨不更聘必以姪娣媵繼室一與之醮則終身不二所以重婚姻之禮固人倫之義人倫之義既固上足以奉宗廟下足以繼後世此夫婦之義也天子至尊無敵則上卿親迎而上公臨之案襄十五年劉夏逆王后于齊傳云官師從單靖公逆王后于齊卿不行非禮也孔穎達正義云此公既行矣唯譏卿之不行不譏王不親逆是知于禮天子不親昏使上卿逆而公臨之故唯言卿不行非禮也釋例據此傳知天子當使公卿不親迎也諸侯若有故不得親迎必使宗親上大夫為介凡內外君臣逆十六傳所以發義例有四紀裂繻來逆女傳曰卿為君逆也齊髙固來逆叔姬傳曰書逆叔姬卿自逆也此外君臣來逆女之異文也公子遂如齊逆女傳曰尊君命也公孫兹如牟傳曰娶焉此內君臣出逆女之異文也祭公逆王后于紀傳曰禮也此天子之異文也逆婦薑于齊傳曰卿不行非禮也劉夏逆王后于齊傳曰官師從單靖公卿不行非禮也知祭公如紀時亦有卿卿不書舉重略輕猶鞍邲之戰唯書郤克林父此又天子及諸侯使公卿之文也國君之娶必卜鄰國之吉人臣亦卜國內之耦所以美祚胤也臣若有故而外婚則稱使以出不得稱婚卿非君命不越境也婚禮雖奉時君之命其言必稱先君以為禮辭故公子翬逆女傳稱修先君之好公子遂逆女傳曰尊君命互發其義也往必稱族以示其重還雖在途必舍族以替之所以成小君之尊也禮父母逆女不下堂著外成之節委之于迎者也齊侯送薑氏經指事而書傳亦隨文而釋以見其非也婚禮卿納幣而君親逆君有故即使卿逆之則書卿名以夫人至父母之國又遣使致女所以進貞女成大禮也桓公不書納幣而遣公子翬逆女逆女踰月翬未反而公會齊侯于歡本非親迎因接夫人直稱夫人至者為失禮不斥言之文也莊公顧割臂之盟崇寵孟任故即位二十三年乃娶元妃雖丹楹刻桷身自納幣而有孟任之嫌故與薑氏俱反而異入經所以不以至禮書也文公既不親迎又不使卿君而卑之立而廢之故不稱逆女皆國史敘事之宜也天子娶則稱逆王后卿為君逆女則稱逆女其自為逆則稱所迎之字案隱二年正義引釋例迎作逆尊卑之别也逆稱王后而逆之曰季薑伸父母之尊也天子嫁女于諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之尊卑不得交禮也魯諸公納幣或在即位之前成公娶夫人而不納幣此經文闕也貴聘而賤逆失之微者傳猶詳之言其不終若實不納幣非所略也諸侯婚禮久亡以士婚禮準之不得唯止于納幣逆女逆女納幣二事皆必使卿行卿行則書之他禮非卿則不書也宋公使華元來聘聘不應使卿故傳但言聘共姫也使公孫夀來納幣納幣應使卿故傳明言其得禮也魯君之婚亦唯存納幣逆女此其義也魯自惠已上世娶于宋自桓已下娶于齊及春秋之末襄昭定哀四公皆違其舊三桓執政欲以削公室外援成巳之私故哀公將因越人以去三桓越人請妻之于是季孫賂太宰嚭以絶其計哀公不能自固出奔而死祿之去公室亦難以禮論也把蕩二伯姬皆自為子來迎之與求雖異然其實一也文公宣公成公夫人皆稱婦各有姑之辭也宣公納幣雖或在即位之前據為喪娶不須貶責而自明故無譏文也成公逆女及夫人至最為得禮故詳其文丘明謂之微而顯婉而成章也宋公之娶伯姬幣聘兩備晉衛為媵蓋古婚之道故傳每為之發伯姬以賤逆婦齊人來媵皆非所應故傳亦無文也叔姬歸于紀此待年之女年滿特行故書其歸公子翬如齊逆女此經正文而賈氏云使翬逆女兼修艾之盟婚姻禮之大事方遣逆女無緣兼修盟會若實如此經當變文不得以逆女為使而更以修盟為實也又此年春公已會齊侯而成婚豈復須逆女之臣以申久要斯不然矣夫人孫于齊傳云不稱薑氏絶不為親止釋孫例也至于喪婚則或稱薑而不言氏或稱氏而不言薑丘明不發其例斯蓋經傳闕也內女夫人卒葬例第十一案此篇見永樂大典其篇目亦存隱二年冬云云十二月乙卯夫人子氏薨三年夏四月辛卯君氏卒傳曰夏君氏卒聲子也不赴于諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言葬不書姓為公故曰君氏僖元年秋七月戊辰夫人薑氏薨于夷齊人以歸閔二年傳曰閔公之死也哀薑與知之故孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之冬云云十有二月丁巳夫人氏之喪至自齊傳曰夫人氏之喪至自齊君子以齊人之殺哀薑也為已甚矣女子從人者也文四年冬十有一月壬寅夫人風氏薨五年春云云三月辛亥葬我小君成風傳曰春王使榮叔來含且賵召昭公來會葬禮也十七年夏四月癸亥葬我小君聲薑傳曰葬聲薑有齊難是以緩宣八年冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬傳曰葬敬嬴旱無麻始用葛茀雨不克葬禮也卜葬先逺日避不懷也襄四年秋七月戊子夫人姒氏薨傳曰定姒薨不殯于廟無襯不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為巳樹六檟于蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御君子曰志所謂多行無禮必自及也其是之謂乎秋云云八月辛亥葬我小君定姒定十五年秋七月壬申姒氏卒傳曰姒氏卒不稱夫人不赴且不祔也九月云云辛巳葬定姒傳曰葬定姒不稱小君不成喪也哀十二年夏五月甲辰孟子卒傳曰夏五月昭夫人孟子卒昭公娶于吳故不書姓死不赴故不稱夫人不反哭故不言葬小君右夫人卒葬莊二年秋七月齊王姬卒四年夏云云六月乙丑齊侯葬紀伯姬二十九年冬十有二月紀叔姬卒三十年秋云云八月癸亥葬紀叔姬僖九年秋七月乙酉伯姬卒文十二年春云云二月庚子子叔姬卒傳曰叔姬卒不言把絶也書叔姬言非女也成八年冬十月癸卯把叔姬卒傳曰把叔姬卒來歸自把故書九年春王正月把伯來迎叔姬之喪以歸傳曰杞桓公來逆叔姬之喪請之也把叔姬卒為把故也逆叔姬為我也襄三十年夏云云五月甲午宋災宋伯姬卒傳曰甲午宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也秋七月叔弓如宋葬宋共姬傳曰叔弓如宋葬共姬也右內女卒葬夫人卒葬二十四內女卒十二錯綜其二十三以包通之釋例曰夫人喪禮有三薨則赴于同盟之國既葬日中自墓反虞于正寢所謂反哭于寢也卒哭而祔于祖姑皆然則書曰夫人某氏薨葬我小君某氏此備禮之文也姒氏卒傳曰不稱夫人不赴且不祔也葬定姒不稱小君不成喪也然則夫人子氏赴而不反哭故不書葬定姒則反哭而不赴故書葬而不言小君若昭之孟子者以同姓為諱案諱字哀十二年正義引釋例作闕生革其姓過而知晦也然吳之太伯下及魯昭公于親逺矣所諱在于名義而已居夫人之位籍小君之尊已三世矣季氏當國而不為之服至令仲尼釋已之經國朝不成其喪以世嫡夫人亦不書于策此季氏之咎也凡妾子為君其母猶為夫人雖先君不命其母母以子貴其嫡夫人薨則尊得加于臣子而內外之禮皆如夫人矣故姒氏之喪責以小君不成案此句永樂大典誤作貴以小君今從隱三年正義所引釋例改正成風之喪王使來會葬傳曰禮也隱公以讓攝位案此句隱三年正義引釋例作隱以讓桓攝位故不成禮于聲子假稱君氏以别妾媵蓋是一時之宜隱之至義凡夫人薨失所則書地明失常也哀薑不書姓經闕文也夫人姒氏薨葬皆以禮備為文明季文子雖議從略賤案襄四年傳定姒薨匠慶請木季孫曰略杜預集解不以道取為略孔穎達正義云釋例以略為略賤自是解略字正義與集解别也聞匠慶之言懼而備禮殯葬無闕也齊王姬卒魯為主比內女也紀侯大去其國令弟納邑附齊齊侯嘉而愍之恩及伯姬伯姬魯女也故以來告大夫會葬故書齊侯葬紀伯姬也叔姬繼伯姬之後紀侯既卒依紀季居酅貞義守節嘉而愍之故亦存弔葬之禮也子叔姬卒傳曰不言把絶也書叔姬言非女也出棄之女反在父母之室則與既笄成人者同故亦書卒也昭三年傳曰昔文襄之伯君薨大夫弔卿共葬事夫人士弔大夫送葬宋伯姬之卒宋人義其待姆魯嘉其事貞節使卿送葬舉諡成禮君子嫌其敬過于節故以女而不婦示義經文仍舊非仲尼所變故亦不嫌書日以示别之蓋丘明道達聖旨扶春秋之義也內女唯諸侯夫人卒乃書恩成于敵體其所嘉愍乃遣弔喪又簡于文襄之法也其非適諸侯則略之以服制相準也生書其來而死不録其卒從外大夫之比也伯姬卒未適人故不稱國既笄成人故書經書孟子卒傳曰昭公娶于吳故不書姓此為昭公加諱不復繫吳改其姓號經傳因而不革也論語謂之吳孟子蓋時人常言非經傳正文也而賈氏以謂言孟子若言吳之長女稱吳長女既不異于同姓之長女且娶同姓長之與少未聞其異無所為别也又齊侯葬紀伯姬不書諡者蓋亡國之婦夫妻皆降莫為之諡也而賈許方以諸侯禮説又失之也禮公子為其母練冠縓緣既葬除之及其嗣位為君非復公子嫡母薨則伸其母尊而先儒同之公子亦繆矣侵伐襲例第十二案此篇見永樂大典惟篇目佚今補釋例曰侵伐襲者師旅討罪之名也鳴鐘鼓以聲其過曰伐寢鐘鼓以入其境曰侵掩其不備曰襲此所以别興師用兵之狀也其但稱圍救舉實而言也周禮萬二千五百人為軍二千五百人為師五百人為旅傳曰君以軍行祓社釁鼓又曰嘉好之事君行師從卿行旅從然春秋不書師旅一皆曰師從衆辭也大夫將滿師稱師不滿稱人而已卿將滿稱師案此句隱二年正義引釋例作卿將滿師則兩書與永樂大典異不滿則直書名氏君將不言帥師卿將不言師旅此史策記注之常也案隱二年正義云此用公羊之説翬之伐鄭溺之伐衛固請專命王命伐宋羽父不待君以速進案待字隱十年正義引釋例作匡而先會二國自以為名故皆貶去其族齊為侯伯鄭伯又為王卿士二君奉王命以討宋惡羽父之專進故使與微者同伐動而無功故無成敗也老桃之會而不同伐公既獨敗宋師鄭乃尋其末蹤事同一時故不重告于廟也齊侯衛侯鄭伯來戰于郎夫子善魯人之秉周班惡三國之伐有禮故正王爵以表周制去侵伐以見無罪此聖人之所以扶奬王室敦崇大教故改常例以特見也衛孔達為政不恭背盟主興兵于鄰國受討喪邑窘而告陳雖從陳之謀僅得自定以謀而濟故君子但明言合古而不釋其尤也秦伯終用孟明而致敗敗而罪己救其闕而養其志孟明增修其德以霸西戎夫子嘉之故于伐秦之役貶四國大夫四國大夫奉君命而行今以一義變例故稱尊秦謂之崇德明罪不在四國大夫也傳稱秦伯伐晉既嘉孟明以善稱穆公又曰遂伯西戎而經書秦人知稱人非諸侯之褒貶也鄭受楚命伐宋大敗宋師獲其上卿案上字宣元年正義引釋例作二字此晉之不競也晉于是申命衆國大起其衆將以雪宋之恥取威定霸趙盾為政而畏鬭椒之威案宣二年正義引釋例此句作而畏越椒之盛不敢遂其所志託辭班師失宋之心孤諸侯之望楚之囊瓦為吳所誘以喪軍師皆所以致貶也子重興鐘鼓以救彭城而實使輕軍與鄭人侵之故經以實事稱人書侵而傳本其始發言伐也諸經傳異文而非例所及者其義皆然陳蔡楚之與國鄭欲求親于晉故伐而入之晉士莊伯詰其侵小且問陳之罪子産答以東門之役故免于譏及其侵蔡既無晉命案命字襄八年正義引釋例作令又無直辭君死主少興師以求媚于晉義取亂略不能以德懷親又不能以直報怨故二大夫異于子産也陳之見伐本以助晉晉不逆勞而以法詰之得盟主道理故仲尼曰晉為伯鄭入陳非文辭不為功善之也戎之侵魯魯人不知去而逺追又無其獲邊境不備侯不在疆所以為諱也諱此君之闕亦所以示戒于將來之君也楚人棄君助臣取宋彭城以封叛者削正興偽雖非復宋地故追書繫宋不與楚人之所得入也虎牢鄭之郊境晉人既有之矣又城而居之將以脅鄭鄭畏逼而強服遇楚而復叛八年之間一南一北至于數四晉悼慮其未已故大城置戍先以示威鄭服之日釋戍以歸之案襄十五年義引釋例以作而德立刑行故能終有鄭國春秋探書其本意案襄十年正義引釋例意作心善之也三都強盛以奪三家之權陪臣執政下凌上替故仲由隳之而仲尼弗禁帥師登臺僅不相克案此句定十二年正義引釋例作僅而皆克直隨事而書以示三家之疆無義例也晉伐鮮虞文無主帥既例所不及麻隧實戰而但書伐欲以為不告則時公在師欲以為諱伐無罪則秦直晉曲欲以為無功諱負則秦師敗績此皆經文闕漏傳文獨存也賈氏以晉直秦曲無辭不得敵有辭故不書戰而韓之戰秦直晉曲宋之戰魯義而宋不信亦皆書戰事類甚多此既不安又師者是人衆之通言取而復為義云諸經稱師皆以明用師之義晉師滅潞則曰得用師之道楚師滅陳則曰失用師之道文體適同一善一惡諸稱師者百六十四患不能通則但為稱師而不見將帥之主數條生義此為更在將帥與不復在師也俱是戰伐之事亦俱稱師其人存其事顯則所責明其人沒而但稱師則所責隱仲尼曷為舍此而明彼言左氏不明義例不以為義例則異同詳略皆本史也而諸君區區溺意于亂文欲于無義之中求義無異施綿緼以為縑絹用櫛比于氈毛也春秋釋例卷二
