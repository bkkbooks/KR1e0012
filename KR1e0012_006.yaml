body:
  text: 春秋釋例卷六晉杜預撰土地名第四十四之二虢地隱元年虢都上陽二名虢國都於上陽𢎞農陕縣東南有虢城莊二十一年玤闕三十二年莘闕僖二年下陽河東大陽縣也桑田𢎞農陜縣東北有桑田亭莒地隱二年莒城陽莒縣密城陽淳于縣東北有密鄉僖二十六年向闕案杜預宣二年取向集解云東海承縣東南有向城逺疑也文七年鄢陵闕成八年渠丘城陽莒縣南有渠丘案杜預集解作莒縣有逺里劉昭續漢書郡國志注引杜說作莒縣有遽丘里襄二十年向闕二十三年且于闕夀舒闕蒲侯氏闕二十四年介根城陽黔陬縣東北計基城又密州東南有古豕根也案隋書地理志髙密縣下云舊置膠州開皇五年改為密州杜佑通典密州下云後魏置髙密郡後置膠州隋初為密州以密水為名則密州隋置此條又密州以下非杜氏本文謹訂于此昭元年大厖闕常儀靡闕五年防城陽平昌縣西南有防亭兹姑幕縣東北有兹亭十年郠闕十九年紀鄣紀二名東海贑榆縣東北有紀城案酈道元水經淮水注引杜說紀字上有故字二十二年夀餘闕齊地隱三年齊齊國臨淄縣石門濟北廬縣故城西南濟水以石為門盧濟北盧縣故城六年艾泰山牟縣東南有艾山案司馬彪續漢書郡國志牟縣屬泰山晉書地理志作東牟又琅琊臨沂縣東艾亭疑案劉昭續漢書郡國志注于琅琊國臨沂縣下云左𫝊隱六年盟于艾杜預曰縣東南有艾山與本書小異桓三年嬴泰山嬴縣十七年黃闕或曰東萊黃縣非也經公子遂如齊至黃乃復傅曰盟于黃平齊紀且謀衛故也黃在齊衛之間莊二年禚闕七年榖小榖二名濟北榖城縣城中有管仲井八年葵丘齊國臨淄縣西有地名葵丘姑棼闕貝丘樂安博昌縣南有地名貝丘案劉昭續漢書郡國志注引杜說貝丘作貝中云又案酈道元注水經河水杜此條蓋用京相璠之說九年乾時時水在樂安界歧流旱即竭涸故曰乾時案酈道元水經瓠子河注引杜說歧流作枝流堂阜東莞蒙隂縣西北有夷吾亭或曰鮑叔解夷吾縛于此因以為名然則古堂阜也案晉書地理志䝉隂屬琅琊國不屬東莞郡十三年杏北杏二名闕柯濟北有東阿縣閔元年落姑闕僖三年陽榖東平須昌縣北陽榖城四年穆陵闕無棣闕十八年甗闕二十六年酅濟北榖城縣西北有地名酅下文十一年周首濟北榖城縣東北有周首亭十六年郪丘闕十八年申池或曰齊城南面西頭第一門名申門齊城無池唯此門左右有池疑宣元年平州泰山牟縣西平州鄉八年垂闕成二年鞍闕袁婁闕案穀梁云鞍去齊五百里袁婁去齊五十里孔穎逹正義駁之云齊之四境不應過遙且鞍已是齊地未必境上之邑豈得去齊有五百里乎穀梁又云一戰綿地五百里是甚言之耳釋例土地名鞍與袁婁並闕不知其處逺近無以驗之莘闕又云博州武水縣西北有故莘城也案隋書地理志開皇十六年置博州大業初州廢武水屬武陽郡亦開皇十六年置杜佑通典云隋置博州煬帝初州廢唐復置博州武水屬焉縣本漢陽平地隋改今縣則博州武水縣皆隋置此條又云以下非杜氏本文謹訂于此華泉闕又云不注山下有此泉齊州歷城縣有華不注山案漢書地理志歷城縣屬濟南郡續漢書郡國志同魏書地形志齊州治歷城劉義隆置冀州皇興三年更名領郡六歷城仍屬濟南郡則齊州元魏置此條又云以下非杜氏本文謹訂于此徐關闕又云齊州章丘縣有故齊關城案隋書地理志章丘屬齊郡舊曰髙唐開皇十六年改舊唐書地理志章丘屬齊州漢陽丘縣隋為章丘則章丘縣隋置此條又云以下非杜氏本文與上二條同石窖濟北盧縣東有地名石窖丘輿闕馬陘闕十七年清陽平樂平縣也案永樂大典樂平平字脫集解本並同考晉書地理志樂平屬陽平郡又考續漢書郡國志樂平侯國故清章帝更名謹據此增人襄二年東陽闕耐外闕十八年平隂濟北廬縣東北平隂城防門平隂城南有防防有門案程公說春秋分記引釋例作平隂城南北防有門劉昭續漢書郡國志注引杜說又云在縣北京兹平隂城東南邿平隂城西有邿山郵棠闕十九年祝柯督揚二名濟南祝阿縣也句瀆之丘闕髙唐濟南祝阿縣西北髙唐城案于欽齊乘引杜釋例作濟南祝柯縣西北有援城有髙唐城春秋時齊邑灑藍闕二十五年重丘闕棠闕弇中或曰泰山萊蕪縣西有甕口谷疑案杜說集解云弇中狹道二十六年廩丘東郡廩丘縣故城是案孔穎逹正義云釋例土地名以廩丘為齊地案廩丘地在東郡則是衛之邦域齊竟不至此也羊角髙魚皆在東郡廩丘與之相近齊不得别有廩丘烏餘齊之大夫得以廩丘奔晉者蓋齊人往前取得衛邑以賜烏餘如鄭公孫假之得州宋樂大心之有原也宋鄭大夫得以晉地為采邑是以齊大夫得以衛地為采邑杜見齊人以之奔晉故釋例以為齊地明年討烏餘皆反其邑而歸諸侯蓋以廩丘歸齊也丘又案晉書地理志晉初分東郡置濮陽國廩屬濮陽二十七年崔濟南東朝陽縣西北有崔氏城案晉書地理志東朝陽屬樂安國不屬濟南郡二十八年邶殿闕昭三年莒闕五年寧風闕十年稷闕案杜集解云稷祀后稷之處棘齊國西安縣東有㦸里亭城案㦸邑晉書地理志作棘里夫于濟南於陵縣西北有于亭案續漢書郡國志於陵屬濟南郡晉書地理志無此縣十一年渠丘齊國西安縣二十年聊攝平原有聊城縣縣之東北有攝城沛闕二十五年野井濟南祝阿縣東有野井亭定九年媚闕十年夾谷祝其二名闕哀六年賴或曰濟南菅縣南有賴亭疑案續漢書郡國志菅縣屬濟南郡晉書地理志無此縣駘闕殳冒淳闕八年潞闕十年鄎闕犂犂丘隰三名濟南有隰隂縣案晉書地理志濟南郡統縣五無隰隂縣考漢書及續漢書濟南所屬亦無是縣轅濟南祝阿縣西北有轅城案酈道元水經河水注引杜說云濟南祝阿縣西北有瑗城轅即瑗也與本文微異又案于欽齊乘引杜說例瑗城作援城十一年艾陵闕清濟北盧縣東有清亭博泰山博縣十四年舒州闕豐丘闕郭關闕二十一年顧闕舟道闕二十七年留舒闕陳地隱三年陳陳國陳縣案晉書地理志晉武帝合陳郡于梁國陳縣屬梁國僖二十三年焦譙國譙縣案晉書地理志譙縣屬譙郡夷城父二名譙國城父縣案晉書地理志城父縣屬譙郡文九年壺丘闕宣十一年辰陵潁川長平縣東南有辰亭成十六年鳴鹿陳國武平縣西南有鹿邑亭案晉書地理志武平縣屬梁國哀六年大冥闕杞地隱四年把緣陵二名國都於緣陵陳留寧陵縣城中有禹祠也案漢書地理志寧陵屬陳留郡顔師古注引孟康說曰故葛伯國今葛鄉是晉書地理注屬梁國牟婁城陽諸縣東北有婁鄉宣十五年無婁闕案隱四年杜氏集解云杞國本都陳留雍丘縣推尋事蹟桓六年淳于公亡國杞似并之遷都淳于僖十四年又遷緣陵襄二十九年晉人城杞之淳于杞又遷都淳于正義云漢書地理志陳留郡雍丘縣故杞國武王封禹之後東樓公是杞本都此也志又云北海郡淳于縣應劭曰春秋州公如曹左氏傳曰淳于公如曹臣瓚按州國名淳于國之所都此淳于縣于漢屬北海郡晉時屬東莞郡故釋例土地名云州國都于東莞淳于縣以雍丘淳于雖郡别而境連也襄二十九年晉帥諸侯城杞昭元年祁午數趙文子之功云城淳于是知淳于即杞都也觀此知淳于自桓六年後即屬杞本書仍屬州國未嘗明言杞取故附識于此東又案淳于縣晉書屬城陽郡不屬莞郡正義亦微訛蔡地隱四年蔡汝南上蔡縣桓二年鄧潁川召陵縣西南有鄧城莊十年莘闕成六年桑隧汝南朗陵縣東北有桑里亭在上蔡西南昭十九年郹陽闕邢地隱五年邢廣平襄國縣閔二年夷儀闕僖元年聶北闕郕地隱五年郕東平剛平縣西南有成鄉桓十一年夫鍾闕文十一年郕邽或曰邑或曰玉闕晉地隱六年晉大鹵大原大夏參虛晉陽六名太原晉陽縣案宣十四年左傳范宣子曰昔丐之先自虞以上為陶唐氏杜預集解云陶唐堯所治地太原晉陽縣也終虞之世以為號故曰自虞以上孔穎逹正義云如杜此注陶唐共為一名即是晉陽縣也釋例云晉大鹵太原太夏參虛晉陽六名太原晉陽縣也唯載六名而言不及唐釋例又别記小國所都唐太原晉陽縣也亦云唐是晉陽而言不及陶則以陶與唐别不是共為一名也史記云帝堯為陶唐氏韋昭云陶唐皆國名猶湯稱殷商也案經傳契居商故湯以商為國號後盤庚遷殷故殷商雙舉歷檢書傳未聞帝堯居陶而以陶冠唐蓋地以二字為名所稱或單或復也張晏云堯為唐侯國于中山唐縣然則唐是中山縣名非晉陽也堯自唐侯而升為天子既為天子乃治於晉陽故杜於晉陽六名言不及唐記其諸國之都乃云唐是晉陽言堯為天子號曰陶唐其治在晉陽耳唐非晉陽縣內之地名也舜受堯禪封堯子丹朱為王者之後猶稱為唐其名不易終虞之世以陶唐為號故曰自虞以上也五年曲沃新城下國三名河東聞喜縣案孔穎逹正義云曲沃邑也而稱國者晉昭侯嘗以此邑封桓叔桓叔國之三世武公始并晉國遷居而就之此曲沃晉之舊國故謂之為下國也翼平陽絳邑縣有翼城案續漢書郡國志絳邑屬河東有翼城劉昭注云杜預曰在縣東八十里隨闕六年鄂闕桓二年條闕千畝西河介休縣南地名千畝陘庭闕三年汾隰闕莊二十五年聚闕二十六年絳故絳二名平陽絳邑縣西絳邑城二十八年東關闕蒲蒲城二名平陽蒲子縣屈二屈二名平陽北屈縣僖八年采桑平陽北屈縣西南有采桑津也九年髙梁髙梁之虛二名平陽楊縣西南髙梁城十年韓韓原宗丘三名故韓國闕十五年河外列城五河之南也焦瑕其二城其三闕案孔穎逹正義云河自龍門而南至華隂而東晉在西河之東南河之北以河北為內河南為外虢略虢之境界也獻公滅虢而有之今許以賂秦列城五者自華山而東盡虢之東界其間有五城也東盡虢略從河西南行而東盡故虢地也案劉昭續漢書郡國志注引杜說河西作河曲解梁城河東解縣案孔穎逹正義云解梁城在河北非在河外五城之數也隂闕十六年狐廚平陽臨汾縣西北有狐谷亭受鐸闕昆都闕案孔穎逹正義云汾水從平陽南流折而西入於河臨汾縣在汾水北狐谷疑是狐廚乃在縣之西北則狐廚受鐸皆在汾北狄自北而侵南涉汾水至於昆都昆都在汾南也二十四年令狐闕案杜預集解云令狐在河東當與刳酋相接桑泉河東解縣西桑泉城案劉昭續漢書郡國志注引杜說云在解縣東南臼衰河東解縣東南有臼城廬桞闕郇郇瑕氏二名古國名案杜預集解云解縣西北有郇城原闕屏闕樓闕綿上縣二名西河介休縣南有地名綿上二十五年南陽晉所始開河內汲郡地案杜預集解云在晉山南河北故曰南陽二十七年被廬闕二十八年河陽河內有河陽縣南河汲郡河南渡而東三十年焦闕瑕闕三十一年清原清二名河東聞喜縣北清原也三十三年箕太原陽邑縣南有箕城先茅之縣茅二名河東大陽縣西南有茅津茅亭文三年王官闕郊闕五年􅑔汲郡修武縣也六年夷闕董河東汾隂縣有董亭郫郫邵二名闕七年堇隂闕傳曰先克奪蒯得田于堇隂八年武城闕十年北徴闕十二年河曲河東蒲坂縣南羇馬一闕瑕河東猗氏縣東北有瑕城十三年桃林之塞𢎞農華隂縣東潼關案孔頴逹正義云桃林之塞在南河之南逺處晉之南境從秦適周乃由此路使詹嘉守此塞者以秦與東方諸侯逺結恩好及西乞聘魯亦應更交餘國慮其要結外援東西圖已故使守此厄塞欲斷其往來也諸浮闕案孔穎達正義云諸浮當是城外之近地十七年黃父黑壤二名闕宣二年隂地晉之河南山北自上洛以東至陸渾六年邢丘河內平臯縣也七年向隂闕十二年董澤河東聞喜縣東北有董池陂十五年曲梁廣平曲梁縣也輔氏闕稷河東聞喜縣西有稷山亭雒闕瓜衍之縣闕十七年斷道卷楚二名闕野王河內野王縣范闕成元年赤棘闕五年垂棘闕六年盬河東猗氏縣鹽池案孔穎逹正義云盬河東鹽池袤五十一里廣七里周總一百一十六里從盬省古聲唯此池之鹽獨名為盬餘盬不名盬也新田綘二名平陽綘邑縣也九年銅鞮上黨銅鞮縣也十年桑田闕十三年河闕箕郜闕十六年苕丘闕十七年虛闕襄元年瓠丘河東垣縣東南有壺丘亭三年長樗闕雞澤廣平曲梁縣西南十年著雍闕傳曰晉侯還及此而疾則著雍在河之南也或曰宋地非十一年櫟河東北間十八年長子上黨長子縣純留上黨屯留縣梗陽太原晉陽縣南梗陽城二十一年著闕祁太原祁縣二十三年雍榆汲郡朝歌縣東有雍城朝歌汲郡朝歌縣孟門闕案杜預集解云孟門晉隘道熒庭闕東陽晉之山東魏郡廣平以北案孔穎逹正義云昭二十二年傳曰荀吳襲東陽遂襲鼓滅之鼓在巨鹿居山之東山東曰朝陽知東陽是寬大之語總為晉之山東故為魏郡廣平以北二年齊晏弱城東陽以逼萊哀八年吳伐魯克東陽晉齊魯皆有東陽名同而實異服䖍以東陽為魯邑謬之甚矣二十六年鄐鄐田二名闕苗河內軹縣南有苗亭二十七年木門闕或曰魏邑也子鮮奔晉託於木門三十年任廣平任縣昭二年中都西河介休縣東南中都城五年楊楊氏二名平陽楊縣故楊國也八年魏榆闕案孔穎逹正義云服䖍云魏邑榆州里名襄二十三年叔孫豹次于雍榆雍榆地名知魏榆亦地名也虒祁平陽綘邑縣西汾水上也案杜預集解云虒祁在綘西四十里臨汾水九年戲陽魏郡內黃縣北有戲陽城十七年棘津闕二十八年乾侯魏郡斤丘縣塢太原塢縣平陵闕塗水太原榆次縣馬首闕盂太原盂縣平陽平陽縣案晉書地理志平陽縣屬平陽郡三十一年適歷闕定元年大陸汲郡修武縣西北吳澤三年平中闕九年五氏寒氏二名闕中牟滎陽有中牟縣回逺疑案孔穎逹正義云此中牟在晉境內也趙世家云獻侯即位治中牟漢書地理志云河南郡有中牟縣趙獻侯自耿徙此又云三家分晉河南之中牟魏分也杜言今滎陽有中牟縣謂此河南之中牟也晉世分河南為滎陽郡中牟屬焉此地乃在河南計非晉境所及故云回逺疑非也又三家分晉中牟屬魏則非趙得都之趙獻侯治中牟亦非河南之中牟也此言晉車在中牟哀五年趙鞅伐衛圍中牟論語佛肹為中牟宰與趙獻侯所都中牟或當是一必非河南中牟當於河北别有中牟但不復知其處耳臣瓉作漢書音義云河南中牟春秋在鄭之疆內及三卿分晉則為魏之邦土趙界自漳水以北不及此也春秋衛侯如晉過中牟案此之中牟非衛適晉之次也汲郡古文曰齊師伐趙東鄙圍中牟此中牟不在趙之東也案中牟當在溫水之上考瓚言河南中牟非此中牟誠如其語謂此中牟當在溫水之上不知其所據也十三年河內河內汲郡邯鄲廣平鄲邯縣十四年百泉闕哀元年棘蒲闕四年上雒倉野並在上雒縣也案續漢書郡國志上雒侯國屬京兆尹有蒼野聚劉昭注引杜預說曰在縣南雒又案晉書理地志上縣屬上雒郡少習上雒商縣武關臨闕欒趙國平棘縣西北有欒城鄗趙國高邑縣逆畤闕隂人闕壺口潞縣東有壺口關案晉書地理志潞縣屬上黨郡柏人趙國柏人縣十五年冠氏陽平館陶縣二十三年英丘闕薛地隱十一年薛魯國薛縣案晉書地理志薛縣屬魯郡定元年邳下邳縣故邳國案晉書地理志下邳縣屬下邳國許地隱十一年許潁川許昌縣成四年展陂闕鉏任泠敦之田闕十四年叔申之封闕襄十六年棫林闕函氏闕昭九年夷城父二名城父縣屬譙郡鄧地桓七年鄧義陽鄧縣九年鄾鄧縣南沔水之北鄾也秦地桓四年秦雍二名秦國都扶風雍縣也僖十五年靈臺始平鄠縣案集解云靈臺在京兆鄠縣考兩漢書及晉書鄠縣兩漢並屬右扶風晉泰始三年置始平郡鄠縣屬始平集解訛誤當以本書為正王城馮翊臨晉縣東故王城今名武鄉案劉昭續漢書郡國志注引杜說云後改為武鄉在縣東三十三年具囿闕文二年彭衙馮翊郃陽縣西北有彭衙城汪馮翊臨晉縣東有故汪城四年邧新城闕七年刳首闕十年少梁馮翊夏陽縣成十三年麻隧闕侯麗闕新楚闕襄十四年棫林闕曹地桓九年曹濟隂定陶縣僖八年洮闕案僖二十五年冬十二月公㑹衛子莒慶盟于洮集解云洮魯地孔頴達正義辨之曰八年盟于洮杜云曹地三十一年魯始得曹田此時不得為魯地注誤今考莊二十七年春公㑹杞伯姬于洮集解云魯地則魯亦有洮孔云杜誤未聞確據襄十七年曹隧闕重丘闕昭二十年鄸闕定十二年郊闕哀七年黍丘梁國下邑縣西南有黍丘亭揖丘闕大城闕鍾闕邘闕楚地桓二年荆楚郢三名楚國都於郢南郡江陵縣北紀南城東有小城名郢八年沈鹿闕十一年郊郢闕十三年鄢襄陽宜城縣荒谷闕冶父闕莊十八年聃那處二名南郡編縣東南有那口城十九年津或曰南郡江陵縣有津鄉湫南郡鄀縣東南有湫城夕室闕僖四年陘陘隰二名潁川召陵縣南有陘亭案文十六年𫝊師叔曰先君蚡冒所以服陘隰也孔穎逹正義云釋例以陘與陘隰為一地楚自武王始居江漢之間則蚡冒之時未至中土不應已能越申息服穎川之邑疑非也召陵潁川召陵縣六年武城南陽宛縣北武城二十五年析白羽二名南鄉析縣案晉書地理志後漢獻帝建安十三年魏武分南陽西界立南鄉郡晉武帝平吳改南鄉為順陽郡析縣屬順陽二十七年睽闕蒍闕二十八年連榖闕范闕文十年商上雒商縣期思戈陽期思縣東北有期思城十四年廬襄陽郡有中廬縣十六年大林闕陽丘闕訾枝闕選闕阪髙闕句澨闕臨品闕石溪闕仞闕宣三年葉南陽葉縣四年轑陽闕蒸野闕漳澨闕臯滸闕十一年郔闕沂闕十二年沈汝隂固始縣案杜預集解云沈或作寢寢縣也孔頴逹正義云哀十八年有寢尹吳由于成七年州來淮南下蔡縣呂闕又云豫州新蔡外城古呂國也案漢書地理志新蔡屬汝南郡續漢書郡國志同魏書地形志豫州下云劉義隆置司州治懸瓠城皇興中改豫州領郡九新蔡縣屬新蔡郡則豫州元魏置此條又云以下係後人所增謹訂于此十五年鍾離淮南縣也新石闕十六年汝隂之田汝水之南近鄭之南地也瑕闕十七年駕闕釐闕虺闕襄四年繁陽汝隂鮦陽縣南有繁陽亭案集解繁陽在汝南鮦陽縣南考前後漢書志鮦陽並屬汝南晉書地理志魏置汝陽郡後廢晉泰始二年復分汝南立汝南郡鮦陽屬汝隂集解所云尚沿漢制本書則據晉所分𨽻言之謹識于此十年柤闕或曰彭城傅陽縣西北有柤水溝魯國薛縣西南有柤亭譙國酇縣治戲鄉案晉書地理志酇縣屬譙郡皆去鍾離五百餘里非諸侯六日載㑹所至也或曰汝南安城縣西南有鍾離亭西平縣北有柤亭去逼陽近千里又非自㑹九日之所能滅國皆非也十三年庸浦闕十四年棠闕二十六年雩婁安豐雩婁縣棘譙國鄒縣東北有棘亭昭元年犨本鄭地南陽犨縣郟本鄭地襄城郟縣三年江南之雲夢中南郡枝江縣西有雲夢城江夏安陸縣東南亦有雲夢城或曰南郡華容縣東南有巴丘湖江南之雲夢也四年櫟汝南新蔡縣東北有櫟亭案昭四年𫝊吳伐楚入棘櫟麻孔穎逹正義云吳入楚之邑知此三邑皆楚之東鄙故疑新蔡東北有櫟亭者是此櫟亭也鄭有櫟邑者則河南陽翟縣也又案新蔡縣續漢書郡國志屬汝南晉書地理志屬汝隂麻闕此麻當在汝隂之左右若河南陽翟縣是鄭之櫟襄縣麻陂酇縣為棘皆非吳之所及又惟汝隂自有棘櫟案此條有訛誤今無可是正姑仍之夏汭漢水曲入江今夏口也五年璅闕鵲岸廬江舒縣有鵲尾渚南懷闕汝清闕六年乾溪譙國城父縣南案集解云楚東境屬又案晉書地理志城武縣譙郡七年章華南郡華容縣臺在城內或曰章華臺在譙國城父𫝊曰楚子成章華之臺願與諸侯落之如楚道由鄭知不在城父者也九年淮北之田淮水北田夷濮西田夷濮本陳地也十一年不羮襄城縣東南有不羮城定陵縣西北有不羮亭案晉書地理志襄城定陵均屬襄城郡羮又案續漢書郡國志襄城有西不羮定陵有東不均屬穎川郡晉書帝分穎川立襄城郡故屬襄城郡城十二年潁尾潁水之尾淮南下蔡縣西十三年中犨闕息舟闕鄧潁川召陵縣西南有鄧城魚陂江夏竟陵縣城西北有甘魚陂訾梁闕棘闈闕訾闕豫章定二年楚人伐吳師于豫章吳人見舟于豫章而潛師于巢以軍楚師于豫章又柏舉之役吳人舍舟于淮汭而自豫章與楚夾漢此皆當在江北淮水南蓋後徙在江南之豫章也十四年宗丘闕十七年長岸闕十九年隂南鄉隂縣案晉書地理志隂縣屬順陽郡下隂闕十九年城父襄城城父縣二十三年雞父安豐縣南有雞偹亭案晉書地理志安豐縣屬安豐郡薳澨闕二十四年圉陽闕二十五年州屈闕茄闕丘皇闕卷南陽葉縣南有卷亭二十七年潛廬江六縣西南潛城窮闕三十三年養闕三十一年南岡闕定四年容城闕柏舉闕大隧闕直轅闕冥厄闕城口闕雍澨闕五年稷闕軍祥闕䴢闕公壻之溪闕成臼江夏竟陵有臼水出聊屈山西南入漢水脾泄闕哀四年負函闕繒關闕豐南鄉析縣南有豐鄉案晉書地理志析縣屬順陽郡三戶南鄉丹水縣北有三戶亭案晉書地理志丹水縣屬順陽郡酈道元水經丹水注云漢建安中割南陽右壤為南鄉郡逮晉封宣帝孫暢為順陽王立為順陽郡因而南鄉為縣十二年橐臯淮南逡遒縣東南橐澤亭十六年白汝隂襄信縣西南有白亭慎汝隂慎縣隨地桓六年隨義陽隨縣瑕闕八年速杞闕黃地桓八年黃弋陽縣案晉書地理志弋陽縣屬弋陽郡莊十九年踖陵闕梁地桓九年梁馮翊夏陽縣僖十八年新里闕虞地桓十年虞河東大陽縣東北吳城僖二年鄍闕顛軨河東大陽縣東北有地名顛軨坂鄖地桓十一年鄖江夏雲杜縣東南有鄖城蒲騷闕宣四年夢江夏安陸縣東南有雲夢城小邾地莊五年郳小邾二名東海昌慮縣東北有郳城哀二年句繹闕徐地僖三年徐下邳僮鄉東南大徐城十五年婁林大徐城東有婁林鄉案集解作下邳僮縣東南有婁亭十六年蒲隧東海昌慮縣東有蒲鄉案蒲鄉集解作蒲如陂劉昭續漢書郡國志注引杜說作蒲姑陂燕地莊三十年燕北燕二名燕國薊縣也僖二十五年阪泉廣寧涿鹿縣涿泉昭四年冀之北土冀州名也北土燕代之屬七年虢闕十二年陽唐二名中山有唐縣鄀地僖二十五年鄀商密也秦楚界上小國其後遷於南郡鄀縣案孔穎逹正義云言鄀本在啇密者據後鄀移都而復稱鄀耳其實此時鄀在啇密後始遷于鄀縣國至彼縣而滅故彼縣專得鄀名耳商密南鄉丹水縣也案晉書地理志丹水縣屬順陽郡麇地文十一年麇闕防渚闕錫穴闕舒地僖三年舒廬江舒縣文十二年羣舒舒龍舒蓼舒庸舒鳩五名廬江六縣西南有龍舒城蓼安豐蓼縣案杜預集解云舒城西南有龍舒孔穎逹正義云世本偃姓舒庸舒蓼舒鳩舒龍舒鮑舒龔以其非一故統言以包之又案宣八年楚人滅舒蓼集解云舒蓼二國名正義云二字轉寫誤當云一國名襄二十四年荒浦闕二十五年離城闕庸地文十六年庸庸上庸縣案晉書地理志上庸縣屬上庸郡方城上庸縣東有方城亭禆闕鯈闕魚魚復縣案續漢書郡國志魚復縣屬巴郡晉書地理志魚復縣屬巴東郡今巴東永安縣案劉昭續漢書郡國志注宋書州郡志並引譙周巴記云初平中荆州帳下司馬趙韙建議分巴郡安漢以下為永寧郡建安六年劉璋改永寧為巴東郡而宋書又云魚復侯相漢舊屬縣巴郡劉偹章武二年改為永安晉武帝太康元年復舊則永安縣蜀漢所置也郯地宣四年郯東海郯縣昭七年羽淵東海祝其縣西羽山西南也萊地宣七年萊東萊黃縣襄六年棠或曰北海即墨縣有棠鄉案續漢書郡國志即墨屬北海國晉書地理志即墨屬濟南郡吳地成七年吳吳郡吳縣襄三年鳩兹丹陽蕪湖縣東今臯夷也十四年臯舟之隘闕二十八年朱方闕三十一年延州來闕案孔潁逹正義云釋例土地名延州來闕不知其處則杜謂延州來三字共為一邑服䖍云延延陵也州來邑名季子讓王位升延陵為大夫食邑州來𫝊家通言之案𫝊文謂之延陵季子則是延陵與州來必不得為一但不知何以呼為延陵耳或延陵亦是邑名蓋並食二邑故連言之又昭二十七年正義云釋例延州來闕杜意當謂吳地别有州來非楚邑也昭五年鵲岸廬江舒縣東南江水有鵲尾渚六年房鍾闕哀九年邗在廣陵東南自邗江穿溝東北向射陽湖西北末至口入淮今謂之韓江口十二年鄖發陽二名廣陵海陵縣東南有發溪口十五年良闕十六年頯黃氏闕十七年笠澤闕二十年艾豫章有艾縣也越地定八年越於越二名㑹稽山隂縣十四年檇李吳郡嘉興縣南有醉李城陘闕哀元年夫椒吳郡吳縣西南太湖中有椒山十三年姑蔑東陳太末縣十九年冥闕二十二年甬東㑹稽句章縣東海中洲有窮地襄四年有窮窮石二名闕鉏闕三苖地昭元年三苖闕襄十四年瓜州敦煌郡敦煌縣有虞地哀元年有虞梁國有虞縣案孔穎逹正義云有鰥在下曰虞舜又曰釐降二女于媯汭嬪于虞皇甫謐云嬪于虞因以虞為氏虞今河東大陽縣西山上虞城是也然則舜有天下其代號虞本河東大陽之虞及周之興封仲雍之後為虞國即彼地是也但舜既禪禹禹封舜後為諸侯雖取虞為國名未必封於河東虞地而梁國有虞縣其地以虞為名疑是夏時虞國杜于地名言有者皆是疑辭言有以示不審也綸闕右國四十并周凡四十一經𫝊地名九百一十三案本文地名實八百八十九條其四百五十七闕案本文闕者實四百六十條春秋釋例卷六
