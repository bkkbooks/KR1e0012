  text: 春秋釋例巻十五晉杜預撰經傳長厯第四十五之六定公元年正月乙亥小二月甲辰大三月甲戌小四月癸卯大五月癸酉小六月壬寅大七月壬申大八月壬寅小九月辛未大十月辛丑小十一月庚午大十二月庚子小正月辛巳七日庚寅十六日六月癸亥二十二日戊辰二十七日七月癸巳二十二日定公二年正月己巳大二月己亥小三月戊辰大四月戊戌小五月丁卯大閏五月丁酉小六月丙寅大七月丙申小八月乙丑大九月乙未大十月乙丑小十一月甲午大十二月甲子小四月辛酉二十四日五月壬辰二十六日定公三年正月癸巳大二月癸亥小三月壬辰大四月壬戌小五月辛卯大六月辛酉小七月庚寅大八月庚申小九月己丑大十月己未小十一月戊子大十二月戊午小二月辛卯二十九日定公四年正月丁亥大二月丁巳大三月丁亥小四月丙辰大五月丙戌小六月乙卯大七月乙酉小八月甲寅大九月甲申小十月癸丑大閏十月癸未小案趙汸春秋屬辭引長厯云定四年閏七月當是𫝊寫之訛十一月壬子大十二月壬午小二月癸巳正月七日也書于二月從赴四月庚辰二十五日十一月庚午十九日己卯二十八日庚辰二十九日昭三十一年傳曰六年十二月庚辰吳入郢今在十一月者並數閏定公五年正月辛亥大二月辛巳大三月辛亥小四月庚辰大五月庚戌小六月己卯大七月己酉小八月戊寅大九月戊申小十月丁丑大十一月丁未小十二月丙子大三月辛亥朔日食一日六月丙申十八日七月壬子四日九月乙亥二十八日十月丁亥十一日己丑十三日庚寅十四日定公六年正月丙午小二月乙亥大三月乙巳小四月甲戌大五月甲辰小六月癸酉大七月癸卯小八月壬申大九月壬寅大十月壬申小十一月辛丑大十二月辛未小正月癸亥十八日四月己丑十六日定公七年正月庚子大二月庚午小三月己亥大四月己巳小五月戊戌大六月戊辰小七月丁酉大八月丁卯小九月丙申大十月丙寅小十一月乙未大十二月乙丑小十一月戊午二十四日己巳王入于王城十二月五日有日無月案孔穎逹正義云此年經傳日少上下無可考驗杜以長厯校之己巳為十二月五日定公八年正月甲午大二月甲子大閏二月甲午小三月癸亥大四月癸巳小五月壬戌大六月壬辰小七月辛酉大八月辛卯小九月庚申大十月庚寅小十一月己未大十二月己丑小二月已丑二十六日辛卯二十八日七月戊辰八日十月辛卯二日壬辰三日癸巳四日定公九年正月戊午大二月戊子小三月丁巳大四月丁亥小五月丙辰大六月丙戌大七月丙辰小八月乙酉大九月乙卯小十月甲申大十一月甲寅小十二月癸未大四月戊申二十二日定公十年正月癸丑小二月壬午大三月壬子小四月辛巳大五月辛亥小六月庚辰大閏六月庚戌小七月己卯大八月己酉大九月己卯小十月戊申大十一月戊寅小十二月丁未大定公十一年正月丁丑小二月丙午大三月丙子小四月乙巳大五月乙亥小六月甲辰大七月甲戌小八月癸卯大九月癸酉小十月壬寅大十一月壬申小十二月辛丑大定公十二年正月辛未大二月辛丑小三月庚午大四月庚子小五月己巳大六月己亥小七月戊辰大八月戊戌小九月丁卯大十月丁酉小十一月丙寅大閏十一月丙申小十二月乙丑大十月癸亥二十七日十一月丙寅朔日食一日定公十三年正月乙未小二月甲子大三月甲午小四月癸亥大五月癸巳小六月壬戌大七月壬辰小八月辛酉大九月辛卯小十月庚申大十一月庚寅大十二月庚申小十一月丁未十八日十二月辛未十二日定公十四年正月己丑大二月己未小三月戊子大四月戊午小五月丁亥大六月丁巳小七月丙戌大八月丙辰大九月丙戌小十月乙卯大十一月乙酉小十二月甲寅大閏十二月甲申小二月辛巳二十三日定公十五年正月癸丑大二月癸未小三月壬子大四月壬午小五月辛亥大六月辛巳小七月庚戌大八月庚辰小九月己酉大十月己卯小十一月戊申大十二月戊寅大二月辛丑十九日五月辛亥一日壬申二十二日七月壬申二十三日八月庚辰朔日食一日九月丁巳九日戊午十日辛巳十月三日也有日無月案孔穎逹正義云此年八月庚辰朔二日則辛巳九月不得有辛巳也更盈一周則六十二日月有一大一小十月己卯朔三日得辛巳是有日無月也哀公元年正月戊申小二月丁丑大三月丁未小四月丙子大五月丙午小六月乙亥大七月乙巳小八月甲戌大九月甲辰小十月癸酉大十一月癸卯小十二月壬申大四月辛巳六日哀公二年正月壬寅小二月辛未大三月辛丑小四月庚午大五月庚子大六月庚午小七月己亥大八月己巳小九月戊戌大十月戊辰小十一月丁酉大閏十一月丁卯小十二月丙申大二月癸巳二十三日四月丙子七日六月乙酉十六日八月甲戌六日哀公三年正月丙寅小二月乙未大三月乙丑小四月甲午大五月甲子小六月癸巳大七月癸亥大八月癸巳小九月壬戌大十月壬辰小十一月辛酉大十二月辛卯小四月甲午一日五月辛卯二十八日六月癸卯十一日七月丙子十四日十月癸卯十二日癸丑二十二日哀公四年正月庚申大二月庚寅小三月己未大四月己丑小五月戊午大六月戊子小七月丁巳大八月丁亥小九月丙辰大十月丙戌小十一月乙卯大十二月乙酉大二月庚戌二十一日六月辛丑十四日七月庚午十四日八月甲寅二十八日哀公五年正月乙卯小二月甲申大三月甲寅小四月癸未大五月癸丑小六月壬午大七月壬子小八月辛巳大九月辛亥小十月庚辰大經閏十月庚戌小案是年閏月獨見于經故加經字又案趙汸春秋屬辭引長厯是年閏十月與本文合孔穎逹正義稱長厯是年閏十一月蓋𫝊寫之訛十一月己卯大十二月己酉小九月癸酉二十三日哀公六年正月戊寅大二月戊申小三月丁丑大四月丁未小五月丙子大六月丙午小七月乙亥大八月乙巳大九月乙亥小十月甲辰大十一月甲戌小十二月癸卯大六月戊辰二十三日七月庚寅十六日十月丁卯二十四日哀公七年正月癸酉小二月壬寅大三月壬申小四月辛丑大五月辛未小六月庚子大七月庚午小八月己亥大九月己巳小十月戊戌大十一月戊辰小十二月丁酉大閠十二月丁卯小八月己酉十一日哀公八年正月丙申大二月丙寅大三月丙申小四月乙丑大五月乙未小六月甲子大七月甲午小八月癸亥大九月癸巳小十月壬戌大十一月壬辰小十二月辛酉大十二月癸亥三日哀公九年正月辛卯小二月庚申大三月庚寅小四月己未大五月己丑小六月戊午大七月戌子小八月丁巳大九月丁亥大十月丁巳小十一月丙戌大十二月丙辰小二月甲戌十五日哀公十年正月乙酉大二月乙卯小三月甲申大四月甲寅小五月癸未大閏五月癸丑小六月壬午大七月壬子小八月辛巳大九月辛亥小十月庚辰大十一月庚戌小十二月己卯大三月戊戌十五日哀公十一年正月己酉小二月戊寅大三月戊申大四月戊寅小五月丁未大六月丁丑小七月丙午大八月丙子小九月乙巳大十月乙亥小十一月甲辰大十二月甲戌小五月壬申二十六日甲戌二十八日七月辛酉十六日哀公十二年正月癸卯大二月癸酉小三月壬寅大四月壬申小五月辛丑大六月辛未小七月庚子大八月庚午小九月己亥大十月己巳大十一月己亥小十二月戊辰大五月甲辰四日十二月螽季孫問諸仲尼仲尼曰某聞之火伏而後蟄者畢今火猶西流司厯過也諸儒皆以為時實周之九月而書十二月謂之再失閏若如其言乃成三失非但再也今以長厯推春秋此十一月乃夏之九月實周之十一月也此年當有閏而今不置閏此為失一閏月耳十二月不應更有螽故季孫問之案正義引釋例問之作怪之仲尼以斗建在戌火星尚未見沒據今猶見故言猶西流也案孔頴逹正義云月令季夏之月昏火星中詩云七月流火毛傳云流下也謂昏而見於西南漸下流也周禮司爟云季氏内火是九月之昏火始入十月之昏則伏火猶西流者言其未盡沒是夏九月也明夏之九月尚可有螽也季孫雖聞仲尼此言猶不即改明年十二月復螽于是始悟十四年春乃置閏欲以補正時厯也𫝊于十五年書閏月葢置閏正之欲明十五年之閏於法當在十二年也十二月丙申二十九日哀公十三年正月戌戌小二月丁卯大三月丁酉小四月丙寅大五月丙申小六月乙丑大七月乙未小八月甲子大九月甲午小十月癸亥大十一月癸巳小十二月壬戌大六月丙子十二日乙酉二十一日丙戌二十二日丁亥二十三日七月辛丑七日十二月螽此年猶未置閏故十二月螽也哀公十四年正月壬辰小二月辛酉大閏二月辛卯小三月庚申大四月庚寅大五月庚申小六月己丑大七月己未小八月戊子大九月戊午小十月丁亥大十一月丁巳小十二月丙戌大四月庚戌二十一日五月庚申朔日食一日壬申十三日庚辰二十一日六月甲午六日八月辛丑十四日哀公十五年正月丙辰小二月乙酉大三月乙卯小四月甲申大五月甲寅小六月癸未大七月癸丑小八月壬午大九月壬子小十月辛巳大十一月辛亥小十二月庚辰大𫝊閏十二月庚戌小案是年𫝊有閏月之文故此條獨加𫝊字哀公十六年正月己卯大二月己酉大三月己卯小四月戊申大五月戊寅小六月丁未大七月丁丑小八月丙午大九月丙子小十月乙巳大十一月乙亥小十二月甲辰大正月己卯一日四月己丑四月十八日有乙丑無己丑己丑五月十二日也日月必有誤哀公十七年正月甲戌小二月癸卯大三月癸酉小四月壬寅大五月壬申大六月壬寅小七月辛未大八月辛丑小九月庚午大十月庚子小十一月己巳大十二月己亥小七月己卯九日十一月辛巳十三日哀公十八年正月戊辰大二月戊戌小三月丁卯大四月丁酉小五月丙寅大六月丙申小七月乙丑大八月乙未大九月乙丑小十月甲午大閏十月甲子小十一月癸巳大十二月癸亥小哀公十九年正月壬辰大二月壬戌小三月辛卯大四月辛酉小五月庚寅大六月庚申小七月己丑大八月己未小九月戊子大十月戊午大十一月戊子小十二月丁巳大哀公二十年正月丁亥小二月丙辰大三月丙戌小四月乙卯大五月乙酉小六月甲寅大七月甲申小八月癸丑大九月癸未小十月壬子大十一月壬午小十二月辛亥大哀公二十一年正月辛巳大二月辛亥小三月庚辰大四月庚戌小五月己卯大六月己酉小七月戊寅大八月戊申小九月丁丑大閏九月丁未小十月丙子大十一月丙午小十二月乙亥大哀公二十二年正月乙巳小二月甲戌大三月甲辰大四月甲戌小五月癸卯大六月癸酉小七月壬寅大八月壬申小九月辛丑大十月辛未小十一月庚子大十二月庚午小十一月丁卯二十八日哀公二十三年正月己亥大二月己巳小三月戊戌大四月戊辰小五月丁酉大六月丁卯大七月丁酉小八月丙寅大九月丙申小十月乙丑大十一月乙未小十二月甲子大六月壬辰二十六日哀公二十四年正月甲午小二月癸亥大三月癸巳小四月壬戌大五月壬辰小六月辛酉大七月癸卯小八月庚申大九月庚寅大十月庚申小𫝊閏十月己亥大案傳有閏月公如越之文故是條特加𫝊字十一月己未小十二月戊子大哀公二十五年正月戊午小二月丁亥大三月丁巳小四月丙戌大五月丙辰小六月乙酉大七月乙卯小八月甲申大九月甲寅小十月癸未大十一月癸丑大十二月癸未