body:
  text: 春秋釋例卷十四晉杜預撰經傳長厯第四十五之五襄公元年正月庚戌大二月庚辰小三月己酉大四月己卯大五月己酉小六月戊寅大七月戊申小八月丁丑大九月丁未小十月丙子大十一月丙午小十二月乙亥大正月己亥正月無己亥誤也案傳云元年春己亥圍宋彭城杜預集解云下有二月即此己亥為正月正月無己亥日誤孔頴逹正義申之云長厯推此年正月庚戌朔其月無己亥圍宋彭城經在正月之下傳文下有二月則己亥必是正月月不容誤知是日誤也九月辛酉十五日襄公二年正月乙巳小二月甲戌大三月甲辰小四月癸酉大閏四月癸卯小五月壬申大六月壬寅大七月壬申小八月辛丑大九月辛未小十月庚子大十一月庚午小十二月己亥大五月庚寅十九日六月庚辰七月九日也書於六月經誤也案孔穎逹正義云經云六月庚辰鄭伯睔卒傳言七月庚辰鄭伯辰卒杜以長厯校之此年六月士寅朔其月無庚辰七月壬申朔九日得庚辰則傳與經合知傳是而經誤也此經六月七月其文皆具所言誤者非徒字誤而已乃是書經誤以七月之事錯書六月故長厯云書于六月經誤言元本書之誤非字誤也七月庚辰九日己丑十八日襄公三年正月己巳小二月戊戌大三月戊辰小四月丁酉大五月丁卯大六月丁酉小七月丙寅大八月丙申小九月乙丑大十月乙未小十一月甲子大十二月甲午小四月壬戌二十六日六月己未二十三日戊寅七月十三日也據傳盟在秋經誤也襄公四年正月癸亥大二月癸巳小三月壬戌大四月壬辰小五月辛酉大六月辛卯大七月辛酉小八月庚寅大九月庚申小十月己丑大十一月己未小十二月戊子大三月己酉三月無己酉二月十七日也經書己酉傳言三月誤也七月戊子二十八日八月辛亥二十二日襄公五年正月戊午小二月丁亥大三月丁巳小四月丙戌大閏四月丙辰小五月乙酉大六月乙卯大七月乙酉小八月甲寅大九月甲申小十月癸丑大十一月癸未小十二月壬子大九月丙午二十三日十一月甲午十二日十二月辛未二十日襄公六年正月壬午小二月辛亥大三月辛巳小四月庚戌大五月庚辰小六月己酉大七月己卯大八月己酉小九月戊寅大十月戊申小十一月丁丑大十二月丁未小三月壬午二日於鄭子國之來聘也四月甲寅五年四月二十九日也杞桓公卒之月乙未此年三月十五日也丁未此年三月二十七日也十二月丙辰十日案此齊滅萊之日也經文本云十有二月齊侯滅萊而近刻左傳前則曰十一月齊侯滅萊萊恃謀也後則曰晏弱圍十一月丙辰而滅之遷萊于鄉今考十一月丁丑朔是月無丙辰十二月丁未朔十日正是丙辰長厯繫此條于十二月不言日誤可見今本傳文兩言十一月皆十二月之訛也又程公說春秋分記亦繫丙辰于十二月下可見南宋時左傳本尚未訛緣各本俱誤謹訂于此襄公七年正月丙子大二月丙午小三月乙亥大四月乙巳小五月甲戌大六月甲辰小七月癸酉大八月癸卯大九月癸酉小十月壬寅大閏十月壬申小十一月辛丑大十二月辛未小十月庚戌九日壬戌二十一日十二月丙戌十六日襄公八年正月庚子大二月庚午小三月己亥大四月己巳小五月戊戌大六月戊辰小七月丁酉大八月丁卯小九月丙申大十月丙寅大十一月丙申小十二月乙丑大四月庚辰十二日庚寅二十二日五月甲辰七日襄公九年正月乙未小二月甲子大三月甲午小四月癸亥大五月癸巳小六月壬戌大七月壬辰小八月辛酉大九月辛卯小十月庚申大十一月庚寅小十二月己未大傳閏月五月辛酉二十九日八月癸未二十三日十月庚午十一日甲戌十五日十一月己亥十日十二月己亥參校上下己亥在十一月十日又十二月五日有癸亥癸亥五日則書之傳其月不得有己亥經書十二月誤也案孔穎逹正義云經書十二月己亥同盟于戲傳言十一月己亥同盟于戲經傳不同必有一誤而傳于戲盟之下更言十二月癸亥門其三門己亥在癸亥之前二十四日今以長厯推之十一月庚寅朔十日得己亥十二月己未朔五日得癸亥故長厯參校上下己亥在十一月十日又十二月五日有癸亥則其月不得有己亥經書十二月誤也此誤者唯以一字誤為二非書經誤也十二月癸亥五日閏月戊寅參校上下此年不得有閏月戊寅乃是十二月二十日也思惟古傳文必言癸亥門其三門門五日戊寅相去十六日癸亥門其三門門各五日為十五日明日戊寅濟于隂阪于叙事及厯皆合然則五字上與門合為閏後學者自然轉日為月也傳曰晉人不得志于鄭以諸侯復伐之十二月癸亥門其三門門則向所代鄟門師之梁及北門也晉人三番四軍以三番為待楚之備一番進攻欲以苦鄭而來楚也五日一移楚不來故侵掠而還殆必如此不然則二字誤案孔頴逹正義云衛氏難云案昭二十年朔旦冬至其年云閏月戊辰殺宣姜又二十三年云閏月取前城並不應有閏而傳稱閏是史之錯失不必皆在應閏之限杜豈得云此年不得有閏而改為門五日也若然閏月殺宣姜閏月取前城皆為門五日乎秦氏釋云以傳云三分四軍又云十二月癸亥門其三門既言三分則三番攻門計癸亥至戌寅十六日畨别攻門五日三五十五日明日戊寅濟于隂阪上下符合故杜為此解蘇氏又云案長厯襄十年十一月丁未是二十四日十一年四月己亥是十九日據丁未至己亥一百七十三日計十年十一月之後十一年四月之前餘兩箇殘月唯置四箇整月用日不盡尚餘二十九日故杜為長厯于十年十一月後置閏既十年有閏明九年無閏也襄公十年正月己丑小二月戊午大三月戊子大四月戊午小五月丁亥大六月丁巳小七月丙戌大八月丙辰小九月乙酉大十月乙卯小十一月甲申大閏十一月甲寅小十二月癸未大三月癸丑二十六日案孔穎逹正義云杜明言癸丑是三月二十六日下四月戊午云月一日五月庚寅云月四日甲午云月八日者欲證前九年閏月為門五日于上下日月相當故杜備言其日也劉炫曰杜言癸丑二十六日者見與下四月一日㑹相近知非二㑹也四月戊午一日丙寅九日五月庚寅四日甲午八日六月庚午十四日八月丙寅十一日九月己酉二十五日十月戊辰十四日十一月己亥十六日丁未二十四日襄公十一年正月癸丑小二月壬午大三月壬子小四月辛巳大五月辛亥小六月庚辰大七月庚戌小八月己亥大九月己酉小十月戊寅大十一月戊申大十二月戊寅小四月己亥十九日七月己未十日丙子二十七日九月甲戌二十六日十月丁亥十日十二月戊寅一日庚辰三日壬午五日己丑十二日襄公十二年正月丁未大二月丁丑小三月丙午大四月丙子小五月乙巳大六月乙亥小七月甲辰大八月甲戌小九月癸卯大十月癸酉小十一月壬寅大十二月壬申小襄公十三年正月辛丑大二月辛未大三月辛丑小四月庚午大五月庚子小六月己巳大七月己亥小八月戊辰大閏八月戊戌小九月丁卯大十月丁酉小十一月丙寅大十二月丙申小九月庚辰十四日襄公十四年正月乙丑大二月乙未小三月甲子大四月甲午小五月癸亥大六月癸巳大七月癸亥小八月壬辰大九月壬戌小十月辛卯大十一月辛酉小十二月庚寅大二月乙未朔日食一日四月己未二十六日襄公十五年正月庚申小二月己丑大三月己未小四月戊子大五月戊午小六月丁亥大七月丁巳大八月丁亥小九月丙辰大十月丙戌小十一月乙卯大十二月乙酉小二月己亥十一日八月丁巳日食八月無丁巳七月一日也日月必有誤十一月癸亥九日襄公十六年正月甲寅大二月甲申小三月癸丑大四月癸未小五月壬子大六月壬午小七月辛亥大八月辛巳小九月庚戌大十月庚辰小閏十月己酉大十一月己卯小十二月戊申大三月戊寅二十六日五月甲子十三日六月庚寅九日襄公十七年正月戊寅小二月丁未大三月丁丑小四月丙午大五月丙子小六月乙巳大七月乙亥小八月甲辰大九月甲戌小十月癸卯大十一月癸酉小十二月壬寅大二月庚午二十四日十一月甲午二十二日襄公十八年正月壬申小二月辛丑大三月辛未小四月庚子大五月庚午小六月己亥大七月己巳小八月戊戌大九月戊辰小十月丁酉大十一月丁卯小十二月丙申大十月丙寅晦三十日十一月丁卯朔一日己卯十三日乙酉十九日十二月戊戌三日己亥四日壬寅七日甲辰九日襄公十九年正月丙寅小二月乙未大三月乙丑小四月甲午大五月甲子小六月癸巳大七月癸亥大八月癸巳小九月壬戌大閏九月壬辰小十月辛酉大十一月辛卯小十二月庚申大二月甲寅二十日五月壬辰晦二十九日四月丁未十四日七月辛卯二十九日八月甲辰十二日丙辰二十四日襄公二十年正月庚寅小二月己未大三月己丑小四月戊午大五月戊子大六月戊午小七月丁亥大八月丁巳小九月丙戌大十月丙辰小十一月乙酉大十二月乙卯小正月辛亥二十二日六月庚申三日十月丙辰朔日食一日襄公二十一年正月甲申大二月甲寅小三月癸未大四月癸丑大五月癸未小六月壬子大七月壬午小八月辛亥大閏八月辛巳小九月庚戌大十月庚辰小十一月己酉大十二月己卯小九月庚戌朔日食一日十月庚辰朔日食一日襄公二十二年正月戊申大二月戊寅大三月戊申小四月丁丑大五月丁未小六月丙子大七月丙午小八月乙亥大九月乙巳小十月甲戌大十一月甲辰小十二月癸酉大七月辛酉十六日九月己巳二十五日十二月丁巳十二月無丁巳十一月十四日也日月必誤也襄公二十三年正月癸卯大二月癸酉小三月壬寅大四月壬申小五月辛丑大六月辛未小七月庚子大八月庚午小九月己亥大十月己巳小十一月戊戌大十二月戊辰小二月癸酉朔日食一日三月己巳二十八日八月己卯十日十月乙亥七日襄公二十四年正月丁酉大二月丁卯小三月丙申大閏三月丙寅小四月乙未大五月乙丑小六月甲午大七月甲子小八月癸巳大九月癸亥大十月癸巳小十一月壬戌大十二月壬辰小七月甲子朔日食既一日八月癸巳朔日食一日襄公二十五年正月辛酉大二月辛卯小三月庚申大四月庚寅小五月己未大六月己丑小七月戊午大八月戊子小九月丁巳大十月丁亥小十一月丙辰大十二月丙戌小五月甲戌十六日乙亥十七日丁丑十九日辛巳二十三日丁亥二十九日六月壬子二十四日七月己巳十二日八月己巳八月無己巳七月十二日然則經誤也十月甲午八日襄公二十六年正月乙卯大二月乙酉小三月甲寅大四月甲申大五月甲寅小六月癸未大七月癸丑小八月壬午大九月壬子小十月辛巳大十一月辛亥小十二月庚辰大閏十二月庚戌小二月庚寅六日辛卯七日甲午十日三月甲寅朔一日八月壬午一日十二月乙酉六日襄公二十七年正月己卯大二月己酉大三月己卯小四月戊申大五月戊寅小六月丁未大七月丁丑小八月丙午大九月丙子小十月乙巳大十一月建申乙亥大閏十一月建酉乙巳小後閏建戌甲戌大十二月建亥甲辰小五月甲辰二十七日丙午二十九日六月丁未朔一日戊申二日甲寅八日丙辰十日壬戌十六日丁卯二十一日戊辰二十二日庚午二十四日壬申二十六日七月戊寅二日庚辰四日辛巳五日壬午六日乙酉九日九月庚辰五日辛巳六日經書十二月乙亥朔日有食之傳曰十一月乙亥朔日有食之辰在申司厯過也再失閏矣注乙亥十一月朔也若是十二月朔則為三失閏傳不得言再失閏也以厯推之經書十二月誤也案孔穎逹正義云傳曰辰在申若是十二月當為辰在亥以申為亥則是三失閏非再失也推長厯與傳合知傳是而經誤也閏者㑹集數年餘日因置以要之案此句正義引釋例作因冝以安之故閏月無中氣斗建斜指兩辰之間也魯之司厯漸失其閏至此年日食之月以儀審望知斗建之在申斗建在申乃是周家九月也而其時厯稱十一月故知再失閏也案杜預集解云文十一年三月甲子至今年七十一歲應有二十六閏今長厯推得二十四閏通計少再閏孔頴逹正義申之云厯法十九年為一章章有七閏從文十一年至襄十三年凡五十七年己成三章當有二十一閏又從襄十四年至今為十四年又當有五閏故為應有二十六閏也劉炫云逺取文十一年三月甲子者以三十年絳縣老人云臣生之歲正月甲子朔以全日故又云言通計者若據前閏以來短計不得有再失之理今逺從文十一年以來計之是為通計也于是始覺其謬遂頓置兩閏以應天正以叙事期然則前閏月為建酉後閏月為建戌十二月為建亥而歲終焉是以明年經書春無冰𫝊以為時災也若不頓置兩閏則明年春是今之九月十月十一月也今之九月十月十一月無冰非天時之異無緣總書春也尋案今世所謂魯厯者不與春秋相符殆末世好事者為之非真也今俱不知其法術且依春秋經傳反覆其終始以求之近得其實矣春秋終始閏法别見此下三十年也襄公二十八年正月癸酉大二月癸卯小三月壬申大四月壬寅小五月辛未大六月辛丑小七月庚午大八月庚子小九月己巳大十月己亥小十一月戊辰大十二月戊戌小十月丙辰十八日十一月乙亥八日丁亥二十日癸巳二十六日十二月乙亥朔書十二月無乙亥朔日誤甲寅十七日乙未十二月無乙未日誤也案孔穎逹正義云甲寅之後四十二日始得乙未則甲寅乙未不得同月長厯推此年十二月戊戌朔甲寅是十七日其月無乙未也經有十一月十二月月不容誤知日誤也襄公二十九年正月丁卯大二月丁酉小三月丙寅大四月丙申大五月丙寅小六月乙未大七月乙丑小八月甲午大閏八月甲子小九月癸巳大十月癸亥小十一月壬辰大十二月壬戌小二月癸卯七日五月庚午五日九月乙未三日十月庚寅二十八日十一月乙卯二十四日十二月己巳八日襄公三十年正月辛卯大二月辛酉小三月庚寅大四月庚申小五月己丑大六月己未小七月戊子大八月戊午小九月丁亥大十月丁巳小十一月丙戌大十二月丙辰大二月癸未二十三日也㑹于承筐之歲其嵗文十一年至襄三十年七十四嵗其歲三月甲子朔絳人稱正月甲子朔者以夏正月數故師曠于此年曰七十三年案孔頴逹正義云文十一年至此年為七十四年而止云七十三年案文十一年正月甲子朔為夏之正月是其年三月也此年之二月癸未是夏之十二月計為七十三年猶尚年未終也然則起文十一月三月甲子朔盡襄三十年二月二十三日癸未七十三年積二萬六千六十日也其間有二十七閏率三十二月有竒則一年積閏也今計至襄二十七年十一月乙亥朔凡有二萬五千七百五十二日故傳曰再失閏也從乙亥朔之後至襄三十年二月癸未其間當九千八百五十日而有九千九百八日長五十八日再失閏復于此也雖不知春秋時厯本術今則用此驗衆閏從文十年上盡隱之前年一百七年三十九閏又從襄三十年下盡哀二十七年七十六年二十八閏閏之大數皆與古今衆家法符雖春秋安閏小有失文大凡二百五十年內有九十四閏亦無違也案孔穎逹正義云假作全年算之置七十有三年以全日三百六十五日乘之已得二萬六千六百四十五也每年有四分日之一是四年而成一日以四除七十三年又得十八日并全日為二萬六千六百六十三日計終此十二月盡有二萬六千六百六十三日四分日之一今除去三日四分日之一整取六旬合當十二月二十七日今杜長厯云二十三日癸未是少四日所以不與長厯同者蓋杜為長厯納凖春秋日月與長厯不同故置閏逺近不定蓋七十三年之內于常厯校四箇大月而剩用四日故癸未為二十三日若依常厯是二十七日也劉炫云所以少三日者文十一年非首章年其間閏有前却故長厯此月辛酉朔二十三日得癸未來月庚寅朔計至朔長三日長厯去年閏八月由閏近故也四月己亥十六日案傳云夏四月己亥鄭伯及其大夫盟考四月庚申朔無己亥十六日乃乙亥也程公說春秋分記四月下注云十五日乙亥己亥疑是乙亥之誤戊子二十九日五月癸巳五日甲午六日七月庚子十三日辛丑十四日壬寅十五日癸卯十六日乙巳十八日八月甲子七日己巳十二日襄公三十一年正月丙戌小二月乙卯大三月乙酉小四月甲寅大五月甲申小六月癸丑大七月癸未小八月壬子大九月壬午小十月辛亥大十一月辛巳小十二月庚戌大六月辛巳二十九日九月癸巳十二日己亥十八日十月癸酉二十三日昭公元年正月庚辰小二月己酉大三月己卯小四月戊申大五月戊寅小六月丁未大七月丁丑小八月丙午大九月丙子小十月乙巳大十一月乙亥小十二月甲辰大閏十二月甲戌大正月乙未十六日三月甲辰二十六日五月庚辰三日癸卯二十六日六月丁巳十一日十一月己酉十二月有甲辰朔則十一月不得有己酉己酉十二月六日也經傳言十一月誤也又晉蒸及趙孟適南陽皆在甲辰朔之前即是十一月也然則傳文十二月誤也案孔穎逹正義云杜謂十一月誤者正謂十一月不得有己酉以己酉為誤十一月非誤也必知然者若以為十二月己酉則六日己酉子干奔晋至晉猶見趙孟七日庚戌趙孟卒便是日相切迫無相見之理故知日一月為是己酉為誤劉炫以為杜云誤者以十一月為誤當是十二月而規杜氏非也劉炫規云杜言十一月誤當為十二月案下文趙孟庚戌卒若是郟敖今日死趙孟明日卒則子干奔晉不得見趙孟而議其祿故謂十一月是己酉字誤也𫝊先釋經十二月事下乃更言十一月也十二月甲辰朔一日己酉六日庚戌七日案傳云晉既蒸趙孟適南陽將㑹孟子餘甲辰朔蒸于溫庚戌卒杜預集解云甲辰十二月朔晉既蒸趙氏乃蒸其家廟則晉蒸當在甲辰之前傳言十二月誤孔穎逹正義申之云杜以十二月晉既蒸趙孟始適南陽則趙孟初行己是十二月也傳乃云甲辰朔蒸于溫案文言之則是來年正月朔也服䖍云甲辰朔夏十一月朔也若是夏十一月朔當于明年言之而此年說之何也杜以服言不通故為此解云晉既蒸趙孟乃蒸其家廟則晋蒸當在甲辰之前當言十一月傳言十二月月誤也劉炫以為晋蒸及趙孟適南陽並在十一月之前文繫十二月者欲見蒸後即行先公後私十二月之文為下甲辰朔起本舉月遙屬下明晉蒸猶在朔前十二月非誤也若必如劉言𫝊當云晋既蒸趙孟適南陽將㑹孟子餘十二月甲辰朔蒸于溫足明先公後私之義何須虛張十二月于上遙為甲辰朔起本傳文上下未有此例劉炫之言非也昭公二年正月甲辰小二月癸酉大三月癸卯小四月壬申大五月壬寅小六月辛未大七月辛丑小八月庚午大九月庚子小十月己巳大十一月己亥小十二月戊辰大七月壬寅二日昭公三年正月戊戌大二月戊辰小三月丁酉大四月丁卯小五月丙申大六月丙寅小七月乙未大八月乙丑小九月甲午大十月甲子小十一月癸巳大十二月癸亥小正月丁未十日昭公四年正月壬辰大二月壬戌小三月壬辰小四月辛酉大閏四月辛卯小五月庚申大六月庚寅小七月己未大八月己丑小九月戊午大十月戊子小十一月丁巳大十二月丁亥小六月丙午十七日八月甲申八月無甲申七月二十六日也上有七月下有九月則誤在日也案孔穎逹正義云長厯推此年七月己未朔二十六日得甲申八月己丑朔其月無甲申而𫝊上有七月下有九月月不容誤故知日誤十二月癸丑二十七日乙卯二十九日昭公五年正月丙辰大二月丙戌大三月丙辰小四月乙酉大五月乙卯小六月甲申大七月甲寅小八月癸未大九月癸丑小十月壬午大十一月壬子小十二月辛巳大七月戊辰十五日昭公六年正月辛亥小二月庚辰大三月庚戌大四月庚辰小五月己酉大六月己卯小七月戊申大閏七月戊寅小八月丁未大九月丁丑小十月丙午大十一月丙子小十二月乙巳大六月丙戌八日昭公七年正月乙亥小二月甲辰大三月甲戌大四月甲辰小五月癸酉大六月癸卯小七月壬申大八月壬寅小九月辛未大十月辛丑小十一月庚午大十二月庚子小正月癸巳十九日二月戊午十五日四月甲辰朔日食一日鑄刑書之嵗二月或夢伯有介而行曰壬子余將殺帶也壬子六年三月三日也或人以二月夢帶以三月三日卒明年壬寅余又將殺假也壬寅此年正月二十八日八月戊辰二十七日十月辛酉二十一日十一月癸未十四日十二月癸亥二十四日昭公八年正月己巳大二月己亥小三月戊辰大四月戊戌小五月丁卯大六月丁酉小七月丙寅大八月丙申大閏八月丙寅小九月乙未大十月乙丑小十一月甲午大十二月甲子小三月甲申十七日四月辛丑四日辛亥十四日七月甲戌九日丁丑十二日八月庚戌十五日十月壬午十八日十一月壬午十一月無壬午壬午十月十八日𫝊誤也昭公九年正月癸巳大二月癸亥小三月壬辰大四月壬戌小五月辛卯大六月辛酉小七月庚寅大八月庚申小九月己丑大十月己未小十一月戊子大十二月戊午大二月庚申二月無庚申庚申三月二十九日必有誤也經書夏四月陳災鄭禆竈曰今火出而火陳昭十七年梓慎曰火出于周為五月也閏當在此年五月後誤在前年故火以四月出案孔頴逹正義云長厯以為前年閏八月則此年四月五日得中氣二十日得五月莭故四月得火出昭公十年正月戊子小二月丁巳大三月丁亥小四月丙辰大五月丙戌小六月乙卯大七月乙酉小八月甲寅大九月甲申小十月癸丑大十一月癸未小十二月壬子大五月庚辰五月無庚辰四月二十五日也日月必有誤也七月戊子四日十二月甲子十三日昭公十一年正月壬午大二月壬子小三月辛巳大四月辛亥小五月庚辰大六月庚戌小七月己卯大八月己酉小九月戊寅大十月戊申小十一月丁丑大十二月丁未小三月丙申十六日四月丁巳七日五月甲申五日九月己亥二十二日十一月丁酉二十一日昭公十二年正月丙子大閏正月丙午小二月乙亥大三月乙巳小四月甲戌大五月甲辰小六月癸酉大七月癸卯小八月壬申大九月壬寅大十月壬申小十一月辛丑大十二月辛未小三月壬申二十八日八月壬午十一日十月壬申朔一日丙申二十五日丁酉二十六日昭公十三年正月庚子大二月庚午小三月己亥大四月己巳小五月戊戌大六月戊辰小七月丁酉大八月丁卯小九月丙申大十月丙寅小十一月乙未大十二月乙丑小五月乙卯十八日丙辰十九日癸亥二十六日七月丙寅三十日八月辛未五日壬申六日癸酉七日甲戌八日昭公十四年正月甲午大二月甲子大三月甲午小四月癸亥大五月癸巳小六月壬戌大七月壬辰小八月辛酉大九月辛卯小十月庚申大十一月庚寅小十二月己未大九月甲午四日昭公十五年正月己丑小二月戊午大三月戊子小四月丁巳大五月丁亥大六月丁巳小七月丙戌大八月丙辰小九月乙酉大閏九月乙卯小十月甲申大十一月甲寅小十二月癸未大二月癸酉十六日六月丁巳朔日食一日乙