body:
  text: 春秋釋例卷三晉杜預撰災異例第十三案此篇永樂大典全闕釋例曰物者雜而言之則昆蟲草木之類也大而言之則歳時日月星辰之謂也歳者水旱饑饉也時者寒暑風雨雷電雪霜也日月者薄食夜明也星辰者彗字霣錯失其次也山崩地震者陽伏而不能出隂迫而不能升也凡天反其時地反其物以害其物性皆為妖災宣十五年正義引釋例天人之際或異而無感或感而不可知沙鹿崩固謂期年必有大咎梁山崩則云山有朽壤而自崩此皆聖賢之讜言逹者所宜先識僖十四年正義引釋例陳既已滅䧏為楚縣而書陳災者猶晉之梁山沙鹿崩不書晉也災害係于所災所害故以所在為名僖十四年正義引釋例案宣十五年𫝊民反徳為亂正義云民謂人也感動天地皆是人君感之非庶民也昭七年傳曰國無政不用善則自取謫于日月之災言以政取謫是其由君不由民以民表人故釋例引此即改民為人是其民謂人也今無從攷釋例全文附錄于此崩薨卒例第十四案此篇見永樂大典惟篇目佚今補隠十一年冬十有一月壬辰公薨傳曰壬辰羽父使賊弑公于寪氏不書𦵏不成喪也桓十八年夏四月丙子公薨于齊傳曰公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乘公公薨于車閔二年秋八月辛丑公薨傳曰秋八月辛丑共仲使卜齮賊公于武闈僖三十三年冬十有二月云云乙巳公薨于小寢傳曰冬云云公薨于小寢即安也成十八年秋云云八月云云己丑公薨于路寢傳曰己丑公薨于路寢言道也昭三十二年冬云云十有二月己未公薨于乾侯傳曰己未公薨云云書曰公薨于乾侯言失其所也隠七年春王三月云云滕侯卒傳曰春滕侯卒不書名未同盟也傳例曰凡諸侯同盟于是稱名故薨則赴以名告終稱嗣也以繼好息民謂之禮經桓五年春正月甲戌己丑陳侯鮑卒傳曰春正月甲戌己丑陳侯鮑卒再赴也于是陳亂文公子佗殺太子免而代之公疾病而亂作國人分散故再赴僖四年夏許男新臣卒傳曰許穆公卒于師𦵏之以侯禮也傳例曰凡諸侯薨于朝㑹加一等死王事加二等于是有以袞歛二十三年冬十有一月把子卒傳曰把成公卒書曰子把夷也不書名未同盟也傳例曰凡諸侯同盟死則赴以名禮也赴以名則亦書之不然則否避不敏也二十七年夏六月庚寅齊侯昭卒傳曰夏齊孝公卒有齊怨不廢喪紀禮也文三年夏五月王子虎卒傳曰夏四月乙亥王叔文公卒來赴弔如同盟禮也成十三年夏五月云云曹伯廬卒于師傳曰公㑹晉侯伐秦云云曹宣公卒于師襄六年春王三月壬午把伯姑容卒傳曰把桓公卒始赴以名同盟故也七年冬云云十有二月云云鄭伯髠頑如㑹未見諸侯丙戌卒于鄵傳曰及將㑹于鄬云云及鄵子駟使賊夜弑僖公而以瘧疾赴于諸侯十二年秋九月呉子乘卒傳曰秋呉子夀夢卒臨于周廟禮也傳例曰凡諸侯之喪異姓臨于外同姓于宗廟同宗于祖廟同族于禰廟是故魯為諸姫臨于周廟為凡蔣邢茅胙祭臨于周公之廟昭元年冬十有一月己酉楚子麇卒傳曰楚公子圍將聘于鄭云云聞王有疾而還云云入問王疾縊而弑之云云𦵏王于郟謂之郟敖三年春王正月丁未滕子原卒傳曰丁未滕子原卒同盟故書名六年春王正月把伯益姑卒傳曰把文公卒弔如同盟禮也二十五年冬云云十有一月己亥宋公佐卒于曲棘傳曰宋元公將為公故如晉云云己亥卒于曲棘三十一年夏四月丁巳薛伯榖卒傳曰薛伯榖卒同盟故書定四年夏云云五月把伯成卒于㑹十四年夏云云五月云云呉子光卒傳曰呉伐越越子句踐禦之陳于檇李云云靈姑浮以戈擊闔閭闔閭傷將指取其一履還卒于陘去檇李七里哀十年春云云三月戊戌齊侯陽生卒傳曰公㑹呉子伐齊云云齊人弑悼公赴于師呉子三日哭于軍門之外昭二十二年冬十月王子猛卒傳曰十一月乙酉王子猛卒不成喪也莊三十二年冬十月己未子般卒傳曰子般即位次于黨氏冬十月己未共仲使圉人犖賊子般于黨氏文十八年冬十月子卒傳曰冬十月仲殺惡及視而立宣公書曰子卒諱之也襄三十一年秋九月癸巳子野卒傳曰毁也右崩薨卒一百五十錯綜其三十一以包通之釋例曰天子曰崩諸侯曰薨大夫曰卒古之制也春秋所稱曲存魯史之義内稱公而書薨所以自尊其君則不得不畧外諸侯書卒以自異也至于既𦵏雖邾許子男之君皆稱諡而言公各順臣子之辭兩通其義也諸侯同盟皆稱名以接神故薨則臣子必以名赴同盟之國告亡君之終稱今君之嗣好惡由之故傳曰有齊怨不廢喪紀禮也盟載之辭下逮子子孫孫當奉而弗忘故云繼好好同則相親相親則不爭故曰息民也把子䧏爵嫌有異同故傳重發不書之例又更發凡者以明雖薨赴有法若或違之國史亦承告而書不必改正也把伯姑容未與襄同盟而事逮其父王子虎又未接于文嘗與僖同盟故皆用同盟之禮蓋繼好之義也嫌于赴非所盟之君又天子公卿其禮或異故傳曰始赴以名同盟故也又曰弔如同盟各以正所疑也赴以名則亦書之者諸侯雖不同盟或以名赴也不然則否避不敏者謂雖同盟而赴不以名則亦不書名以審違謬也益姑之卒傳重復發者有奪田之忿而不廢喪紀故稱禮以明之也陳人再赴兩書其日齊緩告亂書以十二月天王偽赴遂用其虚明日月闕否亦從赴辭子駟實弑僖公赴以瘧疾而經從之楚弑郟敖齊弑陽生皆其類也君子不變其文以慎其疑案二句永樂大典正二其字從隠三年無義所引釋例増且虚實相生隨而表之真偽之情可以兩見承赴而書之亦所以示將來許穆公卒于師呉子夀夢卒臨于周廟公登觀臺必書雲物傳皆發凡以言例經皆無異議諸若此蓋周之舊禮傳因事以存于經則常事不書也若卒于朝會或書師或書地者史之成文非義例所存也至于魯公之薨則皆書地成公薨路寢傳稱得道昭薨乾侯言失其所詳内事謹凶變也其未成君而卒者案莊二年正義引釋例者作若君未葬則嗣子書名在喪之禮也既𦵏則嗣君諒闇羣臣復吉免喪服則禮成也案此句莊三十二年正義引釋例作則成君也文公既𦵏襄仲殺惡及視書曰子卒與未成君同文所以為諱也公子惡魯之正適嗣位免喪則魯君也襄仲倚齊而弑之國以為諱故不稱君若言君之子也及子般子野或見殺或不勝喪言罪則不足成貶為孝而滅性故直畧而書卒也案自公子惡魯之正適以下永樂大典無之從莊三十二年正義所引釋例増惡視猶不顯則知隠閔二公稱薨桓不稱弑亦諱之也臣之事君猶子之事父也微諫見志造膝詭辭執其是而諌其非案諌其非三字永樂大典脱從隠十一年正義所引釋例補入不必其得蓋匡救將然而將順其已然故有隠諱之義焉至于激節之士則不然南史執簡而累進董狐書法而不隠鬻拳刼君而自刖晏嬰端委而引直賢聖亦録而善之所以廣義訓𫝊大道殷有三仁此之謂也劉賈許頴復于薨卒生例云日月詳者弔贈備日月畧者弔有闕𫝊無此辭非載大夫卒例書弑例第十五案此篇永樂大典全闕釋例曰天生民而樹之君使司牧之羣物所以繫命也故戴之如天地親之如父母仰之如日月事之如神明其或受雪霜之嚴雷電之威則奉身歸命有死無貳故傳曰君天也天可逃乎此人臣所執之常也然本無父子自然之㤙未有家人習翫之愛高下之隔縣殊壅塞之否萬端是以居上者䧏心以察下表誠以感之然後能相親也若亢高自肆羣下絶望情義圯隔是謂路人非君臣也人心苟離則位號雖存無以自固故𫝊例曰凡弑君稱君君無道稱臣臣之罪稱君者惟書君名而稱國稱人以弑言衆之所共絶也稱臣者謂書弑者主名以埀來世終為不義而不可赦也然君雖不君臣不可以不臣故宋昭之惡罪及國人晉荀林父討宋曰何故弑君猶立文公而還深見貶削諸懷賊亂以為心者固不容于誅也若鄭之歸生齊之陳乞楚之公子比雖本無其心春秋之義亦同大罪是以君子慎所以立也諸侯不受先君之命而篡立得與諸侯㑹者則以成君書之齊商人蔡侯般之屬是也若未得接于諸侯則不稱爵楚公子棄疾殺公子比蔡人殺陳佗齊人殺無知衛人殺州吁公子瑕之屬是也諸侯篡立雖以㑹諸侯為正此列國之制也至于國内䇿名委質即君臣之分已定故諸殺不成君者亦與成君同義也傳曰㑹于平州以定公位又云若有罪則君列諸㑹矣此以㑹為斷也經書趙盾弑君而𫝊云靈公不君又以明于例此弑宜稱君也弑非趙盾而經不變文者以示良史之意深責執政之臣𫝊故特見仲尼曰越竟乃免明盾亦應受罪也醫不三世不服其藥古之慎戒也人子之孝當盡心嘗禱而已藥物之劑非所習也許止身為國嗣國非無醫而輕果進藥故罪同于弑二者雖原其本心而春秋不赦其罪蓋為教之逺防也楚靈無道于民于例當稱國以弑公子比首兵自立楚衆散歸而靈王縊死故以比為弑王也比既得國國人驚亂棄疾從而扇之比懼自殺皆棄疾之由故書公子棄疾殺公子比也左氏義例止此而已其餘小異皆從赴也劉賈許頴以為君惡及國朝則稱國以弑君惡及國人則稱人以弑案𫝊鄭靈宋昭經文異而例同故重覆以同之子弑其父又嫌異于他臣亦重明其不異既不碎辨國之與人而𫝊云莒紀公多行無禮于國太子僕因國人以弑之經但稱國不稱人知國之與人雖言别而事一也宣四年正義引釋例先儒旁采二傳横生異例宋之蒙澤楚之乾谿俱在國内閔公之弑則以不書蒙澤國内為義楚弑靈王復以地乾谿為失所明仲尼本不以為義例則丘明亦無異文也莊十二年正義引釋例經書宋督弑其君與夷及其大夫孔父仲尼邱明唯以先後見義無善孔父之文孔父為國政則取怨于民治其家則無閨闈之教身先見殺禍遂及君既無所善仇牧不警而遇賊又死無忠事晉之荀息期欲復言本無大節先儒皆隨加善例又為不安經書臣蒙君弑者有三直是弑死相及即實為文仲尼以督為有無君之心改書一事而已無他例也桓二年正義引釋例及㑹例第十六案此篇永樂大典全闕釋例曰與謀者同志之國彼我之計未定相與共謀講議利害計成而後行之故以相連及為文不與謀而出師者謂不得已而應命故以外合為文皆㨿魯而言之也公親㑹齊侯伐萊而傳以師出示例所以通卿大夫帥師者也魯既春㑹于曹以謀伐鄭夏遂起師而更從不與謀之文者厲公篡太子忽之位謀而納之非正故諱之從不與謀之例若夫盟主之令則上行乎下非匹敵和成之類故雖或先謀皆從不與謀之例成八年晉士爕來聘且言將伐郯下云㑹伐郯是也凡乞師者深求過禮之辭執謙以偪成其討故雖小國乞之于大國大國乞之于小國亦皆從不與謀之例臧宣叔郤錡是也𫝊以師出為例是惟繫于戰伐而劉許賈頴濫以經諸及字為義本不在例今欲强合之所以多相錯亂也宣七年正義引釋例凡師能左右之曰以為求助于諸侯而専制其用征伐進退帥意而行故變㑹及之文而曰以施于匹敵相用者若覇主之命則上行于下非例所及也呉雖大國順蔡侯之請自將其衆唯蔡侯之命故亦言以呉子也𫝊例稱師則諸不言師者皆不用以為例也以之于言所渉甚多劉賈許頴既不守例為斷又不能盡通諸以唯雜取晉人執季孫以歸劉子單子以王猛居于皇尹氏召伯毛伯以王子朝奔楚隨示以義數事而已又云諸稱以皆小以大下以上非其宜也尋案晉侯以季孫歸又非下以上也荆以蔡侯歸亦非小以大也僖二十六年正義引釋例蒐狩例第十七案此篇見永樂大典惟篇目佚今補釋例曰以不教民戰是謂棄之故傳曰春蒐夏苖秋獼冬狩皆于農隙以講武事也三年而治兵習戰備也入而振旅治兵禮畢整衆而還也歸而飲至告于廟也所以數軍實昭文章明貴賤順少長辨等列習威儀也晉侯登有莘之墟以望曰少長有禮此之謂也田狩必有三驅之禮以備四時之祀鳥獸之肉不登于俎骨角毛羽不登于噐則君不舉出必告于廟獲必用于廟于是乃書椒舉稱寡君屬有宗祧之事于武城此事之謂也凡天子諸侯田狩皆于其封内傳曰鄭之有原圃猶秦之有具囿不越國而取諸人隠公觀魚于棠棠實他境故傳云逺地案隠五年正義引釋例云舊説棠魯地據𫝊公辭欲畧地則非魯境也今釋例無此文恐有脱佚河陽實已屬晉非王狩所在故言非其地也且明徳也義在隠其召君之闕也邱明之為𫝊所以寫仲尼之意也而河陽之狩越盾之弑泄冶之罪于此三事特稱仲尼者危疑之理須聖言以明之聖人之辭可能使人信之賢者之辭則不能此其義也三王異正朔而夏數為得天雖在周世于言時舉事皆據夏正故公以春狩于即而傳曰書時禮也焚咸邱魯地非蒐狩常處經不言蒐狩但稱焚咸邱言火田盡物非蒐狩之義也紅之蒐傳言革車千乘所以示大蒐也而經不書大諸事同而文異𫝊不曲言經義者直是時史之闕畧仲尼畧而從之春秋不可錯綜經文此之類也劉賈頴云蒐于紅不言大者言公大失權在三家也十一年蒐于比蒲經書大蒐復云書大者言大衆盡在三家隨文造意以非例為例不復知其自違也案紅之蒐下永樂大典無之從昭八年正義所引釋例補入廟室例第十八案此篇見永樂大典惟篇目佚今補釋例曰太廟有八名其體一也肅然清靜謂之清廟行禘祫序昭穆謂之太廟告朔行禮謂之明堂行饗射飬國老謂之辟雍占雲物望氛祥謂之靈臺其四門之學謂之太學其中室謂之太室總謂之合宮諸儒皆以廟學為一鄭氏以為異處案自此以上孔頴逹詩靈臺疏引之以為頴容釋例永樂大典以為杜氏之文未知何據太室之屋國之所尊朽而不善乆旱遇雨乃遂傾頽不共之甚故特書之案自太室之屋以下永樂大典無之從文十三年正義所引釋例增新宮災者宣公之廟父廟也諒闇始闋而遇天災故感而哭之以致哀異于餘廟也案自新宮災者以下永樂大典無之從成三年正義所引釋例増土功例第十九案此篇見永樂大典惟篇目佚今從敬鉉續明三傳例説略補釋例曰都邑者民之聚也國家之藩衛百姓之保障不固則敗不修則壞故雖不臨寇必于農隙備其守禦無妨民務傳曰龍見而畢務戒事也謂夏之九月周之十一月龍星角亢晨見東方于是納其禾稼三務始畢而戒民以土功事也火見而致用大火星次角亢而晨見于是致其用也水昏正而栽謂夏之十月定星昏而中于是樹板幹而興作也日至而畢謂日既南至微陽始動故土功息傳既顯稱凡例而書時不書時各重發者皆以别無備而興作如書旱雩之别過雩也冬城西郛𫝊特曰懼齊此其意也案冬城西郛以下永樂大典無之從莊二十九年正義所引釋例増冬城防臧武仲請俟畢農事故傳曰書事時言興作出火見致用之前亦得兼以事時即禮也案襄十三年正義云此冬城防經𫝊皆不言月當在火見致用之前當時農収差早雖天象未致而民事已間言時節未是時而事已得時故言書事時也凡城都築邑國之大事是以春秋詳其得失救患分災恤病備難有為而然則不拘時制諸侯以夏城邢𫝊稱得禮正月城楚邱而魯諱後期此其義也浚洙者深之也冬興功而無𫝊亦得其時築之為例唯以都邑為别至于他土功之事則通用時例總謂之築築鹿囿郎臺王姫之館是也周禮四縣為都四井為邑此周公本制小大之别也若邑有先君之宗廟則雖小曰都尊其所居而大之也然則都而無廟固宜稱城城漆是也而頴氏唯繫于有先君之廟患漆本非魯邑也因説曰漆有邾之舊廟是使魯人尊邾之廢廟與先君同非經傳意也桓十六年冬城向傳曰書時也案其下月似城向在建酉之月以經傳事類相推則通在下建戌之月邱明發書時之傳不悞也其説具見長厯也案自冬城防以下永樂大典無之從敬鉉續明三傳例說略補入歸獻例第二十案此篇永樂大典全闕釋例曰歸者遺也獻者自下奉上之稱遺者敵體相與之辭傳曰諸侯不相遺俘齊侯楚人失辭稱獻失禮遺俘故因其來辭見自卑也以其太卑故書以示過莊三十一年正義引釋例齊人來歸衛寳公羊榖梁經傳及左氏𫝊皆同唯左氏經獨言衛俘者三家經傳有六而其五皆言寳此必左氏經之獨誤也莊六年正義引釋例歸入納例第二十一案此篇見永樂大典惟篇目佚今補桓十五年夏云云五月云云許叔入于許隠十一年傳曰鄭伯使許大夫百里奉許叔以居許東偏云云桓十五年傳曰許叔入于許秋九月鄭伯突入于櫟傳曰秋鄭伯因櫟人殺檀伯而遂居櫟莊六年夏六月衛侯朔入于衛五年傳曰冬伐衛納惠公也六年傳曰春王人救衛夏衛侯入放公子黔牟于周放甯跪于秦殺左公子洩右公子職乃即位九年夏云云齊小白入于齊傳曰夏公伐齊納子糾桓公自莒先入二十四年秋云云八月丁丑夫人姜氏入傳曰秋哀姜至成十八年夏云云宋魚石復入于彭城傳曰楚子辛鄭皇辰侵城郜取幽邱同伐彭城納宋魚石向為人鱗朱向􅙮魚府焉以三百乘戍之而還書曰復入傳例曰凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入襄二十三年夏云云晉欒盈復入于晉傳曰欒盈帥曲沃之甲因魏獻子以晝入于綘云云二十五年秋八月云云衛侯入于夷儀傳曰晉侯使魏舒宛沒逆衛侯將使衛與之夷儀云云衛獻公入于夷儀三十年秋七月云云鄭良霄出奔許自許入于鄭鄭人殺良霄傳曰癸丑晨自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帶率國人以伐之云云伯有死于羊肆昭二十二年秋劉子單子以王猛入于王城傳曰冬十月丁巳晉籍談荀躒帥九州之戎及焦瑕温原之師以納王子王城二十六年冬十月天王入于成周傳曰召伯逆王于尸云云癸酉王入于成周定十一年秋宋樂大心自曹入于蕭傳曰宋公母弟辰暨仲佗石彄公子地入于蕭以叛秋樂大心從之大為宋患寵向魋故也桓十七年秋八月蔡季自陳歸于蔡傳曰蔡桓侯卒蔡人召蔡季于陳秋蔡季自陳歸于蔡閔元年秋八月云云季子來歸傳曰秋八月公及齊侯盟于落姑請復季友也齊侯許之使召諸陳公次于郎以待之季子來歸嘉之也僖二十八年夏云云六月衛侯鄭自楚復歸于衛傳曰衛侯聞楚師敗懼出奔楚云云使元咺奉叔武以受盟云云六月晉人復衛侯寗武子與衛人盟于宛濮云云衛侯先期入冬曹伯襄復歸于曹傳曰晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解云云公説復曹伯三十年秋云云衛侯鄭歸于衛傳曰晉侯使醫衍酖衛侯甯俞貨醫使薄其酖不死公為之請納玉于王與晉侯皆十瑴王許之秋乃釋衛侯衛侯使賂周歂冶厪云云殺元咺及子適子儀成十四年夏衛孫林父自晉歸于衛傳曰晉侯使郤犨送孫林父而見之十五年秋八月云云宋華元自晉歸于宋傳曰魚石曰右師苟獲反雖許之討必不敢且多大功國人與之不反懼桓氏無祀于宋也云云魚石自止華元于河上請討許之乃反十六年秋云云曹伯歸自京師傳曰曹人復請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸襄二十六年春王二月云云甲午衛侯衎復歸于衛傳曰衛獻公使子鮮為復辭云云子鮮不獲命于敬姒以公命與甯喜言曰苟反政由甯氏祭則寡人云云二月庚寅甯喜右宰榖伐孫氏云云辛夘殺子叔及太子甬云云甲午衛侯入書曰復歸國納之也昭十三年夏四月楚公子比自晉歸于楚弑其君䖍于乾谿傳曰觀從以蔡公之命召子干子晳及郊而告之情强與之盟入襲蔡云云依陳蔡人以國云云以入楚云云公子比為王云云夏五月癸亥王縊于芋尹申亥氏秋云云八月云云蔡侯廬歸于蔡傳曰平王即位既封陳蔡而皆復之禮也隠太子之子廬歸于蔡禮也陳侯呉歸于陳傳曰悼太子之子呉歸于陳禮也定十三年冬云云晉趙鞅歸于晉傳曰韓魏以趙氏為請十二月辛未趙鞅入于綘盟于公宮隠八年春云云三月鄭伯使宛來歸祊庚寅我入祊傳曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也宣十年春云云齊人歸我濟西田傳曰春公如齊齊侯以我服故歸濟西之田成八年春晉侯使韓穿來言汶陽之田歸之于齊定十年夏云云齊人來歸鄆讙龜隂田哀八年冬十有二月云云齊人歸讙及闡傳曰十二月齊人歸讙及闡季姫嬖故也僖二十五年秋楚人圍陳納頓子于頓傳曰楚令尹子玉追秦師弗及遂圍陳納頓子于頓宣十一年冬云云丁亥楚子入陳納公孫寧儀行父于陳傳曰冬楚子為陳夏氏亂故伐陳云云因縣陳云云乃復封陳云云故書曰楚子入陳納公孫寧儀行父于陳書有禮也昭十二年春齊高偃帥師納北燕伯于陽傳曰春齊高偃納北燕伯􅍁于唐因其衆也哀二年夏四月云云晉趙鞅帥師納衛世子蒯瞶于戚傳曰晉趙鞅納衛太子于戚云云使太子絻八人衰絰偽自衛逆者告于門哭而入遂居之釋例曰凡去其國者通謂君臣及公子母弟也國逆而立之本無位則稱入本有位則稱復歸齊小白入于齊本無位也衛侯鄭復歸于衛復其位也諸侯納之有位無位皆曰歸衛孫林父蔡季是也身為戎首則曰復入晉欒盈是也皆所以明内外之援案皆字成十八年正義引釋例作此内外正義作外内辨逆順之辭故經正魚石衛衎以表舊制傳稱凡例總而明之也衛人逆公子晉于邢宜稱入善其得衆公子友忠于社稷國人思之案此句成十八年正義引釋例作國人所思焉故閔公為落姑之盟以復之夫衛之公子晉絶位而在邢魯之季子勢弱而出奔咸得民望享國有家是以聖人貴之殊其文也莊六年五國諸侯犯逆王命以納衛朔大其事故字王人謂之子突案孔頴逹莊六年正義云再命三命皆書名一命乃稱人周禮王之上士三命中士再命下士一命稱王人者下士也進之不稱人而越稱字者王之上士下士爵同而命異耳進之同中士未足以為榮故超從大夫之例稱字以貴之也朔懼有違衆之危案莊六年正義引釋例危字作犯字而以國逆告華元實國逆欲挾晉以自助故以外納赴春秋從而書之以示二子之情也韓魏有耦國之强陳蔡有復國之端故晉趙鞅楚公子比皆稱歸從諸侯納之例也言非晉楚之所能制也侯獳愛君以請故曹伯有國逆之辭許始復國故許叔有國逆之文此皆時史因周典以起時事之情也𫝊例稱諸侯納之曰歸今檢經諸稱納者皆有興師見納之事不須例而自明故但言納而不復言歸也邾有成君晉趙盾不度于義而大興諸侯之師渉邾之境見辭而退雖有服義之善所興者廣所害者衆故貶稱人衛侯鄭曹伯負芻皆見執在周晉魯請而復之鄭稱歸于衛負芻稱歸自京師所發事同而文異者例意本在于歸不以他文為義也賈氏又以為諸歸國稱所自之國所自之國有力也案楚公子比去晉而不逆是無援于外而經書自晉陳侯吳蔡侯廬皆平王所復案復字成十八年正義引釋例作封可謂有力于楚而不言自楚此既明證又春秋稱入其例有二施于師旅則曰不地在于復歸則曰國逆國逆而立又以為例案此二句昭二十一年正義引釋例作國逆又以立為例逆而不立則皆非例所及鄭之良霄以冦而入入則見殺而復例之案則字成十八年正義引釋例作即字例稱凡去其國明非天子之制也周敬王王子猛不書出而書入襄王書出而不書入凡自周無出故非春秋舊例也諸在例外稱入直是自外入内案是自二字永樂大典無之從桓十五年正義所引釋例増記事者常詞義無所取而賈氏雖夫人姜氏之入皆以為例如此甚多又依倣榖梁云稱納者内難之詞因附㑹諸納為義至于納北燕伯于陽𫝊稱因其衆窮不能通乃云時陽守距難故稱納此又無證經書楚人圍陳納頓子于頓則頓國之所欲也北燕伯𫝊有因衆之文不可言内難也又書納公孫寧儀行父于陳言書有禮不可言内難也陳縣而見復上下交驩二人雖有淫縱之闕今道楚匡陳賊討君𦵏威權方盛𫝊稱其禮理無内難案此二句宣十一年正義引釋例作𫝊稱有禮理無所難此皆先儒説之不安也班序譜第二十二案此篇永樂大典全闕其篇目則見桓十六年孔頴逹正義釋例曰周之宗盟異姓為後故踐土之盟載書齊宋雖大䧏于鄭衛斥周而言指謂王官之宰臨盟者也其餘雜盟未必皆然踐土召陵二㑹皆蔡在衛上諸國次之至盟乃正其高下者敬恭明神本其始也僖二十八年正義引釋例魯為春秋主常例諸侯上非其實次也子帛卿也依魯大夫之比列于莒上故傳曰魯故也叔孫豹曰宋衛吾匹也又曰諸侯之㑹寡君未嘗後衛君是魯在衛上也宋既先代之後又襄公一合諸侯以紹齊桓之伯宋在齊上則魯次宋也莊十四年正義引釋例自隠至莊十四年四十三歳征伐盟㑹者凡十六國時無霸主㑹同不并無以成序其間蔡與衛凡七㑹六在衛上唯此處在陳下故以為蓋後至也桓十六年正義引釋例班序譜鄭案桓十六年夏四月公㑹宋公衛侯陳侯蔡侯伐正義云諸侯之序以大小為次蔡此處在陳下故以為後至自隠至莊十四年四十三歳衛與陳凡四㑹衛在陳上自莊十五年盡僖十七年三十五歳凡六㑹陳在衛上莊十六年正義引釋例班序譜侯案莊十六年冬十有二月㑹齊宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽杜集解云陳國小每盟㑹皆在衛下齊桓始霸楚亦始强陳侯介于二大國之間而為三恪之客故齊桓因而進之遂班在衛上終于春秋齊桓既沒宋楚爭盟起僖十八年盡二十七年陳與蔡凡三㑹在蔡上楚合諸侯蔡與陳凡六㑹其五在陳上昭四年正義引釋例班序譜陳案昭四年正義云楚以大小為序不進班故蔡多在陳上晉合諸侯二十國起僖二十八年盡哀十四年大率皆陳後次蔡蔡後次衛襄二十七年正義引釋例班序譜公行至例第二十三案此篇見永樂大典惟篇目佚今補桓二年秋云云九月云云公及戎盟于唐傳曰公及戎盟于唐修舊好也冬公至自唐傳曰冬公至自唐告于廟也𫝊例曰凡公行告于宗廟反行飲至舍爵策勲焉禮也特相㑹往來稱地讓事也自參以上則往稱地來稱㑹成事也十六年夏四月公㑹宋公衛侯陳侯蔡侯伐鄭十五年傳曰冬㑹于袲謀伐鄭將納厲公也弗克而還十六年傳曰夏伐鄭秋七月公至自伐鄭傳曰秋七月公至自伐鄭以飲至之禮也十八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊夏四月丙子公薨于齊丁酉公之喪至自齊莊二十三年夏公如齊觀社傳曰公如齊觀社非禮也公至自齊二十四年夏公如齊逆女秋公至自齊二十七年春公㑹杞伯姫于洮傳曰公㑹把伯姫于洮非事也天子非展義不廵狩諸侯非民事不舉卿非君命不越境僖十六年冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮十七年夏滅項云云九月公至自㑹傳曰淮之㑹公有諸侯之事未歸而取項齊人以為討而止公秋聲姜以公故㑹齊侯于卞九月公至書曰至自㑹猶有諸侯之事焉且諱之也二十八年冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温諸侯遂圍許二十九年春云云公至自圍許宣五年春公如齊夏公至自齊傳曰春公如齊高固使齊侯止公請叔姫焉夏公自至齊書過也七年冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤傳曰晉侯之立也公不朝焉又不使大夫聘晉人止公于㑹盟于黄父公不與盟以賂免故黒壤之盟不書諱之也八年春公至自㑹襄十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹呉于柤夏五月甲午遂滅偪陽傳曰春㑹于柤㑹呉子夀夢也云云晉荀偃士匄請伐偪陽而封宋向戌焉云云甲午滅之書曰遂滅偪陽言自㑹也公至自㑹十二年冬云云公如晉傳曰公如晉朝且拜士魴之辱禮也十三年春公至自晉傳曰公至自晉孟獻子書勞于廟禮也昭二十五年秋云云九月己亥公孫于齊次于陽州二十六年三月公至自齊居于鄆傳曰三月公至自齊處于鄆言魯地也二十七年春公如齊公至自齊居于鄆傳曰公如齊公至自齊處于鄆言自外也定十二年冬云云十有二月公圍成傳曰將墮成公歛處父請孟孫墮成齊人必至于北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮冬十二月公圍成弗克公至自圍成右公行一百七十六書至者八十二錯綜其二十九以包通之釋例曰凡公出朝聘奔喪㑹𦵏皆但書而不言其事此春秋之常案凡公出下下二十二字永樂大典無之從莊二十三年正義所引釋例補入經書公行及至皆因告于廟書之于策桓二年公至自唐傳曰告于廟也然則凡盟有一百五公行一百七十六書至者八十二案盟有以下十八字永樂大典無之從桓二年正義所引釋例増其不書至者九十有四皆不告廟也隠公之不告謙也餘公之不告慢于禮也公行或朝或㑹或盟或伐或得禮或失禮其事非一故𫝊隨而釋之于盟釋告廟嫌他例不通故復總曰凡公行告于宗廟反行飲至舍爵策勲焉禮也此以明公之出境當無不告及其反也則必飲至有功則策勲故公至自伐鄭𫝊重言以飲至之禮孟獻子書勞于廟𫝊復云得禮所以反覆凡例也公朝于晉而獻子書勞知策勲非惟討伐之功雖或常行有以寧國安民案寜國襄十三年正義引釋例作定國亦書功于廟也然則凡反行飲至必以嘉㑹昭告于祖禰有功則舍爵策勲無勲無勞告成事而已若夫執止之辱壓尊毁列所以累其先君沗其社稷固當克躬罪已不以嘉禮自終宣公如齊既已見止連婚于鄰國之臣而行飲至之禮故傳曰書過桓公之喪至自齊此則死還告廟而書至者也莊公違禮如齊觀社用飲至之禮此則失禮之書至者也公又如齊逆女則得禮亦書至也宣公黑壤之㑹以賂免諱不書盟而復書至亦諱不以見止告廟也襄公至自晉此則策勞還而書至昭公至自齊居于鄆此則宜告而書至者也諸書至皆告廟啓反或即實而言或有所諱避𫝊于伐鄭見飲至之禮于宣見書過之譏于襄見書勞于廟舉此三者以包其他行也僖十七年傳曰公至自㑹猶有諸侯之事諱之也明以諸侯之事越境還至用飲至之禮正也公以滅項為齊所止㑹事既畢踰年乃還非公所終而經書至自㑹故𫝊特釋曰猶有諸侯之事且諱之也温之㑹遂圍許書公至自圍許柤之㑹遂滅偪陽書公至自㑹諸若此類事勢相接或以始致或以終致蓋時史之異耳無他義也案此句永樂大典無之從桓二年正義所引釋例増入陪臣執命大都耦國仲由建墮三都之計而成人不從故公親圍之雖不越境動衆興兵大其事故出入皆告于廟也郊雩烝嘗例第二十四案此篇見永樂大典惟篇目佚今從孔頴逹僖九年正義補桓八年春正月己夘烝夏五月丁丑烝釋例曰啓蟄而郊謂夏正建寅之月于是祀南郊配后稷以祇農事也龍見而雩謂建巳之月蒼龍七宿之體昏見東方于是大雩祭天逺為百穀祈膏雨也始殺而嘗謂建酉之月蒹葭蒼蒼白露為霜隂氣始殺嘉榖始熟于是薦嘗于宗廟也案桓五年正義云始殺嘗祭實起于建申之月今云建酉者言其下限賈服解始殺唯據孟秋不通建酉之月故釋例破賈服而為此言閉蟄而烝謂建亥之月草木枯槁昆蟲閉蟄履霜堅氷萬物皆成可薦者衆于是享祭烝于祖考也言凡祀舉郊雩烝嘗則天神人鬼地祗之祭皆通也其他羣祀不録可知也礿祠及地祗經無其事故不備言亦約文以相包也案此四句桓五年正義引釋例作不云礿祀地者經無其事故傳畧而不言過則書者謂非其時非其祀不旱而雩之類是也始夏而雩者謂純陽用事防有旱災而祈之也至于四時之旱及又因用此禮而求雨故亦曰雩宗廟之祀也既有天雨又須所薦之物可薦卜日又有吉否則仲月其常也故周禮祀號日以四時仲正之也經書正月烝得仲月之時也其夏五月復烝此為過烝若但書夏五月烝則唯可知其非時故先發正月之烝而後經書五月烝案後經二字桓五年正義引釋例作繼字以示非時并明再烝瀆也四時享祀孝子之所以致忠故雖大災大禮大凶亡喪哀是以廢大事乃有闕今以建未之月而修嘗祭之禮非也然既戒日致齋御廪雖災不害嘉榖祭亦不應中廢故經書乙亥嘗以示過𫝊釋之以不害也傳曰春不雨夏六月雨自十月不雨至于五月不曰旱不為災也然則雖書不雨必須將為災然後得雩常事不書諸書雩而𫝊不以旱釋之者皆過雩也經書過雩則與旱雩不别故傳七發之天子郊祀因望祭四方衆神諸侯不得依天子唯望祭其封内山川分野之星是謂三望魯以周公故得用天子禮樂故雖諸侯而特郊祀配以后稷其望祭也自從常祀制也常祀自祭之所必故禮唯卜郊日而又卜可郊與否今郊既配有日而更復疑卜或既耕而後卜郊廢上天之祀而别祀三望闕大存小怠慢失序故經書猶𫝊皆隨而發之也此事三見卜而𫝊釋其二以明卜郊不從與郊牛死所以不郊雖異而譏同也成七年不郊亦俱以牛事故不重釋也辛丑用郊文異而邱明不發𫝊明時史之辭非聖意也案明時史二句成十七年正義引釋例明作因非聖下有賢字凡以旱為雩者𫝊皆從而釋之上辛季辛一月之中再雩釋其旱甚明皆得禮也先儒之辯郊雩烝嘗各據所見多不審悉今博採以㫁諸疑厯法正月節立春啓蟄為中氣案孔穎逹桓五年正義云夏小正日正月啓蟄其傳曰言始發蟄也故漢氏之始以啓蟄為正月中雨水為二月節及太初以後更改氣名以雨水為正月中驚蟄為二月節以迄于今踵而不改今厯正月雨水中四月小滿中八月秋分中十月小雪中注皆以此四句為建寅建巳建酉建亥之月則啓蟄當雨水龍見當小滿始殺當秋分閉塞當蟄雪晉世之厯亦以雨水為正月中而釋例云厯法正月節立春啓蟄為中氣者因𫝊有啓蟄之文故逺取漢初氣名欲令𫝊與厯合二月節驚蟄春分為中氣三月節清明榖雨為中氣四月節立夏小滿為中氣五月節芒種夏至為中氣六月節小暑大暑為中氣七月節立秋處暑為中氣八月節白露秋分為中氣九月節寒露霜䧏為中氣十月節立冬小雪為中氣十一月節大雪冬至為中氣十二月節小寒大寒為中氣凡十二月而節氣有二十四共通三百六十六日分為四時間之以閠月故節未必得恒在其月初而中氣亦不得恒在月之半是以𫝊舉天宿氣節為文而不以月為正僖公襄公夏四月卜郊但譏其非所宣卜而不譏其四月不可郊也孟獻子曰啓蟄而郊郊而後耕耕謂春分也言得啓蟄即當卜郊不應過春分也案厯法有啓蟄驚蟄而無龍見始殺閉蟄此古人所名不同然其法推不得有異傳曰火伏而後蟄者畢此謂十月始蟄也至十一月則遂閉之猶二月之驚蟄既啓之後遂驚而走出始蟄之後又自閉塞也案桓五年正義云注以閉蟄為十月而釋例云十一月遂閉之者以正月半蟄蟲啓户二月初則驚而走出十月半蟄蟲始閉十一月初則遂閉之𫝊稱四者皆舉中氣言其至此中氣則卜此祭次月初氣仍是祭限次月中氣乃為過時既以閉蟄為建亥之月又言十一月則遂閉之欲見閉蟄以後冬至以前皆得烝祭也白露秋分謂之始殺龍星之體昬見案昬字恒五年正義引釋例作畢謂立夏之月言得此月節則當卜祀過渉次節則以過而書故秋雩書不時此渉周之立秋節也案孔頴逹正義云言渉立秋節者謂渉立秋之月中氣節也過渉次節亦謂中節非初節也若始渉初節則不譏之矣土功作者不必月日故亦書龍見而畢務戒事也火見而致用水昬正而栽日至而畢此其大準也周禮祭宗廟以四仲蓋言其下限也月令之書出自呂不韋其意也欲為秦制非古典也頴氏因之以為龍見五月五月之時龍星已過于見此為疆牽天宿以附㑹呂不韋之月令非所據而據既以不安且又自違左氏傳稱秋大雩書不時此秋即頴氏之五月而忘其不時之文欲以雩祭劉賈又以為諸書用皆不宜用案書字成十七年正義引釋例作言反于禮者也施之用郊似若有義至于贄用幣及用鄫子諸若此比皆當須書用以别所用者也若不言用則事叙不明所謂辭窮非聖人故造此用以示義也且諸過祀三望之類奚獨皆不書用邪案左氏傳用幣于社稱曰得禮案稱字成十七年正義引釋例作傳冉有用矛于齊師孔子以為義無不宜用之例也丘明云我師豈欺我哉王侯夫人出奔例第二十五案此篇見永樂大典其篇目亦存桓六年春正月實來五年傳曰冬淳于公如曹度其國危遂不復六年傳曰春自曹來朝書曰實求不復其國也十五年夏云云五月鄭伯突出奔蔡傳曰祭仲専鄭伯患之使其壻雍糾殺之云云祭仲殺雍糾云云公載以出十六年冬云云十有一月衛侯朔出奔齊傳曰宣姜與公子朔搆急子云云二公子故怨惠公云云立公子黔牟惠公奔齊莊元年春云云三月夫人孫于齊傳曰夫人孫于齊不稱姜氏絶不為親禮也四年夏云云紀侯大去其國傳曰紀侯不能下齊以與紀季夏紀侯大去其國違齊難也閔二年秋云云九月夫人姜氏孫于邾傳曰閔公之死也哀姜與知之故孫于邾僖二十四年冬天王出居于鄭傳曰初甘昭公有寵于惠后云云頽叔桃子曰我實使狄狄其怨我遂奉太叔以狄師攻王王御士將禦之王曰先后其謂我何云云天子無出書曰天王出居于鄭避母弟之難也二十八年夏四月云云衛侯出奔楚傳曰衛侯欲與楚國人不欲故出其君以説于晉衛侯出居于襄牛云云衛侯聞楚師敗懼出奔楚遂適陳文十二年春王正月郕伯來奔十一年傳曰郕太子朱儒自安于夫鍾國人弗徇十二年傳曰春郕伯卒郕人立君太子以夫鐘與郕邽來奔公以諸侯逆之非禮也故書曰郕伯來奔不書地尊諸侯也襄十四年夏四月云云己未衛侯出奔齊傳曰衛獻公戒孫文子甯惠子食皆服而朝日旰不召而射鴻于囿二子從之不釋皮冠而與之言二子怒云云公出奔齊云云公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舎大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪昭三年冬云云北燕伯款出奔齊傳曰燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯􅍁出奔齊罪之也二十一年冬蔡侯朱出奔楚傳曰楚費無極取貨于東國而謂蔡人曰朱不用命于楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國云云二十三年秋七月莒子庚輿來奔傳曰莒子庚輿虐而好劎苟鑄劎必試諸人國人患之又将叛齊烏存率國人以逐之二十五年秋云云九月己亥公孫于齊次于陽州齊侯唁公于野井傳曰齊侯將唁公于平隂公先至于野井齊侯曰寡人之罪也使有司待于平陰為近故也書曰公孫于齊次于陽州齊侯唁公于野井禮也將求于人則先下之禮之善物也哀十年春王二月邾子益來奔七年傳曰秋伐邾云云以邾子益來云云八年傳曰乃歸邾子邾子又無道呉子使太宰子餘討之囚諸樓臺栫之以棘使諸大夫奉太子革以為政十年傳曰春邾隠公來奔齊甥也故遂奔齊桓十一年秋云云九月云云鄭忽出奔衛傳曰雍氏宗有寵于宋莊公故誘祭仲而執之曰不立突將死云云祭仲與宋人盟以厲公歸而立之秋九月丁亥昭公奔衛己亥厲公立昭元年秋云云莒展輿出奔呉傳曰莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾展輿奔吳云云君子曰莒展之不立棄人也夫人可棄乎詩曰無競維人善矣八年夏四月云云陳公子留出奔鄭傳曰哀公有廢疾三月甲申公子招公子過殺悼太子偃師而立公子留云云公子勝愬之于楚云云公子留奔鄭二十六年冬十月云云尹氏召伯毛伯以王子朝奔楚二十二年夏經書王室亂二十三年秋經書尹氏立王子朝二十六年傳曰晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宮嚚奉周之典籍以奔楚釋例曰君為元首臣為股肱股肱元首同體合用相須而成也然假異氣以合徳執名義以相服非忠誠之感和理之應則四體交兢元首失徳燕􅍁以多寵見逐鄭突以専臣失位蔡朱以外讒出奔莒展以棄人不立由此觀之君臣之間有釁多矣唯秉徳而志公者必博聽而逺覽無常親也無常疎也有親必有疎有常必致非常也此人君之安危今古之成敗也諸侯有國社稷是重州公如曹度其國危危而無患慮容身于魯社稷絶祀非奔非朝故實來内諱奔謂之孫使若不為臣子之所逐自孫位而去之案之字莊元年引釋例作者字文姜與公如齊以淫見謫懼而歸誠于襄案此句莊元年正義引釋例作懼而歸訴于襄公襄公戕公而委罪于彭生案戕字莊元年正義引釋例作殺字弑公之謀姜所不與疑懼而自留于齊莊公感其不反以闕即位之禮故姜氏自齊而還魯魯人探情以責之故復出奔夫子以為姜氏罪不與弑于莊公之義當以母淫于齊而絶其齊親内全母子之道故經不稱姜氏傳曰絶不為親禮也明絶之于齊也文姜稱夫人明母義存也哀義外淫故孫稱姜氏明義異也文姜之身終始七如齊再如莒皆以淫行書出而不書反案書出莊元年正義引釋例作書行則元年之還亦不告廟推此可知也紀侯力弱慮窮自以列國不忍屈臣于齊使紀季以酅求安而脱身外寓季果為附庸社稷有奉故不言滅不見迫逐故亦不言奔大去者不反之辭蓋時史即實而言仲尼不改故傳不言故書書曰也天子以天下為家故傳曰凡自周無出今以出居為名而不書奔殊之于列國郕之世子以地來奔此罪人也公乃嘉而君之謬用諸侯之禮待之同于郕伯夫子即而書郕伯來奔書斯示此亦有意于襃貶也諸侯奔亡皆迫逐而苟免非自出也𫝊稱衛孫林父甯殖出其君名在諸侯之䇿此以臣名赴告之文也仲尼之經更沒逐者主名以自奔為文者責其君不能自安自固所犯非徒所逐之臣也且衛赴不以名而燕赴以名各隨赴而書之者義在于彼不在此也𫝊不發于蔡朱衛衎而發于燕􅍁者􅍁罪輕于衛衎而重于蔡朱故舉中示例以兼通上下也朱雖無罪據其失位而出奔案此句永樂大典作據位出奔從春秋序正義所引釋例増亦其咎也晉侯問于師曠曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫飬民如子葢之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主也民之望也若困民之主匱神之祀百姓絶望社稷無主將焉用之弗去何為天之愛民甚矣豈使一人肆千民上以從其淫必不然矣晉悼感衛衎而發問師曠恃其目盲因問答以極言且明君不能君故臣亦不能臣罪不純在臣也鄭忽既𦵏免喪而不稱君者忽為太子有母氏之寵宗卿之援有功于諸侯此太子之盛者也守介節以失大國之助知三公子之强不用祭仲之言修小善潔小行從匹夫之仁忘社稷之大計故君子謂之善自為謀言不能謀國也父卒而不能自君鄭人亦不君之是以出則䧏名以赴入則逆之以太子之禮始于見逐終于見殺三公子更立亂鄭國者實忽之由也故仲尼因而示義也公子留莒展輿書名者篡弑而立未列于㑹也諸侯即位上有王命次則列國以為班然後成君故凡不受先君之命者雖已踰年不與諸侯㑹而出奔皆不稱爵此古之常制故傳曰㑹于平州以定公位也春秋釋例卷三
