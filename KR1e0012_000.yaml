body:
  text: 春秋釋例春秋類提要臣等謹案春秋釋例十五卷晉杜預撰預事迹詳晉書本傳是書以經之條貫必出於傳傳之義例總歸於凡左傳稱凡者五十其别四十有九皆周公之垂法史書之舊章仲尼因而修之以成一經之通體諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例亦有舊史所不書適合仲尼之意者仲尼即以為義非互相比較則褒貶不明故别集諸例及地名譜第厯數相與為部先列經傳數條以包通其餘而傳所述之凡繫焉更以己意申之名曰釋例地名本之泰始郡國圗世族譜本之劉向世本與集解一經一緯相為表裏晉書稱預自平呉後從容無事乃著集解又參考衆家譜第謂之釋例又作盟㑹圖春秋長厯備成一家之學比老乃成今考土地名篇稱孫氏僭號於呉故江表所記特略則其屬稿實在平呉以前故所列多兩漢三國之郡縣與晉時不盡合至盟㑹圖長厯則皆書中之一篇非别為一書觀預所作集解序可見史所言者未詳晉書又稱當時論者謂預文義質直世人未之重惟秘書監摯虞賞之考稽含南方草木状稱晉武帝賜杜預密香紙萬畨寫春秋釋例及經傳集解則當時固重其書史所言者亦未盡確也其書自隋書經籍志而後並著於録均止十五卷惟元呉萊作後序云四十卷豈元時所行之本卷次獨分析乎自明以來是書久佚惟永樂大典中尚存三十篇並有唐劉蕡原序其六篇有釋例而無經傳餘亦多有闕文謹隨篇掇拾取孔頴逹正義及諸書所引釋例之文𥙷之校其訛謬釐為二十七篇仍分十五卷以還其舊呉萊後序亦併附焉按預集解序云釋例凡四十部崇文總目云凡五十三例而孔頴逹正義則云釋例事同則為部小異則附出孤經不及例者聚於終篇四十部次第從隠即位為首先有其事則先次之世族土地事既非例故退之於終篇之前土地名起於宋衛遇於垂世族譜起於無駭卒無駭卒在遇垂之後故地名在世族前今是書原目不可考故因孔氏所述之大指推而廣之取其事之見經先後為序長厯一篇則次之土地名世族譜後以集解序述厯數在地名譜第後也土地名篇釋例云據今天下郡國縣邑之名山川涂道之實爰及四表皆圖而備之然後以春秋諸國邑盟㑹地名附列之名曰古今書春秋盟㑹圖别集疏一卷附之釋例所畫圖本依官司空圖據㤗始之初郡國為正孫氏初平江表十四郡皆貢圖籍荆揚徐三州皆改從今為正不復依用司空圖則是書應有圖而今已佚又有附盟㑹圖疏臚載郡縣皆是元魏隋唐建置地名非晉初所有而陽城一條且記唐武后事當是預本書已佚而唐人𥙷輯又土地名所釋亦有後人増益之語今仍録原文而各加辨証於下方考預書雖有曲從左氏之失而用心周密後人無以復加其例亦皆參考經文得其體要非公穀二家穿鑿月日者比摯虞謂左邱明為本春秋作傳而左傳遂自孤行釋例本為傳設而所發明何但左傳故亦孤行案故字文義未明疑為當字之訛以晉書原本如是姑仍其舊文良非虚美且永樂大典所載猶宋時古本觀夫人内女歸寕例一篇末云凡若干字經傳若干字釋例若干字當是校讐精當概可想見如長厯載文公四年十有二月壬寅夫人風氏薨杜云十二月庚午朔無壬寅近刻注疏本並作十有一月按十一月庚子朔三日得壬寅不可謂無壬寅也又襄公六年經文本云十有二月齊侯滅萊而近刻左傳本前則曰十有一月齊侯滅萊萊恃謀也後則曰晏弱圍棠十一月丙辰而滅之今考長厯十一月丁丑朔是月無丙辰十二月丁未朔十日得丙辰杜預係此日於十二月下不言日月有誤可見今本傳文兩言十一月皆十二月之訛也如此之類可以校訂舛訛者不可縷數春秋以左傳為根本左傳以杜解為門徑集解又以是書為羽翼縁是以求筆削之㫖亦可云考古之津梁窮經之淵藪矣乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序聖人文乎魯史志乎周道筆削隠顯有權有義一正于周制而已權焉故有諱國惡避世禍矯事以變文也義焉故有例典禮貶僭亂尊王以行法也彰明五始上禀班朔布象之本則公旦禮經列國羣史悉得書之矣詳畧一字下救衰俗强臣之漸則仲尼志藴異代鮮克究其極焉有晉大儒杜預皓首春秋深明權義乃謂學者未可與權必先講義義之通明槩有宗本舉一則推萬可知計源則衆流畢㑹是以禮經言凡者謂其統之有宗也志在可例者謂其會之有元也厥初寄辭史法假蹟霸政其事著于桓文其道窮于魯衛且諸侯専而宗周微三家盛而公室削道不克振事得以書由是立經舉元後世非以例義求之則莫能一而貫也范甯有言左氏失誣公羊失俗榖梁失短斯皆謂偏執空文而昧乎變例者也夫然釋例之作宗本于舊章非元凱獨㫁而然也實包括三傳同歸于聖經之奥歟且曰八公書即位而四公發傳雖以不書不稱為文其義則一也昭定哀蒐皆不書公言權在三家也襄公在楚每月以不朝告于廟特于正月釋之者人理所自新也諸侯雖有九伐之法必禀命于天子可以執不可輒殺也考之數條足以見天厯人謀相與用舍一權一義始終詳焉始于平王東遷謂魯秉周禮尚可興之乎終于哀公西狩謂叔孫専政魯其不可為矣嗚呼夾谷之後使仲由毁三桓城収其甲兵不克孔子之衛至十一年自衛反魯聖經修成後二年泰山其頽三桓勝魯聖人斯文于是乎掃地矣漢興帝制立賢良文學之士率以春秋治天下晉主中國元凱以春秋為安危故述兹凡例意欲安中國而御四夷釋權義以正禮經後儒有以知可例者文也可釋者志也善言春秋者不以文害志故志定而後㫁物物得其㫁則例可得焉例可忘焉故序劉蕡序
