body:
  text: 春秋釋例卷九晉杜預撰世族譜第四十五之下衛衛國姬姓文王子康叔封之後也周公既誅禄父殺管蔡而以其地封康叔為衛侯居殷虚案永樂大典脱虚字從隱元年正義所引釋例増今朝歌是也狄滅衛文公居楚丘成公徙都帝丘今東郡濮陽是也桓公十三年魯隠公之元年也出公輒十二年獲麟之嵗也悼公二年春秋之傳終矣悼公三年卒自悼公以下十一世二百五十五年而秦滅衛矣案昭四年正義引世族譜云衛在春秋後十一世二百五十八年而秦滅衛康叔封王孫牟康伯髦武公和王孫牟八世孫莊公揚案衛侯自莊公以下永樂大典並闕夫人莊姜莊公夫人厲媯生孝伯莊公妃夷姜宣公烝之生急子桓公夫人宣姜昭伯烝之生齊子戴公文公宋桓夫人許穆夫人本宣公夫人定姜姜氏定公夫人敬姒生獻公定公妃夫人姜氏宣姜襄公夫人婤姶生孟縶及靈公襄公嬖人也南子少君靈公夫人吕姜莊公夫人夏戊之女夫人出公夫人公子孝伯莊公子昭伯頑宣公子公子州吁莊公子急子宣公子夀子宣公子叔武夷衛武文公子公子瑕子適文公子子儀文公子鱄子鮮定公子子展定公子公子荆南楚獻公子公孫般師襄公孫公子起靈公之子太子疾莊公子公子青莊公子太子出公子宋桓夫人昭伯女許穆夫人昭伯女孫氏孫莊子級武公三世孫孫昭子武公四世孫孫良夫桓子孫林父文子孫嘉林父子孫襄伯國林父子孫蒯林父子石氏石碏石子靖伯孫石厚碏之子石稷成子石碏四世孫石買共子稷之子石惡悼子買之子石圃惡之從子石曼姑懿子石買孫石魋昭子石祁子靖伯八世孫禮記曰石駘仲之子案程公説春秋分記云世族譜以祁子為靖伯八世孫據禮記石祁子駘仲子也厚生駘仲駘仲生祁子當是靖伯五世孫非八世孫也太叔氏太叔儀太叔文子僖侯八世孫太叔申太叔懿子太叔儀孫太叔疾悼子齊太叔遺僖子孔姞太叔疾之妻孔文子之女齊氏齊子昭伯子也齊子無子戴公以其子惡為之後齊惡齊子四世孫齊豹齊子氏公孟氏孟縶襄公子公孟彄孟縶無子靈公以其子彄為之後案定十二年衛公孟彄帥師伐曹杜集解云彄孟縶子孔穎達正義云為後則為其子故云孟縶子此實公孫而不稱公孫者縶字公孟故即以公孟為氏劉炫謂公孟生得賜族故彄即以族告寗氏寗跪文仲武公曽孫寗速莊子寗跪孫寗俞武子寗相成子寗殖惠子寗喜悼子子叔氏黒背穆公子公孫剽子叔太子角剽子公叔氏公叔文子公叔發獻公孫公叔戍發之子案程公説春秋分記云公叔氏祖成子當當生公孫發發生戍世族譜闕當一世北宫氏北宫括北宫懿子成公曽孫北宫遺成子北宫佗文子北宫喜貞子北宫結南氏公子郢子南靈公子子之公孫彌牟文子孔氏孔達莊叔成子孔烝鉏孔達孫孔羈須叔孔圉文子孔羈孫孔悝叔悝孔叔孔伯姬孔圉妻太子蒯聵之姊王孫氏王孫賈王孫齊賈之子昭子也史氏史朝史狗朝之子文子也元咺氏元咺角咺之子也夏戊氏夏戊夏丁氏司徒期戊之子趙氏趙黶趙陽黶之孫案程公説春秋分記云黶生舉舉生陽世族譜謂黶之孫陽而闕舉一世褚師氏褚師定子褚師比褚師定子之子聲子也雜人右宰醜獳羊肩公子黔牟右公子泄左公子職渠孔子伯黄夷孔嬰齊華龍滑太史禮孔禮至及昆弟長䍧華仲公子歂犬鍼莊子士榮周歂冶厪孫免師曹蘧伯玉蘧瑗子蟜子伯子皮子行尹公佗庾公差子魚子木公孫丁右宰穀殖綽公孫免餘雍鉏公孫無地公孫臣史鰌子行敬子公子朝屠伯褚師圃宗魯祝鼁華齊慶比公南楚華寅鴻駵魋析朱鉏成子黒背孫渠子子玉霄彪傒子髙魴祝佗子魚彌子瑕彭封彌子滑羅宋朝本宋公子子朝也戲陽速寗跪案左傳寗跪有二一則莊六年傳放寗跪于秦一則哀四年傳衛寗跪救范氏杜集解于莊六年注云衛大夫哀四年則無注今考世族譜衛寗跪亦有二一為寗連之祖當是莊六年傳之寗跪一列于雜人則哀四年傳之寗跪也晉悼公子憖本晉臣行人子羽公文懿子公文要也渾良夫仲由季路本魯子路寺人羅欒寜髙柴子羔召獲公孫敢石乞鄢武子肸盂黶司徒瞞成子伯季子許公為胥彌赦司冦亥優狡拳彌鄄子士祝史揮向禽仲叔于奚右衛人一百九十五案本文實一百七十七人虢虢國姬姓文王之弟虢仲後也今𢎞農陜縣是也僖五年晉滅之虢仲虢石父虢文公虢公忌父虢公仲郭虢公醜虢公林父大夫祝應太祝虢大夫史嚚太史虢大夫宗區宗人虢大夫舟之僑虢大夫右虢人十一莒莒國嬴姓少昊之後周武王封兹輿期于莒初都計後徙莒今城陽莒縣是也世本自紀公以下為己姓不知誰賜之姓者十一世兹平公方見春秋共公以下微弱不復見四世楚滅之案此條永樂大典闕佚從隠二年正義所引釋例補入齊齊國姜姓太公望之後其先四岳佐禹有功或封于吕或封于申故太公曰吕望也太公股肱周室成王封之于營丘今臨淄是也僖公九年魯隠公之元年也簡公四年獲麟之嵗也簡公弟平公十三年春秋之傳終矣平公二十五年卒後二世七十年而田氏奪齊太公之後滅矣案此條永樂大典闕佚從隠三年正義所引釋例補入髙氏髙武子髙酀髙偃案襄二十九年齊髙止出奔北燕傳云齊公孫躉公孫竈放其大夫髙止于北燕髙竪以盧叛閭邱嬰帥師圍盧髙竪請立後而致邑齊人立敬仲之曾孫酀良敬仲也孔穎達正義云依世本敬仲生莊子莊子生傾子傾子生宣子宣子生厚厚生止止是敬仲元孫之子也世本又云敬仲生莊子莊子生傾子傾子之孫武子偃據世本則偃為敬仲元孫今傳云曽孫必有一誤也此酀即後所云髙偃是也世族譜以髙武子酀偃為一人蓋酀偃音相近而字為二耳董遇注此亦作偃劉炫云據世本髙止敬仲元孫之子不立止近親逺取敬仲曽孫者齊人賢敬仲故繫之言敬仲曽孫則此人祖父皆非正適今别立之逺繼敬仲後髙止祖父皆絶其祀也偃又案杜世族譜以髙酀即髙偃而昭十二年齊髙帥師納北燕伯于陽集解又云髙偃髙傒元孫輿傳齊人立敬仲之曽孫酀句不合劉炫已辨之又案此條永樂大典闕佚從襄二十九年正義所引釋例補入國氏國佐賔媚人武子三事互見于經傳不知賔媚人是何等名號也案此條永樂大典闕佚從成二年正義所引釋例補入又案程公説春秋分記云歸父生佐佐生二子曰勝曰弱弱生夏夏生書書生瓘瓘生髙父世族譜闕髙父一人管氏案此及下一條永樂大典佚從僖十二年正義所引釋例補入出自周穆王案孔穎達僖十二年正義云哀十六年傳稱楚白公殺齊管修杜云管修楚賢大夫故齊管仲之後是管氏之後于齊没不復見也又案路史後紀注亦引杜釋例云管仲穆王後雜人管于奚案孔穎達僖十二年正義云成十一年傳有齊管于奚譜以為雜人則非管仲之子孫也華免案成十八年傳齊侯使士華免以戈殺國佐于内宫之朝集解云華免齊大夫正義曰杜世族譜于齊國雜人之中有華免而無士字此注以華免為大夫則士者為士官也又案此條永樂大典闕從成十八年正義所引世族譜増入祝固史嚚案此二条永樂大典闕從昭二十年正義所引世族譜増入陳陳國媯姓虞舜之後也當周之興有虞遏父者為周陶正武王賴其利器用以其先聖之後也以元女太姬妃遏父之子滿封于陳賜姓曰媯號胡公桓公二十三年魯隠公之元年也案元年隠三年正義引釋例作立年緡公二十一年獲麟之嵗也二十四年楚滅陳矣遏父胡公滿文公韋胡公八世孫一本作幸案陳侯自文公以下永樂大典皆闕夫人元女太姬胡公夫人元妃鄭姬生太子偃師哀公夫人二妃生公子留哀公妃下妃生公子勝哀公妃公子五父佗文公子太子免桓公子公子完敬仲工正厲公子公子禦㓂太子宣公子公子黄成公子公子遇成公子悼太子偃師哀公子公子勝哀公子司徒招公子招弟招成公子夏氏御叔宣公孫夏徵舒夏南夏齧悼子徵舒三世孫夏區夫徵舒四世孫案程公説春秋分記云夏氏祖宣公子少西生御叔御叔生徵舒徵舒生晉晉生禦㓂禦㓂生齧齧生區夫世族譜止列御叔徵舒齧區夫四人餘皆略焉又案齧乃徵舒之曽孫世族譜謂為徵舒三世孫是也杜預于昭二十三年注云徵舒𤣥孫自為異同當以世族譜為正御叔妻夏姬徵舒母轅氏轅濤塗轅宣仲申公九世孫轅僑桓子濤塗四世孫宗氏宗豎宣公六世孫鍼氏鍼子僖公孫鍼宜咎鍼子八世孫慶氏慶虎桓公五世孫慶寅司城氏公孫貞子哀公孫雜人顓孫轅選女叔原仲公孫寜孔寜泄冶儀行父司徒卭司馬桓子慶樂孔奐干徵師輿嬖袁克懿氏妻逢滑轅頗公孫佗人轅咺轅買芋尹蓋賈獲及母妻杞把國姒姓夏禹之苖裔武王克紂求禹後案武王二句隠四年正義引釋例作武王克殷求禹之後得東樓公而封之于把今陳留雍丘縣是也九世及成公遷縁陵文公居淳于案文公二字永樂大典脱從隠四年正義所引釋例增成公始見春秋案隠四年正義云把于魯隠四年已見春秋桓二年有把侯來朝莊二十七年有杞伯來朝于𫝊並無號謚又不書其卒僖二十三年杞成公卒其謚乃見于𫝊未知隐四年把國定是何君當是成公之父祖耳僖公子湣公六年獲麟之嵗也湣公弟哀公三年春秋之𫝊終矣哀公十年卒自哀公以下二世十三年而楚滅之案之字隠四年正義引釋例作把成公桓公姑容成公弟孝公丐文公益姑平公郁釐悼公成隠公乞僖公過悼公曽孫案哀八年冬十有二月癸亥杞伯過卒孔穎達正義云案悼公父平公以昭二十四年卒悼公以定四年卒未應有曽孫可以授之國也杞世家僖公過是悼公之子疑譜誤右杞人八蔡蔡國姬姓文王子叔度之後也武王封之于汝南上蔡為蔡侯作亂見誅其子蔡仲成王復封之于蔡至平侯徙新蔡昭侯徙九江下蔡宣侯二十八年魯隠公之元年也昭侯子成侯十年獲麟之嵗也成侯子聲侯四年春秋之傳終矣聲侯十四年卒自聲侯以下三世二十八年而楚滅蔡案昭四年正義引世族譜云昭四年後十一年楚滅蔡十三年蔡復封春秋後二世十八年而楚滅蔡義又案此條永樂大典闕佚從隠四年正所引釋例補入文侯申景侯固靈侯般隠太子昭侯申隠太子之子案自文侯以下永樂大典闕從哀四年正義所引世族譜補入又案正義云昭侯是文侯元孫乃與髙祖同名周人以諱事神二申必有誤者俱是經文未知孰誤郕郕國周公之弟郕叔武之後也郕伯太子朱儒郕伯晉晉國姬姓武王子唐叔虞之後也成王滅唐而封之今太原晉陽縣是也燮父改之曰晉燮父孫成侯徙曲都沃今河東聞喜縣是也穆侯徙都絳鄂侯二年魯隠公之元年也定公三十一年獲麟之嵗也出公八年而春秋之傳終矣出公十七年卒自出公以下五世八十二年而韓趙魏滅晉也案此條永樂大典闕佚從隠五年正義所引釋例補入欒氏欒魴欒氏族案襄二十三年晉欒盈復入于晉入于曲沃傳云欒樂斷肘而死欒魴傷杜集解云樂盈之族魴欒氏族孔穎達正義云服䖍云魴盈之子計欒盈范宣子之外孫胥午謂為孺子未得有子已堪戰十九年欒魴已帥師伐齊必非欒盈子故杜以為欒氏族世族譜欒魴為欒氏族以欒盈為雜人不知杜意何故也此條永樂大典闕佚從襄二十三年正義所引世族譜増入又案程公說春秋分記云世族譜闕欒鍼欒盈二人羊舌氏羊舌夫夫羊舌氏晉之公族羊舌其所食邑也案正義云唯言晉之公族不知出何公也或曰羊舌氏姓李名果案春秋分記李字作季字有人盗羊而遺其頭不敢不受受而埋之後盜羊事發辭連李氏李氏掘羊頭而示之以明已不食誰識其舌舌存得免號曰羊舌氏案杜預集解云羊舌大夫叔向祖父孔穎達閔二年正義云羊舌氏爵為大夫號曰羊舌大夫不知其如何也此人生羊舌職職生叔向至或所云杜所不從記異聞耳此條永樂大典闕從閔二年文十二年昭三年正義所引釋例補入郤氏案程公説春秋分記云豹字叔虎生三子曰稱曰冀芮曰義芮生缺缺生克克生錡又芮從子曰歩揚曰歩招招無後揚生二子曰犨曰蒲城鵲居犨生三子曰至曰溱曰毅世族譜闕豹及鵲居二人今録此以補本文之闕韓氏韓萬定伯簡萬之孫案程公説春秋分記云案系本萬生求伯求伯生定伯簡世族譜謂萬之孫曰定伯簡與系本及服䖍之説同獨闕求伯一世今據此補入荀氏荀罃知朔荀盈朔之弟罃之子案苟氏以下永樂大典並闕據程公説春秋分記所引世族譜補入魏氏畢萬魏犨萬之孫案自畢萬以下永樂大典闕從程公説春秋分記所引世族譜補入又案分計云萬生芒季芒季生武仲州即武子犨也魏顆魏犨子案此條永樂大典闕從襄三年正義所引世族譜補入魏錡魏犨子為吕氏案此條永樂大典闕從程公説春秋分記所引世族譜補入魏絳魏犨子莊子案莊子二字從春秋分記所引世族譜補入顆别為令狐氏絳為魏氏蓋顆長而庶絳幼而適故也案孔穎達襄三年正義云魏世家武子生悼子悼子生絳則絳是犨孫計其年世孫應是也先儒悉皆不然未知何故附録于此魏頡魏顆子顆長生頡則絳是頡之叔父案自魏絳以下永樂大典闕從襄三年正義所引世族譜補入吕相魏錡子魏舒莊子之子獻子魏曼多舒之孫案程公説春秋分記云系本舒生侈侈生曼多又案自吕相以下永樂大典並闕從分記所引世族譜補入范氏士文伯士丐案襄三十一年傳寡君使匄請命陸徳明經典釋文云匄本作丐古害反士文伯名也攷今傳本皆作匄字或作丐字釋例亦然案士文伯字伯瑕春秋時人名字皆相配楚令尹陽丐字子瑕與文伯名字正同又鄭駟乞字子瑕匄與乞正同則作匄者是又案魯有仲嬰齊是莊公之孫又有公孫嬰齊是文公之孫仲嬰齊于公孫嬰齊為從祖同時同名鄭有公孫段字子石又云伯石印段字伯石𫝊又謂之二子石印段即公孫段從父兄弟之子尚同名字伯瑕與宣子何碍同乎孔穎達正義云晉宋古今及釋例皆作丐俗本作匄此士文伯是范氏别族不宜與范宣子同名今定本作匄恐非考經典釋文以匄字為是正義以丐字為是而所引釋例之文則同永樂大典此條已佚今據二書増入又案程公説春秋分記云杜伯生隰叔隰叔生蒍蒍生縠縠生㑹以隨為氏亦曰范氏生二子曰燮曰魴燮生匄魴生彘裘匄生鞅鞅生二子曰吉射曰臯夷又㑹從弟穆子為士季氏生渥濁渥濁生弱弱生伯瑕名丐伯瑕生爾牟世族譜闕杜伯隰叔二世趙氏叔帶趙夙叔帶五世孫案叔帶以下永樂大典闕從程公説春秋分記所引世族譜補入趙衰趙夙之弟也案此條永樂大典闕從定十三年正義所引世族譜補入趙盾趙衰之子案孔穎達正義云晉語云趙衰趙夙之弟世本夙為衰祖穿為夙之曽孫世本轉寫多誤其本未必然也義又案此條永樂大典闕從宣二年正所引釋例補入趙朔趙盾子趙武趙朔子趙成趙武子趙鞅趙成子其家為趙氏案自趙朔以下永樂大典並闕從定十三年正義所引世族譜補入趙穿趙夙之庶孫于趙盾為從父昆弟而為盾側室案孔穎達正義云穿趙盾從父昆弟子也别為邯鄲氏趙旃趙勝邯鄲午是其後也又案此條永樂大典闕從桓二年及十二年正義所引釋例補入趙旃趙穿子趙勝趙旃子趙午趙勝子其家為耿氏案穿之後别封邯鄲世不絶祀故亦稱邯鄲氏又案趙旃以下永樂大典闕從定十三年正義所引世族譜補入籍氏孫伯黶籍談籍秦談子案程公説春秋分記云黶生頡頡生叔子叔子生官正官正生司徒公司徒公生少襄少襄生太伯太伯生季季生偃偃生談談生秦世族譜止載伯黶談秦三世今據此補入雜人先縠彘子彘季案宣十二年傳荀林父將中軍先縠佐之杜集解曰彘季代林父孔穎達正義云案傳文皆稱彘子今注云彘季勘譜亦以彘子彘季為一人則杜君别有所據書傳殘缺不可得而知也劉炫云傳聞皆稱彘子何以知是彘季以縠非彘季以規杜今知非者杜以子為男子之稱季是幼小之辭季之與子是得通稱子路或為季路舉其常稱謂之子論其字謂之季故公子友或稱季友而劉以傳無彘季而規杜非也又傳云晉原縠宋華椒衛孔達曹人同盟于淸丘杜集解云原縠先縠正義云杜譜以為雜人則不知誰之子也案傳先軫或稱原軫此蓋先軫之後也𫝊有名號之異杜譜皆並言之先縠之下不言原縠是杜脱也上文稱彘子服䖍以為食采于彘今復稱原原其上世所食也于時趙氏有原同蓋分原邑而共食之也義又案此條永樂大典闕從宣十二年正所引釋例補入欒樂案杜集解云樂欒盈之族譜又以為雜人孔穎達正義已疑其誤人案此條永樂大典闕從襄二十三年正義所引世族譜補入王正案昭六年傳齊侯如晉請伐北燕也士匄相士鞅逆諸河禮也陸徳明經典釋文云今傳本皆作士匄相士鞅古本士匄或作王正董遇王肅本同學者皆以士匄是范宣子即士鞅之父不應取其父同姓名人為介今傳本誤也依王正為是王元規云古人質口不言之耳何妨為介也案士文伯是士鞅之族亦名匄無妨令相范鞅也然士文伯名古本亦有作正者解見襄三十一年孔穎達正義云世族譜以王正為雜人諸本及王肅董遇注皆作王正俗本或誤為士匄此人不當取士鞅之父同姓名而為之介也觀此則相士鞅者自是王正今相傳作士匄者誤至陸徳明以王正即士文伯則士文伯名丐不名正也杜譜以士文伯為范氏别族王正為雜人其非一人可知矣世又案此條永樂大典闕從昭六年正義所引族譜増入郤稱歩招郤溱案程公説春秋分記云世族譜列郤稱歩招郤溱于雜人今據此補入薛薛國任姓黄帝之苗裔奚仲封為薛侯今魯國薛縣是也奚仲遷于邳仲虺居薛以為湯左相武王復以其胄為薛侯齊桓霸諸侯黜為伯獻公始與魯同盟小國無記世不可知亦不知為誰所滅案此條永樂大典闕佚從隠十一年正義所引釋例補入許許國姜姓與齊同祖堯四嶽伯夷之後也周武王封其苖裔文叔於許以為太嶽𦙍今潁川許昌是也靈公徙葉悼公遷夷一名城父又居析一名白羽許男斯處容城自文叔至莊公十一世始見春秋元公子結元年獲麟之嵗也當戰國首結為楚所滅矣案此二句隠十一年正義引釋例作當戰國初楚滅之莊公苴人茀桓公鄭莊公弟也世本無許叔疑鄭即是穆公新臣僖公業昭公錫我靈公寗悼公買許男斯元公成悼公孫公子哀世子太子止雜人百里許圍叔申秦百里氏百里奚百里孟明視百里奚之子案孔穎達僖三十二年正義云世族譜以百里孟明視為百里奚之子則姓百里名視字孟明也雜人西乞術白乙丙或以西乞術白乙丙為蹇叔子案傳稱蹇叔之子與師言其在師中而已若是西乞白乙則為將帥不得云與也或説必妄記異聞耳案孔穎達僖三十二年正義云古人之言名字者皆先字後名而連言之其術丙必是名西乞白乙或字或氏不可明也自百里氏以下永樂大典闕佚俱從左傳僖三十二年正義所引釋例補入曹曹國姬姓文王子叔振鐸之後也武王封之陶丘今濟隂定陶縣是也桓公三十五年魯隠公之元年也伯陽立十五年魯哀公之八年而宋滅曹案此條永樂大典闕佚從桓五年正義所引釋例補入楚楚國芈姓顓頊之後也其後有鬻熊事周文王早卒成王封其曽孫熊繹于楚以子男之田居丹陽今南郡枝江是也熊達始稱武王武王十九年魯隠公之元年也武王居郢今江陵是也昭王徙鄀惠王八年獲麟之歳也惠王二十一年春秋之傳終矣惠王五十七年卒自惠王以下十二世二百九年而秦滅之案此條永樂大典闕佚從桓二年正義所引釋例補入早又案路史後紀注引杜釋例云鬻熊子卒附録于此王子季芉畀我皆平王女案孔穎達定四年正義云世族譜季芉與畀我為二人皆平王女也服䖍云季芉許嫁而字畀我禮婦人許嫁笄而稱字季芉稱字是許嫁也蓋遭亂夫死而改適鐘建陸徳徳明經典釋文説同案服以季芉畀我為一人杜以季芉畀我為二人今不可攷姑並存之又案此條永樂大典闕從經典釋文及正義所引釋例増入陽氏陽令終陽完令終子陽佗令終子案程公説春秋分記云陽氏别祖王子陽生尹尹生匄匄生三子曰令終曰完曰佗昭二十七年傳令尹子常殺陽令終與其弟及佗則完佗與令終俱為匄之子也世族譜誤以陽完及佗為令終之子今正之今據此補入並正杜氏之失于此鬭氏鬭射師鬭㢘若敖子案杜預莊三十年傳集解云射師鬭㢘也孔穎達正義曰杜注與譜並以射師鬭㢘為一人未知何據服䖍云射師若敖子鬭班也攷射師被梏不言舍之何以得殺子元知射師與班非一人也莊又案鬭射師鬭班二條永樂大典闕從三十年正義所引釋例補入鬭班若敖孫鬭宜申鬭㢘孫案此條永樂大典闕從程公説春秋分記所引世族譜補入屈氏屈蕩屈申屈蕩孫案此條亦從春秋分記所引世族譜補入蒍氏蒍艾獵孫叔敖蒍子馮叔敖子案襄十五年正義云案世本蒍艾獵是孫叔敖之兄馮是艾獵之子則馮是叔敖兄之子也杜集解及釋例皆以為艾獵叔敖為一人馮是叔敖之子世本轉寫多誤杜當考得其真又案蒍艾獵蒍子馮二條永樂大典闕從襄十五年正義所引釋例補入申氏申叔時申叔跪案程公説春秋分記云楚之申氏有三申公巫臣之後屈氏别族也申舟之後及申宇即申氏也申叔時而下申叔是也時生跪跪生豫世族譜乃以申叔時申叔跪合于申氏之後誤矣今據此補入并正杜氏之失于此虞虞國姬姓周太王之子太伯之弟仲雍是為虞仲嗣太伯之後武王克商封虞仲之庶孫以為虞仲之後處中國為西呉案此句永樂大典作處中國而西遷從桓五年正義所引釋例改正後世謂之虞公僖公五年晉滅之小邾小邾國邾挾之後也夷父顔有功于周其子友别封為附庸居郳曽孫犁來始見春秋附從齊桓以尊周室命為小邾子穆公之孫惠公以下春秋後六世而楚滅之案孔穎達莊五年正義云世本云邾顔居邾肥徙郳宋仲子注云邾顔别封小子肥于郳為小邾子則顏是邾君肥始封郳又云世本言肥杜譜言友當是一人僖七年經書小邾子來朝知齊桓請王命命之又案此條永樂大典闕佚從莊五年正義所引釋例補入郳犁來邾顔曽孫穆公魁犂來之孫射哀十四年奔魯右小邾人三北燕北燕國姬姓召公奭之後也周武王封之于燕居漁陽薊縣其國僻小不通諸夏自召公至簡公􅍁二十九世始見經簡公子獻公十二年獲麟之嵗也獻公子孝公七年春秋之傳終矣孝公立十五年卒孝公以下六世始大稱王十二世二百二十五年秦滅之案此條永樂大典闕佚從左傳襄二十八年正義所引釋例補入萊萊不知其姓案此條永樂大典闕從襄二年正義所引世族譜補入呉吳國姬姓周太王之子太伯仲雍之後也太伯仲雍讓其弟季厯而去之荆蠻自號勾吳或工吳勾工夷言發聲也太伯無子而卒仲雍嗣之當武王克殷而因封其曽孫周章于呉為呉子又别封章弟虞仲于虞自太伯五世而得封十二世而晉滅虞虞滅而呉始大至夀夢而稱王夀夢以上世數可知而不紀其年夀夢之元年魯成公之六年也夫差十五年獲麟之嵗也二十三年魯哀公之二十二年而越滅呉矣泰伯仲雍呉子乘夀夢呉子諸樊遏吳子餘祭戴呉呉子夷末句餘州于僚公子光闔閭呉子光夫差公子蹶由夀夢子公子燭庸夀夢子公子掩餘夀夢子季札公子札延州來季子夀夢子夫槩王闔閭弟太子諸樊王僚子太子終纍闔閭子子山闔閭子王子姑曹王子地太子友夫差子雜人狐庸屈狐庸本晉臣夀越公子黨慶封本齊臣鱄設諸公子苦偃州員太宰嚭子餘本楚伯州犂孫泄庸叔孫輒子張本魯臣王犯公山不狃子泄本魯臣徐承胥門巢展如王孫彌庸行人且姚夀於堯申叔儀公子慶忌伍員子其在齊為王孫氏右呉人四十一越越姒姓其先夏后少康之庶子也封于㑹稽自號於越於者夷言發聲也濵在南海不與中國通後二十餘世至于允常魯定公五年始代呉允常卒子句踐立是為越王越王元年魯定公之十四年也魯哀公二十二年句踐滅呉霸中國卒春秋後七世大為楚所破遂微弱矣外傳曰芈姓歸越是越本楚之别封也或非夏后之後也案此條永樂大典闕佚從宣八年正義所引釋例補入滕滕姬姓文王子錯叔繡之後也武王封之居滕今沛郡公丘縣是也自叔繡及宣公十七世乃見春秋隠公以下春秋後六世而齊滅滕矣案左傳隠七年正義云世本言齊景公亡滕案齊景之卒在滕隠之前世本言隠公之後仍有六世為君而云齊景亡滕為謬殊甚服䖍昭四年注亦云齊景亡滕亦誤攷漢書地理志沛郡公邱縣故滕國也周文王子錯叔繡所封二十一世為齊所滅宣公嬰齊昭公毛伯宣公孫文公繡成公原文公子案文公子三人永樂大典脱佚從昭三年正義所引世族譜補入悼公寜頃公結隠公虞母右滕人七南燕南燕伯爵不知所出案此條用服䖍之説永樂大典闕從莊二十年正義所引釋例補入夷夷國夷詭諸妘姓案此條永樂大典闕從隠元年正義所引世族譜補入又案正義云世本夷妘姓𫝊無其人不知為誰所滅釋例土地名夷國在城陽莊武縣莊十六年晉武公伐夷執夷詭諸杜云詭諸周大夫夷采地名釋例土地名注為闕則二夷别也世族譜于夷詭諸之下注云妘姓則以二夷為一計莊武之縣遠在東垂不得為周大夫之采邑而晉取其地是譜誤也白狄白狄子姬姓鮮虞中山白狄姬姓昔陽肥子綿臯白狄别種鼓子䳒鞮赤狄赤狄子姬姓赤狄潞氏潞子嬰兒隗姓赤狄甲氏留吁潞氏之餘廧咎如赤狄别種隗姓學者上采太史公書世本旁引傳記諸子多有異同莫得其真故止集傳所載古人名字不復他取案此條永樂大典闕從程公説春秋分記所引世族譜補入少皥氏其官以鳥為名然則此五官皆在髙陽之世也案此條永樂大典闕從昭二十九年正義所引釋例世族譜補入又案傳云史墨對魏獻子曰五行之官是謂五官木正日句芒火正曰祝融金正曰蓐収水正曰元冥土正日后土少皥氏有四叔日重日該日修日熙實能金木及水使重為句芒該為蓐収修及熙為元冥世不失職遂濟窮桑此其三祀也顓頊氏有子曰犂為祝融共工氏有子曰句龍為后土此其二祀也又案此條及上三條全文已佚無可係屬附録于此修及熙皆為元冥未知昧為誰之子或是其子孫也案此條永樂大典闕從昭元年正義所引釋例補入又案傳云昔金天氏有裔子曰昧為元冥師生允格臺駘正義云昧為金天裔子當是修熙之後案鯀則舜之五世從祖父也而及舜共為堯臣堯則舜之從髙祖而妻以其女此史記之可疑者案此條永樂大典闕從文十八年正義所引釋例世族譜補入仲又案傳云髙辛氏有才子八人伯奮仲堪叔獻季伯虎仲熊叔豹季貍杜集解云髙辛帝嚳之號八人其苗裔即稷契朱虎熊羆之倫正義云史記稷契與堯皆為帝嚳之子稷契堯之親弟以堯之聖有大徳之弟乆而不知舜始舉用以情而測理必不然且云世濟其其間必應累世不容髙辛之下即至其身馬遷傳聞昔人末必盡得其實故世族譜取史記之説又從而譏之宻須姞姓案此條永樂大典闕從程公説春秋分記所引釋例補入春秋釋例卷九
