如滕與葬同月知此城向與出奔同月但本事既異各隨本而書之下有月而此無爾其實同是十一月也但十一月水星昏猶未正故復推校厯數此年月却節前水星可在十一月而正又方者未至之辭故以定之方中為比欲向中而實未正中十一月可以興土功也書時非傳誤也劉炫規過以為案周語云辰角見而雨畢天根見而水涸駟見而隕霜火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁隕霜而冬裘具清風至而修城郭故夏令日九月除道十月成梁營室之中土功其始先儒以為建戍之月霜始降房星見霜降之後寒風至而心星見鄭𤣥云辰角見謂九月本天根見謂九月末天根謂氐星是也自然火見是建亥之月又春秋城楚丘是正月而杜引詩云定之方中未正中也定星豈正月未正中乎據此諸文則火見土功必在建亥之月建戊之月必無土功之理杜以為建戍之月得城向者非也今案周語之文單子見陳不除道故譏為此言所舉時節並在早月月令孟冬天子始裘單子云隕霜而冬裘具九月已裘是其早也且周語之文據尋常節氣九月而除道十月而興土功杜以此年閏在六月則建戍之月二十一日已得建亥節氣土功之事何為不可諸侯城楚丘自在正月衛人初作宫室必在其前杜云定星方欲正中于理何失劉廣引周語以規杜不知杜謂月却節前何須致難也桓公十七年正月甲辰大二月甲戌小三月癸夘大四月癸酉小五月壬寅大六月壬申小七月辛丑大八月辛未大九月辛丑小十月庚午大十一月庚子小十二月己巳大正月丙辰十三日二月丙午二月無丙午日月必有誤三月四日也五月丙午五日六月丁丑六日八月癸巳二十三日冬十月朔日有食之傳曰不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官于朝十月辛夘二十二日桓公十八年正月己亥小二月戊辰大三月戊戌小四月丁夘大五月丁酉小六月丙寅大七月丙申小八月乙丑大九月乙未小十月甲子大十一月甲午大十二月甲子小四月丙子十日丁酉公之喪至自齊五月一日也有日無月七月戊戌三日十二月己丑二十六日春秋釋例卷十
