body:
  text: 春秋釋例卷十晉杜預撰經傳長厯第四十六之一案此篇見永樂大典其篇目亦存桓十七年冬十月朔日有食之傳曰冬十月朔日有食之不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官于朝莊二十五年夏云云六月辛未朔日有食之鼓用牲于社傳曰夏六月辛未朔日有食之鼓用牲于社非常也惟正月之朔慝未作于是乎用幣于社伐鼓于朝僖十五年夏五月日有食之傳曰夏五月日有食之不書朔與日官失之也文元年春云云二月癸亥日有食之傳曰于是閠三月非禮也先王之正時也履端于始舉正于中歸餘于終履端于始序則不愆舉正于中民則不惑歸餘于終事則不悖閠當在僖公末年十五年夏云云六月辛丑朔日有食之鼓用牲于社傳曰六月辛丑朔日有食之鼓用牲于社非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威古之道也襄二十七年冬十有二月乙亥朔日有食之傳曰十一月乙亥朔日有食之辰在申司厯過也再失閠矣昭十七年夏六月甲戌朔日有食之傳曰夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝禮也平子禦之曰止也惟正月朔慝未作日有食之于是有伐鼓用幣其餘則否太史曰在此月也日過分而未至三辰有災于是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子将有異志不君君矣哀十二年冬十有二月螽傳曰冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也厯見經傳七百七十九傳發有八釋例曰書稱朞三百六旬有六日以閠月定四時成嵗允釐百工庶績咸熙是以天子必置日官諸侯必置日御世修其業以攻其術案攻字劉昭續漢書律厯志注引長厯作攷舉全數而言故曰六日其實五日四分日之一日一日行一度而月日行十三度十九分度之七有竒日官當㑹集此之遲速案速字劉昭叔漢書律厯志註及晉書引長厯並作疾以攷成晦朔錯綜以投閏月閏月無中氣而北斗斜指兩辰之間所以異于他月也積此以相通四時八節無違乃得成嵗其微密至矣得其精微以合天道則事叙而不悖故傳曰閠以正時時以作事事以厚生生民之道于是乎在矣然隂陽之運隨動而差差而不已遂與厯錯故仲尼丘明毎于朔閠發文蓋矯正得失因以宣明厯數也桓十七年日有食之得朔而史闕其日單書朔僖十五年日食亦得朔而史闕其朔與日故傳因其得失並起時史之謬兼以明其餘日食或厯失其正也莊二十五年經書六月辛未朔日有食之鼓用牲于社周之六月夏之四月所謂正陽之月也而厯數誤案厯數劉昭續漢書律厯志注引長厯作時厯寔是七月之朔非六月故傳曰非常也惟正月之朔慝未作日有食之于是乎有用幣于社伐鼓于朝明此食非用幣伐鼓常月因變而起厯誤也文十五年經文皆同而更復發傳曰非禮者明前傳欲以審正陽之月後傳發例欲以明諸侯之禮而用牲為非禮也此乃聖賢之微㫖而先儒所未喻也昭十七年夏六月日食而平子言非正陽之月以誣一朝近于指鹿為馬故傳曰不君君且因以明此月為得天正也劉子駿造三統厯以修春秋春秋日有食之有甲乙者三十四而三統厯惟得一食厯術比諸家既最疏又六千餘嵗輒益一日凡嵗當累日為次而無故益之此不可行之甚者班固前代名儒而謂之最密非徒班固也自古以來諸論春秋者多違謬案多違謬劉昭律厯志注及晉書引長厯並作多述謬誤或造家術或用黄帝以來諸厯以推經傳朔日皆不得諧合日食于朔此乃天騐經傳又書其朔日食可謂得天而劉賈諸儒説皆以為月二日或三日並公違聖人明文其蔽在于守一元不與天消息也余感春秋之事嘗著厯論極言厯之通理其大指曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量案行度下晉書律厯志引長厯有有字可得而限累日為月累月為嵗以新故相攷案攷字劉昭續漢書律厯志注引長厯作序不得不有毫毛之差案毫毛晉書律厯志引長厯作毫末此自然之理也故春秋日有頻月而食者有曠嵗而不食者理不得一而算守恒數故厯無有不差失也始失于毫毛而尚未可覺積而成多以失弦望朔晦則不得不改憲以順之案順字劉昭續漢書律厯志注及晉書引長厯並作從字書所謂欽若昊天厯象日月星辰易所謂治厯明時言當順天以求合非為合以驗天者也案此句文元年正義引釋例作非苟合以驗天者也推此論之春秋二百餘年其治厯通變多矣案通變劉昭續漢書律厯志注及晉書引長厯並作論體雖數術絶滅還尋經傳微㫖大量可知時之違謬則經傳有驗學者固當曲循經傳月日日食以攷晦朔也以推時驗而見皆不然各據其學以非春秋此無異度己之跡而欲削他人之足也余為厯論之後至咸寜中有善算者李修夏顯案夏顯晉書律厯志引長厯作卜顯依厯體為術案厯體劉昭續漢書律厯志注及晉書引長厯並作論體名乾度厯表上朝廷其術合日行四分之數而微増月行案月行晉書律厯志引長厯作月術用三百嵗改憲之意二元相推七十餘嵗承以强弱强弱之差蓋少而適足以逺通盈縮時尚書及史官以乾度厯與泰始厯參校古今記注乾度厯殊勝案晉書律厯志引長厯此句下有泰始厯上勝官厯四十五事十一字今其術具存時又并攷古今十厯以驗春秋知三統厯之最疏也今具列其時得失之數又據經傳微㫖證據及失閠㫖攷日辰朔晦以相發明為經傳長厯如左諸經傳證據及失閠違時文字謬誤皆甄發之雖未必其得天蓋是春秋當時之厯也學者覽焉大凡經傳有七百七十九日三百九十三日經三百八十六日傳其三十七日食三無甲乙黄帝厯得四百六十六日一日食失三百一十三日三十六日食三無甲乙顓頊厯得五百九日八日食失二百七十日二十九日食三無甲乙夏厯得五百三十六日十四日食失二百四十三日二十三日食三無甲乙真夏厯得四百六十六日一日食失三百一十三日三十六日食三無甲乙殷厯得五百三日十三日食失二百七十六日二十四日食三無甲乙周厯得五百六日十三日食失二百七十三日二十四日食三無甲乙真周厯得四百八十五日一日食失二百九十四日三十六日食三無甲乙魯厯得五百二十九日十三日食失二百五十日二十四日食三無甲乙三統厯得四百八十四日一日食失二百九十五日三十六日食三無甲乙乾象厯得四百九十五日七日食失二百八十四日三十日食三無甲乙泰始厯得五百一十日十九日食失二百六十九日十八日食三無甲乙乾度厯得五百三十八日十九日食失二百四十一日十八日食三無甲乙今長厯得七百四十六日三十三日食失三十三日經傳日月誤四日食三無甲乙漢末宋仲子集七厯以攷春秋案其夏周二厯術數皆與藝文志所記不同故更其名為真夏真周厯也隠公元年正月辛巳小二月庚戌大三月庚辰小四月己酉大五月己夘小六月戊申大七月戊寅小八月丁未大九月丁丑小十月丙午大十一月丙子大十二月丙午小五月辛丑二十二日十月庚申十五日隠公二年正月乙亥大二月乙巳小三月甲戊大四月甲辰小五月癸酉大六月癸夘小七月壬申大八月壬寅小九月辛未大十月辛丑小十一月庚午大十二月庚子小閠十二月己巳大八月庚辰八月無庚辰七月九日有庚辰日月必有誤案左傳正義云杜檢勘經傳此年八月壬寅朔其月三日甲辰十五日丙辰二十七日戊辰其月無庚辰也七月壬申朔則九日有庚辰杜觀上下若月不容誤則指言日誤若日不容誤則指言月誤此則上有秋下有九月則日月俱得有誤十二月乙夘十六日隠公三年正月己亥大二月己巳小三月戊戌大四月戊辰小五月丁酉大六月丁夘小七月丙申大八月丙寅小九月乙未大十月乙丑小十一月甲午大十二月甲子小二月己巳日食一日三月庚戌十三日壬戌二十五日四月辛夘二十四日八月庚辰十五日冬庚戌十二月無庚戌十一月十七日也案左傳正義云傳紀庚戊無月而云十二月者以經盟于石門在十二月知此亦十二月也經書十二月下云癸未葬宋穆公計庚戌在癸未之前三十三日不得共在一月故長厯推此年十二月甲子朔十一日有甲戌二十三日有丙戌不得有庚戌而月有癸未則月不容誤知日誤也十二月癸未二十日隠公四年正月癸巳大二月癸亥小三月壬辰大四月壬戌小五月辛夘大六月辛酉大七月辛夘大八月庚申大九月庚寅小十月己未大十一月己丑小十二月戊午大戊申衛州吁弑其君完三月十七日也有日而無月也案左傳正義云戊申在癸未之後二十五日更盈一周則八十五日往年十二月癸未葬宋穆公則此年二月不得有戊申雖承二月之下未必是二月之日故長厯推此年二月癸亥朔十日壬申二十二日甲申不得有戊申也三月壬辰朔則十七日有戊申也此經上有二月下有夏戊申當在三月之内不是字誤故云有日而無月僖二十八年冬下無月而經有壬申公朝于王所有日而無月全經凡如此者有十四事知此亦同之也隠公五年正月戊子大二月丁巳大三月丁亥小四月丙辰大五月丙戌小六月乙夘大七月乙酉小八月甲寅大九月甲申小十月癸丑大十一月癸未小十二月壬子大閏十二月壬午大十二月辛巳三十日隠公六年正月壬子小二月辛巳大三月辛亥小四月庚辰大五月庚戌小六月己夘大七月己酉小八月戊寅大九月戊申小十月丁丑大十一月丁未大十二月丁丑小五月庚申十一日辛酉十二日隠公七年正月丙午大二月丙子小三月乙巳大四月乙亥小五月甲辰大六月甲戌小七月癸夘大八月癸酉小九月壬寅大十月壬申小十一月辛丑大十二月辛未小閠十二月庚子大七月庚申十八日十二月壬申二日辛巳十一日隠公八年正月庚午大二月庚子三月己巳大四月己亥小五月戊辰大六月戊戌小七月丁夘大八月丁酉小九月丙寅大十月丙申小十一月乙丑大十二月乙未小三月庚寅二十二日四月甲辰六日辛亥十三日甲寅十六日六月己亥二日辛亥十四日七月庚午四日八月丙戌七月有庚午丙戌誤九月有辛夘二十六日八月不得有丙戌丙戌誤也案左傳正義云庚午之後十六日而有丙戊二十一日而有辛夘七月有庚午九月有辛夘其間不容一月是八月不得有丙戌更遙一周則丙戌去庚午七十七日八月亦不得有丙戌足明丙戌為日誤長厯推七月丁夘朔四日庚午至二十日是丙戊九月丙寅朔二十六日辛夘其月二十一日是丙戌八月小丁酉朔十日丙午二十日丙辰二日戊戌十四日庚戌二十六日壬戌未知丙戌二字孰為誤也九月辛夘二十六日隠公九年正月甲子大二月甲午小三月癸亥大四月癸巳大五月癸亥小六月壬辰大七月壬戌小八月辛夘大九月辛酉小十月庚寅大閠十月庚申小十一月己丑大十二月己未小三月癸酉十一日庚辰十八日十一月甲寅二十六日隠公十年正月戊子大二月戊午小三月丁亥大四月丁巳小五月丙戌大六月丙辰大七月丙戌小八月乙夘大九月乙酉小十月甲寅大十一月甲申小十二月癸丑大正月癸丑二十六日案杜氏集解曰傳言正月㑹癸丑盟釋例推經傳日月癸丑是正月二十六日知經二月誤六月戊申六月無戊申五月二十三日也上有五月則誤在