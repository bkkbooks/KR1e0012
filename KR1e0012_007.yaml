六年置陳州鄧姫姓也胡在豫州郾城巢在廬州案隋書地理志梁置南豫州開皇初改為廬州白在豫州褒信縣案杜佑通典褒信縣屬豫州莒在密州案隋書地理志舊置膠州開皇五年改為密州商於商在商州商洛縣於在鄧州內鄉於林也案杜佑通典商洛縣屬商州內鄉縣屬鄧州舊唐書地理志啇洛漢商縣隋又加洛字內鄉漢淅縣地後周曰中鄉隋曰內鄉上庸在房州竹山縣案杜佑通典隋房陵郡唐武德初於竹山縣置房州隋書地理志竹山屬房陵郡梁曰安城西魏改竹山漢在漢中郡案杜佑通典漢中郡秦置二漢因之唐為梁州或為漢中郡上黨澤潞等州案隋書地理志澤州隋開皇初置潞州後周置河外陕虢等州案杜佑通典陕州後魏置虢州唐置重丘括地象云曹州城武縣有重丘故城案隋書地理志後魏置西充州後周改曰曹州隋曰濟隂郡城武縣屬焉伊闕山在洛州案杜佑通典伊闕縣屬洛州河南府有洛渾山圉城汴州雍丘縣東案杜佑通典雍丘縣屬汴州漢圉縣故城在東南蕭臺是恆山之别名莒周武王封少昊之後嬴姓於莒即墨萊州案隋書地理志東萊郡下云舊置光州開皇五年改曰萊州即墨縣屬焉夀春夀春案漢書地理志夀春屬九江郡隋書地理志屬淮南郡舊唐書地理志屬夀州鄴中相州案魏書地形志相州太祖天興二年置鄫在鄭州新鄭縣東案杜佑通典新鄭縣屬鄭州本鄫國之地詩譜云高辛氏火正祝融之墟歷官至於周重黎之後鄫仲之國為鄭武公所滅也鄀世本云允姓之國昌意降居為侯也在襄州樂鄉縣也案隋書地理志襄陽郡下云江左並僑置雍州西魏改為襄州杜佑通典隋後改為襄陽郡因之樂鄉縣屬焉春秋郡國地也綸虞邑洛州嵩陽縣是漢輪氏縣隋改曰嵩陽案漢書地理志綸氏屬穎川郡續漢書郡國志輪氏建初四年置亦屬穎川郡隋書地理志嵩陽縣屬河南郡後魏置曰頴陽開皇十八年改曰輪氏大業元年改曰嵩陽舊唐書地理志登封隋嵩陽縣初屬洛州開元元年改為河南府鄫在沂州承縣案舊唐書地理志承縣屬沂州武德四年置邾故城在兗州案杜佑通典鄒縣屬兗州故邾國城在縣東南羑里在相州湯隂縣北案漢書地理志湯隂屬河內郡有羑里城西伯所拘也續漢書郡國志同舊唐書地理志杜佑通典湯隂並屬相州崇國在雍州西南鄠縣東故鄷宫是案漢書地理志鄠縣屬右扶風續漢書郡國志同杜佑通典鄠縣屬雍州京兆府殷之崇國在其界密國姬姓國畿內國宣王滅之無棣在滄州無棣縣南無棣溝是案隋書地理志渤海郡下云開皇六年置棣州大業二年改滄州無棣縣屬焉縣係開皇六年置蒲姑在青州博昌縣案隨書地理志博昌縣屬北海郡舊唐書地理志博昌縣屬青州紀國在青州夀光縣案隋書地理志夀光縣屬北海郡舊唐書地理志夀光縣屬青州堂阜在兖州句陽縣阜高三尺周百步案杜土地名云東莞蒙隂縣西北有夷吾亭古堂阜也杜佑通典沂州新泰縣下云漢蒙隂縣古城在今縣東南堂阜在縣東案東莞前漢屬琅琊郡後漢屬琅琊國即唐之沂州琅琊郡是也漢書地理志句陽縣屬濟隂郡續漢書郡國志同晉書地理志屬濟陽郡隋唐無此縣郯音炎少昊之後嬴姓之國屬東海郡談在齊州南平陵縣案後魏書地形志云齊州皇興三年置領郡六平陵屬濟南郡遂城在兗州柯在濟州東阿縣案隋書地理志濟北郡下云舊置濟州東阿縣屬焉杜佑通典唐改濟北郡為濟州東阿仍屬濟州春秋時齊之柯邑鄄音絹在濮州案杜佑通典鄄城漢舊縣屬濮州山戎今夷國是孤竹城在平州盧龍縣案隋書地理志北平郡舊置平州盧龍屬焉縣本名新昌開皇十八年改流沙括地象云居延海在甘州案杜佑通典漢張掖郡西魏置西凉州尋改為甘州唐亦為甘州張掖縣屬焉漢居延縣城在縣東北地理志云居延縣居延澤在東北古文以為流沙案此漢書地理志之文也居延縣漢屬張掖郡東虢國一名武牢亦鄭之制邑漢之成臯縣杞汴州雍丘縣故杞國城是案杜佑通典雍丘縣屬汴州故杞國洮水一名涑水出絳州案酈道元水經涑水注云洮水出清野山西合涑水則涑水殆洮水之兼稱也靡筓山括地象云一名磨筓山亦云馬頭山在蔚州飛狐縣案杜佑通典蔚州後周置飛狐縣隋置隋屬上谷郡唐屬蔚州趙襄子既殺代王迎其子代王夫人曰以弟侵夫非仁也以夫怨弟非義也磨筓自殺遂以名焉中牟在河北崆峒山在原州高平縣案魏書地形志原州正光五年置領郡二高平縣屬高平郡杜佑通典高平縣唐屬原州有笄頭山一名崆峒山應城在汝州魯山縣案杜佑通典唐書魯山縣屬汝州平州在汾州介休縣西案杜佑通典唐時介休縣屬汾州濟南城在淄州案隋以漢之濟南郡及災州國地分置齊州及淄州煬帝并為齊郡唐初為齊州乾元元年復分齊州置淄州郕在濮州雷澤武王封季載於郕案杜佑通典唐置雷澤縣屬濮州古郕伯國也韋國在滑州北三十里白馬縣南有韋城案杜佑通典隋以漢東郡地為滑州唐因之白馬縣屬焉淮陽今陳州案隋書地理志淮陽郡開皇十六年置陳州杜佑通典唐為陳州淮陽郡漢中梁州案舊唐書地理志唐以漢川郡為梁州天寶元年改為漢中郡千畝晉州嶽陽縣案隋書地理志後魏置晉州隋改臨汾郡嶽陽縣屬焉後魏置曰安澤大業初改謝城在兗州龔丘縣案隋書地理志魯郡舊兗州龔丘屬焉後齊曰平原開皇十六年改費在沂州案漢書地理志費縣屬東海郡杜佑通典唐制費縣屬沂州古魯費邑菟裘在兗州泗水縣案隋書地理志泗水屬魯郡開皇十六年置三脊茅辰州盧溪縣南有苞茅山案隋書地理志沅陵郡下云開皇元年置辰州舊唐書地理志武德四年置辰州盧溪屬焉武德三年分沅陵縣置武陵記云山際出茅有刺三脊如越今蘇州西南三十五里橫山南有魯都村村內有城哀公居之案隋書地理志陳置吳州隋平陳改曰蘇州河內古帝王都多在河東北故呼河北為河內春秋釋例卷七
