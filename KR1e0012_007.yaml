body:
  text: 春秋釋例卷七晉杜預撰土地名第四十四之三小國地隱元年虢滎陽縣案晉書地理志滎陽縣屬滎陽郡共汲郡共縣宿東平無鹽縣祭闕申南陽宛縣夷城陽壯武縣所治夷安地二年向譙國龍亢縣東南有向城案晉書地理志龍亢縣屬譙郡極闕五年燕東郡燕縣案隱五年正義云燕有二國一稱北燕此則南燕也世本燕國姞姓地理志東郡燕縣南燕國姞姓黃帝之後也小國無世家不知其君號諡惟莊二十年燕仲父見𫝊耳又案續漢書郡國志燕縣屬東郡考晉書地理志故漢東郡地分屬濮陽國及平陽頓丘諸郡無東郡亦無燕縣七年滕沛國公丘縣東南有滕城案續漢書郡國志公丘縣屬沛國晉書地理志公丘縣屬魯國凡汲郡共縣東南有凡城十年戴陳留外黃縣東南有戴地案隱十年正義引漢書地理志云梁國災縣故戴國應劭曰章帝改曰考城古者災戴聲相近故鄭𤣥詩箋讀椒戴為熾災是其音大同故漢於戴國立災縣於晉屬陳留十一年息汝南新息縣桓二年郜濟隂成武縣東南有北郜城三年芮馮翊臨晉縣有芮鄉魏河東河北縣五年州淳于二名國都於東莞淳于縣案東莞淳于縣集解作城陽淳于縣考晉書地理志淳于縣屬城陽郡不屬東莞郡集解是七年榖南鄉筑陽縣北榖城案晉書地理志後漢獻帝建安十三年魏武分南陽西界立南鄉郡晉武帝平吳改南鄉為順陽郡筑陽縣屬順陽九年巴巴郡江州縣荀闕賈闕十一年二闕軫闕絞闕州南郡華容縣東南有州陵城蓼義陽棘陽縣東南湖陽城十二年羅在宜城縣西山中後徙南郡枝江縣案晉書地理志宜城屬襄陽郡十三年賴義陽隨縣賴鄉十五年牟泰山牟縣案續漢書郡國志作牟縣晉書地理志作東牟縣均屬泰山葛梁國寧陵縣東北葛鄉案孔穎逹正義云桓五年漢書地理志陳留郡寧陵縣應劭曰古葛伯國然則於晉屬梁國也莊二年於餘丘闕案莊二年正義云公羊穀梁皆以於餘丘為邾之别邑左氏無𫝊春秋未有伐人之邑而不繫國者此無所繫故知是國釋例注闕不知其處蓋近魯小國也十年談濟南平陵縣西南談城案續漢書郡國注東平陵屬濟南郡晉書地理志濟南郡無此縣十二年蕭沛國蕭縣案孔穎達正義云宣十二年楚子滅蕭定十一年宋公之弟辰入于蕭以叛則此後復為宋邑也十三年遂濟北蛇丘縣東北有遂鄉十六年滑費滑二名滑國都於費河南緱氏縣案成十七年𫝊鄭子駟侵晉虛滑杜預集解云滑國為秦所滅時屬晉後屬周孔穎逹正義云僖三十三年秦人滅滑經書入則是滅而不有不知滅後屬何國也此言侵晉知此時屬晉耳襄十八年𫝊楚公子格侵費滑胥靡注云胥靡鄭邑不言費滑杜意當以費滑為周邑也然若是周邑當言侵周以别之定六年𫝊稱鄭伐周馮滑胥靡爾時胥靡亦為周邑蓋費滑胥靡周鄭之間襄時屬鄭定時屬周十八年權南郡當陽縣東南有權城三十年鄣東平無鹽縣東北有鄣城閔元年耿平陽皮氏縣東南有耿鄉霍平陽永安縣東北有霍太山二年陽闕僖二年江汝南陽安縣冀平陽皮氏縣東北有冀亭五年弦弋陽軑縣東南道汝南陽安縣南有道亭柏汝南西平縣有柏亭六年微東平夀張縣西北有微鄉微子冢十四年鄫琅琊鄫縣十五年厲義陽隨縣北有厲鄉韓闕案杜預集解云韓國在河東郡界十七年英氏闕項闕案杜預集解云項國今汝隂項縣考晉書地理志項屬梁國不屬汝隂密滎陽密縣二十一年任任城縣也案晉書地理志任城縣屬任城國須句東平須昌縣西北有須句顓臾泰山南武陽縣東北有顓臾城二十三年頓汝陰南頓縣案續漢書郡國志晉書地理志南頓並屬汝南本文汝隂當是汝南之誤二十四年管滎陽京縣東北管城毛闕聃闕雍河內山陽縣西有雍城畢京兆長安縣西北周武王冢武王葬畢地鄷始平鄠縣東有鄷邑亭邘河內野王縣西北有邘城應襄城城父縣西南有應城蔣弋陽期思縣所治蔣鄉亭茅髙平昌邑縣西有茅鄉案劉昭續漢書郡國志注引杜說云茅鄉在昌邑西南胙東郡燕縣西南有胙亭二十六年䕫建平胏歸縣也二十八年有莘闕二十九年介城陽黔陬縣三十年焦𢎞農陕縣焦亭文三年沈汝南平輿縣北有沈亭五年六廬江六縣六年逼闕十二年巢廬江六縣東有居巢城案居巢西漢故縣也漢書地理志居巢屬廬江郡宣元年崇闕四年䢵闕九年根牟琅琊陽都縣東有牟鄉十二年唐義陽安昌縣東南有上唐鄉十五年黎上黨壺關縣有黎亭成六年鄟闕郇郇瑕氏二名河東解縣西北有郇城襄四年寒北海平夀縣東有寒亭案晉書地理志平夀縣屬濟南郡有鬲平原鬲縣斟灌樂安夀光縣東南有灌亭斟尋北海平夀縣東南有斟亭過有過二名東萊掖縣北有過鄉亭戈哀十二年宋鄭之間有戈邑十年逼陽彭城傅陽縣也十三年邿任城亢父縣有邿亭二十三年鑄濟北蛇丘縣所治鑄鄉城也二十四年豕韋東郡白馬縣東南有韋城案晉書地理志晉初分東郡置濮陽國白馬縣屬濮陽唐太原晉陽縣杜京兆杜陵縣二十九年揚平陽揚縣邶闕鄘闕豳新平漆縣東北邠城鄶滎陽密縣東北鄶城昭元年觀頓丘衛縣扈始平鄠縣扈鄉姺闕邳下邳縣案晉書地理志下邳縣屬下邳國奄商奄二名闕褒闕姒闕蓐闕四年胡汝隂縣西北胡城案晉書地理志汝隂縣屬汝隂郡又案酈道元水經頴水注引杜預釋地西北下有有字有緡闕又云兗州金鄉城緡國也案續漢書郡國志金鄉屬山陽郡舊唐書地理志金鄉屬兗州杜佑通典新唐書地理志並同則以金鄉屬兗州乃唐制也此條又云以下非杜氏本文謹訂於此黎或曰東夷國或曰魏郡黎陽縣疑五年大庭氏今在魯城中九年駘始平武功縣所治釐城岐扶風美陽縣西北有岐山蒲姑樂安博昌縣西北蒲姑城亳闕十二年昆吾東郡濮陽縣案晉書地理志晉初分東郡置濮陽國濮陽縣屬焉十三年房汝南有吳房縣十五年密須安定隂密縣也闕鞏闕十六年甲父高平昌邑縣東南有甲父亭十八年鄅琅琊開陽縣二十七年鍾吾闕二十九年飂闕鬷川鬷夷氏二名闕窮桑闕案杜預集解云窮桑地在魯北定二年桐廬江舒縣西南有桐鄉四年封父闕哀元年仍有仍二名闕右小國一百二十九經傳惟見國名其二十八闕案本文闕者實三十五條共池桓十年惡曹十一年折十一年垂棘僖二年多魚二年牡丘十五年女栗文十年厥貉十年沓十三年上鄍成二年瑣澤十二年交剛十二年貍脤十七年壬申公孫嬰齊卒于貍脤舊說壬申十月十五日貍脤魯地也傳曰十月庚午圍鄭然則二月未得及魯之境也虛朾十八年台谷十八年善道襄五年大隧十九年商任二十一年泮二十五年曠林昭元年祲祥祥二名十一年厥憗十一年鄟陵二十六年拔郯二名定三年安甫十年渠蒢渠拿二名十五年右地二十六未聞古屬何國並闕戎地隱二年戎陳留濟陽縣東南有戎城九年北戎山戎無終三名北平有無終縣桓十三年盧戎闕莊二十八年驪戎京兆新豐縣閔二年犬戎西戎别在中國者闕僖十一年揚闕拒闕泉河南洛陽縣西南有泉亭案杜預集解云伊闕北有泉亭臯闕伊洛之戎雜居洛水伊水之間者河南洛陽縣西南有戎城二十二年陸渾之戎九州之戎河南陸渾縣案杜預集解云允姓之戎居陸渾在秦晉西北二國誘而徙之伊川遂從戎號至今為陸渾也孔穎逹正義云昭九年傳曰允姓之姦居於瓜州注云瓜州今敦煌則陸渾是敦煌之地名也後徙之伊川復以陸渾為名三十三年姜戎晉南鄙成元年茅戎河東大陽縣西有茅亭徐吾氏茅戎之别種案孔穎逹正義云茅戎以是戎內之别徐吾又是茅戎之內聚落之名昭九年隂戎晉隂地哀四年狄戎闕十七年戎州戎邑近衛者闕狄地莊二十八年廣莫北狄地之曠絶蒲與北屈左右閔二年東山臯落氏狄二名赤狄别種在晉東闕案孔穎逹正義云狄有赤狄白狄成十三年傳晉侯使呂相絶秦云白狄及君同州則白狄與秦相近當在晉西此云東山當在晉東宣十五年晉師滅赤狄潞氏潞上黨潞縣在晉之東此云伐東山臯落氏知此亦在晉東是赤狄别種也僖二十三年牆咎如赤狄别種闕案成三年傳云晉郤克衛孫良夫伐牆咎如討赤狄之餘焉杜集解云宣十五年晉滅赤狄潞氏其餘民散入牆咎如故討之孔頴逹正義云赤狄餘種散入咎如之內今伐咎如者來就咎如之內討彼赤狄餘黨然牆咎如容赤狄餘民則咎如亦赤狄矣劉炫以為牆咎如即是赤狄之餘今知不然者以赤狄極多潞氏甲氏鐸辰臯落氏等皆是其類並為建國假令潞氏甲氏鐸辰臯落雖滅自外猶存不滅者多止以言討赤狄之類不得稱餘且以牆咎如容受赤狄餘黨故伐而討責若以牆咎如即是赤狄之餘應取土地興兵絶滅何當惟伐討而已劉炫以牆咎如即是赤狄之餘而規杜非也三十三年白狄故西河郡地有白部胡文十一年長狄鄋瞞鄋瞞長狄國闕潞赤狄潞氏二名在上黨又云潞城縣東有古城赤狄潞氏國也案漢書地理志潞縣屬上黨郡續漢書郡國志同隋書地理志潞城屬上黨郡開皇十六年置舊唐書地理志潞城古邑隋特置潞城縣則潞為漢縣潞城則隋所改也此條又云以下係後人所增謹訂於此宣三年赤狄故上黨郡地有赤沙城十一年欑函闕衆狄闕十六年赤狄甲氏留吁鐸辰三名赤狄别種闕昭十二年鮮虞白狄别種中山新市縣也昔陽肥國都也樂平沾縣東有昔陽城肥白狄别種巨鹿下曲陽縣西有肥纍城案𫝊云晉荀吳僞㑹齊師者假道於鮮虞遂入晉陽秋八月壬午滅肥以肥子縣皋歸孔穎逹正義云劉炫以為齊在晉東僞㑹齊師當自晉而東行也假道鮮虞遂入昔陽則昔陽當在鮮虞之東也今案樂平沾縣在中山新市西南五百餘里何當假道於東北之鮮虞而反入西南之昔陽也既入昔陽而别言滅肥則肥與昔陽不得為一安得以昔陽為肥國之都也昔陽即是肥都何以復言巨鹿下曲陽有肥纍之城疑是肥名取於彼也肥為小國境必不逺豈肥名取巨鹿之城建都于樂平之縣也十五年苟吳伐鮮虞圍鼓杜云鼓白狄之别巨鹿下曲陽縣有鼓聚炫謂肥鼓並在巨鹿昔陽即是鼓都在鮮虞東南也二十二年𫝊云晉苟吳使師僞糴者負甲以息於昔陽之門外遂襲鼓滅之則昔陽之為鼓都斷可知矣今案杜以昔陽為肥國都其說為是傳云遂入昔陽即云壬午滅肥是因入而滅之故云昔陽肥國都也昔陽既在樂平沾縣而杜又云巨鹿下曲陽縣西南有肥纍城相去逺者以肥是本封之名後遷於昔陽猶若肥國本都陳留後遷緣陵鄭本都京兆後遷虢鄶耳昔陽今屬廉州去下曲陽道路非逺在中山南二百餘里劉炫自云肥之與鼓俱在曲陽足知肥纍城與昔陽不甚懸絶劉意欲破杜乃云樂平沾縣在中山新市西南五百餘里又自云昔陽鼓國都與肥相近在中山東南是自相矛盾也然鮮虞在北昔陽在南所以得假道鮮虞遂入昔陽者荀吳意欲滅肥恐肥國防偹故從晉之北境僞欲東南而行往㑹齊師故先回路假道鮮虞南入昔陽如湯之放桀迂路從陑出其不意故也且杜君土地例稱有者皆疑辭故杜云樂平沾縣東有昔陽是疑而不定又且都縣移動古今不一則晉時樂平沾縣何知不是今之昔陽但肥都昔陽與鼓相近晉既滅得肥國故二十二年息昔陽之門外遂襲鼓而取之昔陽非鼓都也劉意好異而妄規杜過非也又案續漢書郡國志下曲陽屬巨鹿郡晉書地理志下曲陽屬趙國不屬巨鹿國又案隋書地理志趙郡稿城下云後齊廢下曲陽屬焉改為槀城縣開皇十年置亷州大業初州廢舊唐書地理志鎮州槀城下云唐初置巨鹿郡武德元年改為亷州貞觀元年州廢正義所云昔陽今屬亷州唐初之制也十三年中人鮮虞地也中山望都縣西北有中人城十五年鼓白狄别種巨鹿下曲陽縣有鼓聚定四年中山鮮虞地中山國治盧奴縣夷地僖十三年淮夷東夷東夷居淮水者闕文十六年百濮建寧郡南有濮夷濮夷無君長總統各以邑落自聚故稱百濮也案此四句永樂大典止有建寧縣南有小夷七字從文十六年正義所引釋例增改哀四年夷虎闕十九年三夷闕敖三夷地闕蠻地文十六年羣蠻闕成十六年陸渾蠻氏戎蠻蠻氏二名河南新城縣東南有蠻城右四夷四十其二十一闕也案本文闕者實十八條山名隱八年泰山奉高縣西北桓六年二山具山敖山僖四年方城南陽葉縣南十四年沙鹿陽平元城縣東南有沙鹿土山也十五年華山𢎞農華隂縣西南三十二年殽𢎞農黽池縣西文十三年繹魯國鄒縣北案晉書地理志鄒縣屬魯郡十六年阜山闕宣二年首山河東蒲坂縣東南首陽山十二年敖滎陽滎澤縣西北是也案晉書地理志滎陽郡治滎陽敖正滎陽縣所屬别無滎澤縣又考續漢書郡國志滎陽有敖亭有費澤劉昭注云左傳宣十二年晉師在敖鄗之間即此又楚潘黨逐魏錡及滎澤杜預曰縣東滎澤也與本書鄭地滎澤條合則滎澤在河南者亦屬滎陽縣本文滎澤縣當是滎陽縣之誤謹訂于此鄗滎陽縣西北敖山東南成二年靡筓闕華不注闕五年梁山馮翊夏陽縣北又云同州韓城縣有梁山案杜佑通典云西魏改華州為同州以漆沮既從澧水攸同言二水至斯同流入渭城居其地故曰同州又云韓城漢為夏陽縣有梁山後周分為郃陽及今縣則同州西魏置韓城宇文周置此條又云以下非杜氏本文謹訂于此襄三年衡山吳興烏程縣南十八年巫山濟北廬縣東北梅山滎陽密縣東北魚齒南陽犨縣北二十三年大行河內郡北昭四年四嶽東嶽泰山奉高縣泰山也南嶽長沙湘南縣衡山也案續漢書郡國志湘南侯國屬長沙郡晉書地理志孫權分長沙立衡陽湘東二郡湘南縣屬衡陽西嶽𢎞農華隂縣西南華山也北嶽中山上曲陽縣西北恆山也案續漢書郡國志上曲陽屬中山國晉書地理志上曲陽屬常山郡不屬中山國三塗河南陸渾縣南山名或曰三塗伊闕大谷轘轅三道也傳曰晉將伐陸渾而先有事於洛與三塗先祭山川也謂三道者非也案孔穎逹正義云服䖍云三塗太行轘轅殽黽也謂三塗為三處道也杜則以三塗為一口又案水經云伊水過陸渾縣南酈志云伊水歷崖山峽即古三塗山也是山在陸渾故城東南八十許里周書武王問太公曰吾將因有夏之居南望過于三塗服䖍曰三塗太行轘轅崤澠非南望也或言宜為轘轅大谷伊闕皆非也陽城河南陽城縣東北山洧水所出太室河南陽城縣西北嵩髙山中嶽也地理志云武帝置嵩高縣以奉太室之山是為中嶽有少室在太室之西謂之少室荆山新城沶鄉縣南中南始平武功縣西南有大臺山岐扶風美陽縣西北塗山淮南夀春縣東北山也五年萊山闕坻箕之山闕七年萊柞闕羽山東海祝其縣西南十一年岡山闕十二年坻闕十六年桑山闕二十二年北山洛北邙山是也定四年小别闕大别闕或曰大别在安豐縣西南案此係鄭康成之說水經亦同傳曰吳既與楚夾漢然後楚乃濟漢而陳自小别至於大别然則二别近漢之名無緣反在安豐也案杜集解云禹貢漢水至大别南入江然則二别在江夏界十三年首山闕哀元年㑹稽在㑹稽山隂縣南四年菟和在上雒縣東案晉書地理志上雒縣屬上雒郡右山四十五案本文實止山四十二其十二闕水名隱三年濟自滎陽卷縣東經陳留至濟隂北經高平東平至濟北經濟南至樂安博昌縣入海案隱三年正義云案檢水流之道今古或殊杜既考校元由據當時所見載于釋例今一皆依杜雖與水經乖異亦不復根尋也四年濮闕桓六年漢一名沔水出武都沮縣東經漢中魏興至南陽東南經襄陽至江夏安陸縣入江八年淮出義陽平氏縣桐柏山東北經汝南汝隂淮南譙國沛國下邳至廣陵縣入海案譙國晉書志理志作譙郡廣陵縣晉書地理志屬廣陵郡十二年彭出新城昌魏縣東北至南鄉筑陽縣入漢案晉書地理志晉武帝改南鄉為順陽郡筑陽屬順陽十三年鄢出新城沶鄉縣東經襄陽至宜城縣南入漢十八年濼出濟南歷城縣故城西北入濟案晉書地理志濟南郡統縣五無歷城縣莊四年溠義陽厥縣西有漈水源出縣北從縣西東南至隨縣入鄖水案莊四年正義云杜以濟解溠蓋聲相近而字轉耳此條永樂大典誤作義陽門西縣東北入須水今從正義所引釋例改正九年洙出魯國東北西南入沇水下合泗十八年涌南郡華容縣南出自江也閔二年渭出隴西狄道縣鳥鼠同穴山東經南安天水略陽扶風始平京兆至𢎞農華隂縣入河僖元年汶出泰山萊蕪縣西南經濟北至東平須昌縣入濟也四年東海自遼西北平漁陽章武渤海樂陵樂安北海東萊城陽東海廣陵吳郡㑹稽十四郡之東界以東也案晉書地理志無漁陽郡其地多屬燕國無北海國其地分屬齊國及濟南城陽東莞諸郡河出西平西南二千里從西平東北經金城故北地朔方五原至故雲中南經平陽河東之西界東經河東河內之南界東北經汲郡魏郡頓丘陽平平原樂陵之東南入於海也案孔頴逹正義云杜之此言據當時之河耳禹貢導河積石至於龍門南至於華隂東至於底柱又東至於孟津東過洛汭至于大伾北過浲水至於大陸又北播為九河同為逆河入于海案驗其地自大伾以上河道不改大伾以下即是汲郡以東河水東流秦漢以來始然也古之河道自大伾而北過洚水故迹不可復知其大陸則趙之廣澤也大陸以北播為九河者徙駭太史間成平以南平原鬲縣以北其九河者徙駭一太史二馬頰三覆釜四胡蘇五簡六潔七鈎盤八鬲