body:
  text: 春秋釋例卷一晉杜預撰公即位例第一案此篇見永樂大典其篇目亦存隠元年春王正月傳曰不書即位攝也桓元年春王正月公即位莊元年春王正月傳曰不稱即位文姜出故也閔元年春王正月傳曰不書即位亂故也僖元年春王正月傳曰不稱即位公出故也文元年春王正月公即位宣元年春王正月公即位成元年春王正月公即位襄元年春王正月公即位昭元年春王正月公即位定元年夏六月癸亥公之喪至自乾侯戊辰公即位哀元年春王正月公即位右公即位凡八襄二十九年春王正月公在楚傳曰春王正月公在楚釋不朝正于廟也昭三十年春王正月公在乾侯傳曰春王正月公在乾侯不先書鄆與乾侯非公且徴過也三十一年春王正月公在乾侯傳曰春王正月公在乾侯言不能外内也三十二年春王正月公在乾侯傳曰春王正月公在乾侯言不能外内又不能用其人也釋例曰凡有國有家者必審别嫡庶以明正統君薨之日嗣子之位國已定也尚書顧命即是天子在殯之遺制也推此亦足以凖諸侯之禮矣天子諸侯喪制與士不同國史每備而錄其得失嗣子位定于初喪而改元必須踰年者繼父之業成父之志不忍有變于中年也遭喪繼立者毎新年正月必改元正位百官以序故國史皆書即位于策以表之隠既繼室之子于第應立而尋父娶仲子之意委位以讓桓天子既已定之諸侯既已正之國人既已君之而隠終有讓國授桓之心所以不行即位之禮也隠莊閔僖雖居君位或有故而不修即位之禮或讓而不為或痛而不忍或亂而不得禮廢事異國史固無所書非行其禮而不書于文也案遭喪繼立者以下永樂大典無之從隠元年正義所引釋例補入文公成公先君之喪未𦵏而書即位因三正之始明繼嗣之正表朝儀以固百姓之心此乃國君明分制之大禮譬周康王麻冕黼裳以行事事畢然後反喪服也雖踰年行即位之禮名通于國内必須既𦵏卒哭乃免喪古之制也案文公成公以下永樂大典無之從文元年正義所引釋例補入癸亥公之喪至自乾侯戊辰公即位喪在外踰年而入故因五日改殯之節國史用元年即位之禮因以此年為元年也然則正月之時未有公矣公未即位元必不改而于春夏即稱元年者公未即位必未改元未改之日必乘前君之年于時春夏當名此年為昭公三十三年及六月既改之後方以元年紀事及史官定䇿須有一統不可半年從前半年從後雖則年初亦通此歳故入年即稱元年也古法既然故漢魏以來雖于秋冬改元史于春夏即以元年冠之是有因于古也案癸亥以下永樂大典無之從定元年正義所引釋例補入襄二十九年經書春王正月公在楚傳曰釋不朝正凡公之行始則書所如還則書公至今復書在楚者案此句襄二十九年正義引釋例作今中復書公在楚者明國之守臣毎月亦以公不朝之故告于廟也毎月必告而特于正月釋之者蓋歳之正也月之正也日之正也三始之正嘉禮所重人理所以自新故特顯所以通他月也公之在外所以闕朝正之禮甚多唯書此一年釋此一事者斯禮有常非義例所急故因公逺出踰年存此一事以示法也魯之羣公以疾不視朔多矣亦因齊事而見案六十六年正義引釋例此句作因有事而見亦釋不朝正之義也昭公之孫毎正月必書者以孫告廟也昭二十五年始出居鄆及乾侯累歳居外而仲尼不書于經故傳曰不先書鄆與乾侯非公且徴過也既以非責公之妄且明過謬之可掩故不顯書其在外使若在國然也自三十年至于終殁則皆顯書所在之地傳皆隨年而互言其事明罪之在公非復過誤也案昭三十年正義引釋例誤作謬三代封建自上及下䧏殺以兩君不亢高臣不極卑强弱相參衆力相須賢愚相厠故雖有昏亂之君必有忠賢之輔案昭三十年正義引釋例必作亦我周東遷晉鄭是依無知之亂實獲小白驪姬之妖重耳以興天下雖瓦解而不土崩海内雖糜沸而不甕溢案昭三十年正義引釋例此句作海内雖鼎沸而不盆溢天生季氏以貳魯侯季氏未有篡奪之惡公雖失志亦無抽筋倒懸之急聽用隸豎僥倖之私既不能强又不能弱所以身死于外見貶于春秋也凡新君即位必書元以明年首稱王以壹紀統年之四節雖或無事必在于事難時也傳各言其所感而已穎氏説以為魯十二公國史盡書即位仲尼修之乃有所不書若實即位則為隠公無讓若實有讓則史無縁虚書也又賈氏云不書隠即位所以惡桓之篡然則僖不篡閔閔不篡莊而此三君皆不書即位復以何惡隠公𫝊則以攝為文莊公𫝊則以姜出為文閔公𫝊則以亂為文僖公𫝊則以公出為文此皆是實不假文託義也丘明于四公發𫝊以不書不稱起文其義一也案邱明三句永樂大典無之從隠元年正義所引釋例増入劉賈頴又欲為𫝊文生例云恩深不忍則𫝊言不稱恩淺可忍則𫝊言不書案此四句永樂大典誤作恩深不忍傳言不書從隠元年正義所引釋例改正博據𫝊詞殊多不通案殺欒盈則云不言大夫案永樂大典無案字從隠元年正義所引釋例増殺良霄則云不稱大夫君氏卒則云不曰薨不言𦵏不書姓鄭伯克叚則云稱鄭伯案鄭伯克叚六字永樂大典脱去從隠元年正義所引釋例增入此皆同意而别文之驗也𫝊本意在解經非曲文以生例也案曲字永樂大典誤作由若當盡錯綜𫝊辭以生義類則不可通苟説此一兩事雖欲槩觀終必泯焉㑹盟朝聘例第二案此篇見永樂大典典惟篇目佚今補隠十年春王二月公㑹齊侯鄭伯于中丘𫝊曰春王正月公㑹齊侯鄭伯于中丘癸丑盟于鄧為師期桓二年春云云三月公㑹齊候陳侯鄭伯于稷以成宋亂𫝊曰㑹于稷以成宋亂為賂故立華氏也十四年春正月公㑹鄭伯于曹𫝊曰春㑹于曹曹人致餼禮也僖元年秋云云八月公㑹齊侯宋公鄭伯曹伯邾人于檉𫝊曰盟于犖謀救鄭也五年夏云云公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止𫝊曰㑹于首止㑹王太子鄭謀寧周也九年夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘𫝊曰夏㑹于葵丘尋盟且修好禮也二十一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋𫝊曰秋諸侯㑹宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之于是楚執宋公以伐宋文十七年夏云云六月諸侯㑹于扈𫝊曰晉侯蒐于黄父遂復合諸侯于扈平宋也公不與㑹齊難故也書曰諸侯無功也宣七年冬公㑹晉侯宋公衛侯鄭伯曹伯于黒壤𫝊曰晉侯之立也公不朝焉又不使大夫聘晉人止公于㑹盟于黄父公不與盟以賂免故黒壤之盟不書諱之也襄五年秋云云公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光呉人鄫人于戚𫝊曰九月丙午盟于戚㑹呉且命戍陳也穆叔以屬鄫為不利使鄫大夫聽命于㑹八年夏云云季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢丘𫝊曰五月甲辰㑹于邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊高厚宋向戌衛甯殖邾大夫㑹之鄭伯獻㨗于㑹故親聽命大夫不書尊諸侯也十四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹呉于向𫝊曰春呉告敗于晉㑹于向為呉謀楚故也夏𫝊曰于是齊崔杼宋華閲仲江㑹伐秦不書惰也向之會亦如之衛北宮括不書于向書于伐秦攝也十六年春云云二月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁𫝊曰晉侯與諸侯晏于温使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸于是叔孫豹晉荀偃宋向戌衛甯殖鄭公孫蠆小邾之大夫盟曰同討不庭夏云云叔老㑹鄭伯晉荀偃衛甯殖宋人伐許傳曰書曰㑹鄭伯為夷故也二十六年夏云云公㑹晉人鄭良霄宋人曹人于澶淵𫝊曰六月公㑹晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田云云趙武不書尊公也向戌不書後也鄭先宋不失所也二十七年夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋𫝊曰宋向戌善于趙文子又善于令尹子木欲弭諸侯之兵以為名三十年冬十月云云晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人㑹于澶淵宋災故𫝊曰為宋災故諸侯之大夫㑹以謀歸宋財冬十月叔孫豹㑹晉趙武齊公孫蠆宋向戌衛北宮佗鄭罕虎及小邾之大夫㑹于澶淵既而無歸于宋故不書其人君子曰信其不可不慎乎澶淵之㑹卿不書不信也夫諸侯之上卿㑹而不信寵名皆棄不信之不可也如是詩曰文王陟䧏在帝左右信之謂也又曰淑慎爾止無載爾偽不信之謂也書曰某人某人㑹于澶淵宋災故尤之也不書魯大夫諱之也定十年夏公㑹齊侯于夾谷𫝊曰公㑹齊侯于祝其實夾谷孔丘相犂彌言于齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔丘以公退云云齊侯聞之遽辟之將盟齊人加于載書曰齊師出境而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將亨公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭徳也不昭不如其已也乃不果享齊人來歸鄆讙龜隂之田哀七年夏公㑹呉于鄫𫝊曰夏公㑹呉于鄫呉來徴百牢云云邾茅夷鴻以束帛乘韋自請救于呉曰云云若夏盟于鄫衍秋而盡背之云云十二年夏云云公㑹呉于槖臯𫝊曰㑹呉于槖臯呉使太宰嚭請尋盟公不欲使子貢對云云乃不尋盟秋公㑹衛侯宋皇瑗于鄖𫝊曰秋衛侯㑹呉于鄖公及衛侯宋皇瑗盟而卒辭呉盟十三年夏云云公㑹晉侯及呉子于黄池𫝊曰夏公㑹單平公晉定公呉夫差于黄池云云秋七月辛丑盟吳晉爭先云云乃先晉人釋例曰𫝊曰朝以正班爵之義率長幼之序㑹以訓上下之則制財用之節明王之制使諸侯嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明古之制也春秋之世文襄之伯其務不煩更制三年而聘五年而朝有事而㑹不協而盟足以昭禮命事謀闕而已雖備此制迫于事難君臣交馳相繼于時或以拜朝或以殷聘初聘報聘來謂使而來見疏數之節無復常制皆書有禮者亦時之所冝也將求于人必先下之故公孫夏謝晉不敏君子稱善事大國也稱朝者兩君相見揖讓于兩楹之間聘者使問于鄰國必皆使卿尊君命也㑹者講禮示威遇者草次相見二國君各簡其禮若道路相逢遇也盟者案永樂大典無者字從隠元年𫝊正義所引釋例増入殺牲載書大國制其言小國尸其事珠槃玉敦以承流血而同㰱案隠元年𫝊正義所引釋例承字作奉地主致餼侯伯致禮于其國都則主人與于盟可知故稱客而不復稱主盟于齊盟于宋是也天子畿内封爵各無明據禮記又是後儒所集案隠元年正義引釋例此句作禮記後人所作亦不正與春秋同今案春秋以考之居三公六卿之位者皆以伯爵子爵居位而别食采邑經自因氏以為文其稱公者皆三公非五等之公也稱伯稱子皆爵稱也通經傳既無稱侯又無稱男者天子之制本不以此爵賜畿内也毛凡之等始以列國入為公卿世事天朝而本封絶滅者若滅虢鄫之等或畿内諸侯據其本封兼仕王朝者也王之公卿皆書爵祭伯凡伯是也大夫稱字案永樂大典句首有卿字從隠元年正義所引釋例刪南季榮叔是也元士中士稱名劉夏石尚是也下士稱人公㑹王人于洮是也其或稱祭公舉官而言也單伯或稱子時王䧏爵也附庸稱名郳犁來是也魯之叔孫父兄再命而書于經晉之司空亞旅一命而經不書推此知諸侯之卿大夫再命以上皆書于經自一命已下大夫及士經皆稱人名字不得見也案昭十二年正義引釋例字作氏王之世子不名諸侯之世子則名㑹王世子于首止曹世子射姑來朝是也附庸世子稱人邾人牟人葛人來朝是也此皆典策之正文也至于夫子治春秋則因事以示臧否王官之宰當以才授位而渠伯糾攝父之職出聘列國故去字稱名蓋姓渠名伯糾也仍叔之子王以恩使故稱父以譏幼弱嘉陳之好故不名其卿賤榖伯鄧侯故以名繫爵貶把伯貴儀父諸此謂夫子之變例也名重于字故君父之前自名朋友之接自字是以春秋之義貶責書其名斥所重也襃厚顯其字避所諱也𫝊滅入例衛侯燬滅邢同姓故名又云榖伯綏鄧侯吾離來朝名賤之也又云不書蔡許之君乘楚車故也謂之失位此皆貶諸侯之例例不稱人也案此二句永樂大典作此皆襃貶之例例有不稱人也從莊十四年正義所引釋例改正諸侯在事案永樂大典諸侯下衍一故字從莊十四年正義所引釋例刪𫝊有明文而經稱人者凡有十二條案莊十四年正義引釋例作十一條丘明不示其義而諸儒皆據案生意原無所出貶諸侯而絀爵稱人案絀爵莊十四年正義引釋例作去爵是為君臣同文非正等差之謂也又澶淵大夫之㑹𫝊曰不書其人案經皆去名稱人至諸侯親城縁陵案至字親字永樂大典脱從莊十四年正義所引釋例增𫝊亦曰不書其人而經總稱諸侯此大夫及諸侯經𫝊所以為别也通校春秋自宣公五年以下百數十年諸侯之咎甚多而皆無貶稱人者益明此等當時告命記注之異非仲尼所以為例故也楚之君臣最多混錯舊説亦隨文强生善惡之狀混瀆無已其不能得辭則皆言惡蠻夷得志然當齊桓之盛而經以屈完敵之若此必有襃貶非抑楚也此乃楚之初興未閑周之典禮告命之書案書字莊二十三年正義引釋例作禮字自生同異猶秦之僻陋不與中國準故春秋亦未以存例也楚之熊繹始封于楚僻在荆山篳路藍縷以處草莽及武王熊逹始居江漢之間然猶未能自同于列國故經稱荆敗蔡師荆人來聘楚人使宜申來獻㨗從其所居之稱而總其君臣至于魯僖始稱楚人而班次在于蔡下僖二十一年當楚成王之世能遂其業同公侯㑹于盂案此句成二年正義引釋例作内列于公侯㑹于盂楚之君爵始與中國列然其臣名氏猶多差錯案差錯成二年正義引釋例作參錯至魯成二年楚公子嬰齊始乃具列傳曰卿不書匱盟也兼為楚臣示例也自此以上春秋未以入例自此以下襃貶之義可得而詳案成二年正義引釋例此句作可得而論之也呉晚通上國故其君臣朝㑹不同于例亦隨楚之初始也案隨字襄二十九年正義引釋例作猶莊三十二年慶父既殺子般國人不與懼而適齊時魯無君其行無辭蓋假赴告之禮而出也云介葛盧東夷之國也實以朝來故傳書其朝不能備儀故經但稱來也郤犨文子交盟㑹魯晉之君其意一也故唯書來盟舉重者也周禮諸侯之適子誓于天子則下其君禮一等未誓則以皮帛繼子男此謂公諸伯子男之世子出㑹朝聘之儀也誓者告于天子正以為世子受天子報命者也未誓謂在國正之而未告天子者也曹之世子未誓而來故賔之以上卿謂比于諸侯之上卿也繼子男之末命數相準故也齊世子光光之立也聞于諸侯則亦是未誓天子之文于次亦當賔之以上卿繼子男之末晉侯嘉其先至故特進之令在滕薛之上此謂霸主臨時之宜非常例也鄫之國君既正屬役于魯則䧏比附庸不得復在諸侯本例故世子從豹如晉經不書及𫝊曰比諸魯大夫也胥命于蒲本無嫌隙申約言以相繼故𫝊曰不盟也鄭人來渝平公及齊侯平莒及郯之屬皆棄惡從好盟要以成信不㰱血也而宋人及楚平暨齊平時實盟而書平者從赴辭也昭六年冬齊侯伐北燕七年春而平冬春相接其間無異事省文故不重言燕猶桓五年冬州公如曹六年春因曰實來也案曰字昭七年正義引釋例作書𫝊以其不分明故超見齊燕平之月以正之也案超見昭七年正義引釋例作𧺫見盟于鄧盟于犖盟于戚公既在㑹而不書其盟者以理推之㑹在盟前知非後盟也蓋公還告㑹而不告盟也諸侯畏晉而竊與楚盟故書盟而貶其卿此所以成晉為盟主也呉之强大始于㑹鄫終于黄池凡三㑹三伐三盟唯書㑹伐而不書盟者呉以盟主自居而行其夷禮禮儀不典則神明不蠲非所以結信義昭明徳故不錄其盟不與其成為盟主也既不與呉之為盟主則宋魯衛三國私盟可許故無貶文也稷之㑹經稱成宋亂成猶平也桓公受賂立華氏貪縱之甚也惡其指斥故逺言始與三國為㑹之本意也璧假易田而謂之假皆所以諱國惡也公子結媵陳人之婦于鄄遂及齊侯宋公盟經備其事而傳無釋文公羊糓梁蓋以為從魯女媵陳國之婦于鄄聞齊宋有亂遂權事之宜以成二君之好一人而二事得失先見于當時故但遂之而已也襄仲既受命聘周未發又兼受命聘晉故傳云將聘于周遂初適晉也入自春秋九十餘歳魯大夫于是始聘晉國故云初聘也齊仲孫之來發于省魯之難故不言聘不稱其名故曰嘉之高子盟不稱使得遂之宜亦其義也祭叔來聘𫝊無明文糓梁以為祭叔為祭公來聘天子内臣不得外交故不言使不與其得外聘也魯受其聘行其禮故書聘也盟者假神明以要不信故載辭或稱同以服異為言也未有臣而盟君臣而盟君是子可盟父案可字永樂大典脱從僖五年正義所引釋例増故春秋王世子以下㑹諸侯者皆同㑹而不同盟洮之盟王室有子帶之難襄王懼不得立告難于齊遣王人與諸侯盟故傳釋之曰謀王室以明王室勑其來盟非諸侯所敢與也踐土之盟王子虎臨㑹諸侯而不同㰱故經唯列諸侯案唯字襄三年正義引釋例作但而傳具載其實此實聖賢之埀意以為將來之永法也一年之間諸侯輯睦翼戴天子而翟泉之盟子虎在列君子以為非天子之命虧上下常節故不存魯侯而人子虎以示篤戒也諸在盟者經皆奪其寵名傳既見所加罪又重明不㑹公侯之法明兼有二闕也雞澤之㑹單子與盟亦王所命也案孔穎逹襄三年正義云杜言王使盟者傳無其文正以經無貶責知是命使盟也大國之卿當小國之君是以得㑹伯子男也傳稱叔老㑹鄭伯為夷故此其義也衛叔武稱子見喪稱例㑹以訓上下之則盟以申舊要之言雖一時之事所用禮殊在㑹列衆國之名則在盟總曰諸侯因事約文臯鼬之盟魯侯重見㑹盟異處也若夫㑹盟名列未彰總曰諸侯者或㑹而無功或功不及其事也不書其㑹後者通謂君臣相㑹不及㑹所故總書其國而不見地所以避不敏也若戰陣之事則皆列諸侯唯不書戰地處父為晉正卿動不以禮而親與公盟故貶其族族去則非卿故以微人常稱為耦也以直厭不直而隨比稱人則所罪之名不彰故特書處父也案孔穎逹文二年正義云春秋卿則書名氏賤者則稱人外卿之貶例皆稱人魯卿之貶乃去其族去族與稱人相類即是不為卿也處父為晉正卿不能匡君以禮君使盟魯即從君命故貶去其族若言處父是晉之賤人故不復書公直言及晉處父盟若魯之賤人往與之盟也賤人不合書名舉其所為之事而已以徵人常稱與處父為耦若處父亦賤人也曽以徵人敵徵人直也晉以卿敵公不直也經以魯之直厭晉之不直也不貶處父稱人者稱人則惡名不見貶其族留其名所以惡處父也君于守臣受命不受辭出疆有可以利社稷者案文八年正義引釋例出疆作出竟専之可也故襄仲始盟趙盾遂㑹盟伊洛之戎四日之間經再書公子不可以遂事常辭顯之也古之盟㑹必備禮儀示等威明貴賤各以成禮為節節制兼備則名位不愆華孫居擾攘之世而能率由古典所以敬事而自重也使自重而事敬則魯尊而禮篤故貴之也至于宴㑹追稱先人之罪為己謙辭謙以失辭故傳云魯人以為敏明君子之所不與也宋伐陳之貳而受楚之討可謂守清丘盟信也諸侯背宋不救故傳云不實其言華椒奉君命以結信當徴言以成利者也而承羣偽之言以誤其國故宋可為守信而華椒亦受虚謬之貶也案孔穎逹宣十二年正義云傳云盟曰恤病討貳陳貳于楚而宋討之衛救陳不討貳也楚伐宋而晉衛不救不恤病也是晉衛背盟故貶其大夫而稱人曹是小國貶與不貶俱當稱人故不言曹也明年𫝊稱君子曰清丘之盟唯宋可以免則宋不違盟而亦貶宋卿者彼晉衛曹並皆偽妄華椒承羣偽之言以謀其國致使宋為盟故伐陳楚人討之伐陳怒楚被伐無救宋雖有守信之善為諸國失信而累及椒也袁僑後至禮不敵諸侯故以大夫盟大夫禮之正也溴梁之盟總稱大夫文異于雞澤者記事者異非𫝊例也邢丘之㑹晉悼霸功就徳立刑行其務不煩諸侯故别遣魯公而約以大夫聽命是時鄭伯獻㨗而親于㑹則諸侯大夫雖在列不為敵公侯公侯之名無所加尊故春秋特貶四國大夫所以尊崇晉徳明示來世尊晉侯者明罪在大夫猶尊秦謂之崇徳也蜀之盟蔡侯許君之參㑹故嬰齊無譏澶淵之㑹趙武向戌良霄以大夫而㑹魯公案公字襄二十六年正義引釋例作侯違古禮之制其罪一也戌加後㑹之尤霄有不失所之進文不得並言卿不書罪之故特言尊公則非三人之所敵三人之罪既正而二人獨以他義别序也季氏専魯禄之去公室三世矣制命出于私門非國所知也叔孫豹魯之賢臣欲匡難以矯時故季孫憚之不敢以己意假公命以敦叔孫釋己而依順也邾滕之班不列于㑹豹不登朝固請受命而行臨㑹邾滕䧏次事非機危既不馳請又不辭㑹而師意改命案師意襄二十七年正義引釋例作率意失命之甚君飽食于深宮今一出命㳟命之使所宜崇長雖有小失遂而申之國内固知我君之命不可以違則季氏有懼而義士生心君子以謂豹不倚順以顯弱命之君而辨小是以自從故以違命貶之也蔡許之君附乘于楚謂之失位諸侯之卿在于盟誓一言之違寵名皆喪此則仲尼之微意而明將來之刑罰也衛北宮括惰于㑹向攝于伐秦一年之中興廢隨事過而能改不逺復無祗悔之義也凡此三百七十餘條劉賈許君曲為辭義來盟細碎既非經傳本體又諸無傳者或有直辭不須傳文絶落而諸儒皆妄為生義趨于不窮今諸經無傳非直辭者皆從闕文也夾谷之㑹齊侯劫公孔丘以義叱之以兵威之將盟又使兹無還責侵田距齊之享屈强國正典儀此聖人之大司也案司字有訛誤徒以二君雖㑹而兵刃相要二國微臣共終盟事故賤而不書非所諱也舊説以同于黒壤之辱為負仲尼也案孔穎逹定十年正義云賈逵云不書盟諱以三百乘從齊師其意以宣七年盟于黒壤而不書經傳言晉侯之立也公不朝又不使大夫聘晉人止公于㑹公不與盟不書盟諱之也緣彼有諱謂此亦諱案此㑹孔子相反汶陽之田以共齊命孔子意也得其三邑而以三百乘從之為相當矣于魯不為負何以諱其盟即以三邑田少不足以當三百乘孔子不㦄惟命反此而已今令反此共命必其足以相當何以諱其從齊也若三百乗從齊必是可諱孔子為相義不能拒何貴乎聖人也故杜以為于是孔子以公退賤者終其事要盟不潔故略不書遇者倉卒簡儀若道路相逢遇者耳于禮案此句隠四年正義引釋例作周禮諸侯冬見天子曰遇劉氏因此名以説春秋自上與傳違案禮春曰朝夏曰宗秋曰覲冬曰遇此四時之名今春秋不皆同又于禮案又字隠四年正義引釋例作之冬見天子當是百官備物之時而云遇禮簡易經書季姬鄫子遇于防此婦呼夫共朝豈用見天子之禮于理皆違戰敗例第三案此篇永樂大典全闞釋例曰長勺之役雖俱陳而鼓音不齊檇李之役越人患呉之整以死士亂呉雖皆已陳猶以獨克為文者舉其權詐也莊十年正義引釋例魯敗宋莒再發未陳之例者嫌君臣有異也莊十一年正義引釋例曰案莊十一年公敗宋師于鄑傳凡師敵未陳曰敗某師昭五年叔弓敗莒師于蚡泉傳曰莒未陳也是再發例也以上釋傳例敵未陳曰敗某師句桓十三年戰不書所所者期戰所在之地也公㑹戰而後其期猶及諸侯共其成敗故備書諸國而不書地成十六年傳曰戰之日齊國佐至于師此其類也然則諸戰書日者日即從月計此經當云二月己巳公㑹紀侯鄭伯今退己巳于鄭伯之下者春秋之例公之出㑹例多以月要盟戰敗例多以日故己巳之文在公㑹紀侯鄭伯之下十二年十二月及鄭師伐宋丁未戰于宋亦其類也桓十三年正義引釋例令狐之役晉人潛師夜起而書戰者晉諱背其前意而夜薄秦師以戰告也河曲之戰秦晉交綏長岸之戰呉楚兩敗交綏並退軍士未憗呉楚俱病莫肯以告故皆書戰而不書敗也邲之戰上軍先陳林父乃敗故書戰又書敗也莊十一年正義引釋例楚之囊瓦貪佩馬以致討稱人罪賤之也定四年正義引釋例戰案以上釋傳例皆陳曰句鄢陵之戰楚師徒未大崩楚子傷目而退故指事而言也言楚子身敗非師敗也故言楚子敗績僖十五年晉侯戎馬還濘而止為秦所獲師不大崩故不言敗也莊十一年正義引釋例奔案以上釋傳例大曰敗績句若太叔叚之比才力足以服衆威權足以自固進不成為外寇强敵退復狡壯有二君之難而實非二君克而勝之則不言彼敗績但書所克之名案此係莊十一年集解之文正義謂釋例與此盡同又案以上釋傳例得儶曰克句覆者謂威力兼備若羅網之所掩覆一軍皆所禽制故以取為文専制之辭也哀九年正義引釋例之案此釋傳例覆而敗曰取某師句母弟例第四案此篇見永樂大典其篇目亦存隠元年夏五月鄭伯克叚于鄢傳曰公子呂曰國不堪貳云云公曰無庸將自及云云太叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛太叔叚叚入于鄢公伐諸鄢五月辛丑太叔出奔共書曰鄭伯克叚于鄢叚不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也七年夏云云齊侯使其弟年來聘傳曰齊侯使夷仲年來聘結艾之盟也桓三年云云冬齊侯使其弟年來聘傳曰冬齊仲年來聘致夫人也十四年夏五鄭伯使其弟語來盟傳曰夏鄭子人來尋盟且修曹之㑹宣十七年冬十一月壬午公弟叔肸卒傳曰冬公弟叔肸卒公母弟也𫝊例曰凡太子之母弟公在曰公子不在曰弟凡稱弟皆母弟也成十年春衛侯之弟黒背帥師侵鄭傳曰衛子叔黒背侵鄭晉命也襄二十年秋云云陳侯之弟黄出奔楚傳曰陳慶虎慶寅畏公子黄之偪愬諸楚曰與蔡司馬同謀楚人以為討書曰云云陳侯之弟黄出奔楚言非其罪也二十三年夏陳侯之弟黄自楚歸于陳傳曰楚人納公子黄二十七年夏云云衛侯之弟鱄出奔晉傳曰殺甯喜云云子鮮曰逐我者出納我者死賞罰無章云云遂出奔晉云云公使止之不可及河又使止之止使者而盟于河託于木門不嚮衛國而坐三十年夏五月云云天王殺其弟佞夫傳曰儋括欲立王子佞夫佞夫弗知戊子儋括圍蒍逐成愆成愆奔平畤五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉書曰天王殺其弟佞夫罪在王也昭元年夏秦伯之弟鍼出奔晉傳曰秦后子有寵于桓如二君于景其母曰弗去懼選癸夘鍼適晉其車千乘書曰秦伯之弟鍼出奔晉罪秦伯也八年春陳侯之弟招殺陳世子偃師傳曰哀公有廢疾三月甲申公子招公子過殺悼太子偃師而立公子留云云書曰陳侯之弟招殺陳世子偃師罪在招也定十年冬云云宋公之弟辰暨仲佗石彄出奔陳傳曰宋公子地嬖蘧富獵云云地出奔陳公弗止辰為之請不聽辰曰是我迋吾兄也吾以國人出君誰與處冬母弟辰暨仲佗石彄出奔陳十一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛傳曰春宋公母弟辰暨仲佗石彄公子地入于蕭以叛秋樂大心從之大為宋患寵向魋故也十四年秋云云宋公之弟辰自蕭來奔釋例曰母弟之寵異于衆弟蓋緣自然之情以飬母氏之志公在雖俱稱公子其兄為君則特稱弟殊而異之親而睦之既異隆友于之恩亦以將為人弟之敬成相親之益也通庶子為君故不言夫人之子而曰母弟母弟之見于經者二十而傳之所發者六條而已凡稱弟皆母弟此䇿書之通例也庶弟不得稱弟而母弟得稱公子案得莊公二十五年正義引釋例作獨故傳之所發隨釋而稱案宣十七年正義引釋例此句作隨而釋之諸稱弟者親不言母皆必稱弟也秦伯之弟鍼適晉女叔齊曰秦公子必歸此公子亦國之常言得兩通之證也仲尼因母弟之例據例以興義鄭伯懐害弟之心天王縱羣臣而殺弟案而字宣十七年正義引釋例作以字夫子故探書其志而顯稱二兄以首惡佞夫稱弟不聞反謀也鄭叚去弟身為謀首也案此四句二也字永樂大典無之從隠元年正義所引釋例增入然則兄害弟者案隠元年莊二十五年正義引釋例兄字下有而字則稱弟以彰兄罪弟又害兄則去弟以罪弟身也推此以觀其餘秦伯之弟鍼陳侯之弟黄衛侯之弟鱄出奔皆是兄害其弟者也秦伯有千乘之國而不能容其母弟傳曰罪秦伯也歸罪秦伯見鍼罪輕也陳侯不能制禦羣臣案羣臣宣十七年正義引釋例作臣下使逐其弟傳曰言非其罪也非黄之罪則罪在陳侯此互舉之文也至于陳招殺兄之子宋辰率羣卿以背宗國披大邑以成叛逆然不推刃于其兄故以首惡稱弟稱名從兩下相殺也統論其義兄弟二人交相殺害各有曲直存弟則示兄曲也案襄二十七年正義引釋例存作書示作是鄭伯既云失教若于例存弟案隠元年正義引釋例于作依則嫌善叚也故特去弟而兩見其義也若夫朝聘盟㑹嘉好之事此乃兄弟之篤睦非義例之所興故仍因舊史之䇿或稱弟或稱公子踐土之盟叔武不稱弟此其義也莒挐非卿非卿則不應書案永樂大典脱非卿二字從僖元年正義所引釋例補入今嘉獲故特書之特書猶不稱弟明諸書弟者皆卿也經書公子慶父伐于餘丘而公羊以為莊公母弟計其年歳既未能統軍又無晉悼王孫滿幼知之文案知字永樂大典誤稚字從莊二年正義所引釋例改正此蓋公羊之妄而先儒曽不覺悟取以為左氏義今推案傳之上下羽父之弑隠公皆䛦謀于桓公然則桓公已成人也傳云生桓公而惠公薨指明仲子唯有此男非謂生在薨年也桓公已成人而弑隠公公即位乃娶于齊自應有長庶故氏曰孟氏此明證也案孔穎逹莊二年正義云氏曰孟氏𫝊文實然經稱仲孫杜無明釋八年傳稱仲慶父其舉諡稱之則謂之共仲蓋慶父雖為庶長而以仲為字其後子孫以字為氏是以經書仲孫時人以其庶長稱孟故𫝊稱孟孫其以諡配字而謂之共仲猶臧僖伯管敬仲之類也劉炫云蓋慶父自稱仲欲同于正適言已少次莊公為三家之長故以莊公為伯而自稱仲春秋之例經稱當時之事書其自稱之辭其人自稱仲孫不得不書為仲𫝊序已往之事舉其時人之語時人呼為孟氏不得不以孟録論語云孟孫問孝于我是時人呼云孟氏也楚公子棄疾弑君取國改名為居經書楚子居卒是從其自稱也公疾問嗣于叔牙案問嗣莊二年正義引釋例作問後叔牙稱慶父材疑是同母弟也𫝊稱季友文姜之愛子與公同生故以死奉般情義相推考之左氏有若符契也今先儒説母弟善惡襃貶既多相錯渉又云稱弟皆謂公子不為大夫者得以君為尊案𫝊莒挐非卿乃法所不書書而不言弟非得以君為尊也凡聘享嘉好之事于是使卿故夷仲年來聘等案此句宣十七年正義引釋例作故夷仲年之聘皆以卿稱弟而行此例所謂凡稱弟皆母弟左氏傳明文而自違之頴氏又曰臣無境外之交故去弟以貶季友子招樂憂故去弟以懲過鄭叚去弟唯以名通故謂之貶今此二人皆書公子公子者名號之羙稱又非所貶也弔贈𦵏例第五案此篇見永樂大典其篇目亦存隠元年秋七月天王使宰咺來歸惠公仲子之賵傳曰天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名天子七月而𦵏同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至贈死不及尸弔生不及哀預凶事非禮也三年秋武氏子來求􅉠傳曰武氏子來求􅉠王未𦵏也五年夏四月𦵏衛桓公傳曰𦵏衛桓公衛亂是以緩桓十七年秋八月云云癸巳𦵏蔡桓侯莊三年夏云云五月𦵏桓王傳曰夏五月𦵏桓王緩也閔元年夏六月辛酉𦵏我君莊公傳曰夏六月𦵏莊公亂故是以緩文五年春王正月王使榮叔歸含且賵三月云云王使召伯來㑹𦵏傳曰王使榮叔來含且賵召昭公來㑹𦵏禮也六年冬十月公子遂如晉𦵏晉襄公傳曰襄仲如晉𦵏襄公八年冬十月云云公孫敖如京師傳曰穆伯如周弔喪九年春毛伯來求金傳曰毛伯衛來求金非禮也不書王命未𦵏也冬云云秦人來歸僖公成風之禭傳曰秦人來歸僖公成風之襚禮也諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好宣十年夏四月云云公如齊傳曰公如齊奔喪成十年秋七月公如晉傳曰秋公如晉晉人止公使送𦵏云云冬𦵏晉景公公送𦵏諸侯莫在魯人辱之故不書諱之也十八年冬云云十有二月丁未𦵏我君成公傳曰𦵏我君成公書順也襄三十年冬十月𦵏蔡景公昭六年春王正月云云𦵏秦景公傳曰大夫如秦𦵏景公禮也十三年冬十月𦵏蔡靈公傳曰𦵏蔡靈公禮也定十五年秋云云九月云云丁巳𦵏我君定公雨不克𦵏戊午日下昃乃克𦵏傳曰𦵏定公雨不克襄事禮也右内外𦵏一百有二弔贈㑹𦵏求􅉠拜𦵏二十六錯綜其十八以包通之釋例曰天子七月而𦵏同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至各以赴弔逺近為差等所以通意叙事周典四方諸侯各自以其方㑹盟虞書肆覲東后地如岱禮皆不施于異方逺盟故諸侯必以五月為㫁夫哀死送終臣子之所盡禮是以未及期而𦵏謂之不懐過期而不𦵏謂之緩慢以示譏也春秋從實而書以示是非衛桓公十四月而𦵏𫝊稱亂是以緩不以責衛臣子之辭也周室雖亂桓王七年乃𦵏亦由怠慢故𫝊稱緩以示譏召伯來㑹𦵏𫝊謂之得禮宰咺歸賵但譏其緩此天子使接諸侯之禮先王之制諸侯之喪士弔大夫送𦵏及其失也禮過于重文襄之伯因而抑之諸侯之喪大夫弔卿共𦵏事夫人之喪士弔大夫送𦵏猶過古制故公子遂如晉𦵏晉襄公𫝊不言禮𦵏秦景公傳曰大夫如秦𦵏景公特稱禮也一以示古制二以示書他國之𦵏必須魯㑹三以示奉使非卿則不得書于經此皆邱明之微文也萬國之數至衆封疆之守至重故天子之喪諸侯不得越境而奔修服于其國卿供弔送之禮案弔送隠元年正義引釋例作弔喪訖𦵏卒哭而除喪案文九年正義引釋例此句作既𦵏卒哭而除凶文八年襄王崩魯侯無故而穆伯如周弔叔孫得臣㑹𦵏此天子崩諸侯遣卿供弔𦵏之經傳𦵏贈之幣案𦵏贈隠元年正義引釋例作喪贈車馬曰賵貨財曰􅉠衣服曰襚珠玉曰含然而總謂之贈故傳曰贈死不及尸秦之于魯本非方嶽同盟魯薨不赴秦秦不賵魯自是其常也僖穆二公雖有同盟之義二君已卒則二子亦非得用同盟之禮也案亦非二字文九年正義引釋例作不字今秦康公逺慕諸華欲通敬于魯無以為辭因狄泉有盟追贈僖公並及成風假弔禮而行故曰禮也送死不及尸故謂不當其事書者書之于策垂之子孫以示過厚之好也魯君薨𦵏多不順制唯成公薨于路寢五月而𦵏國家安靜世嫡承嗣故傳見莊之緩舉成書順以包之也諸侯之𦵏書經者甚多至于𦵏蔡靈公𫝊獨云得禮以明存亡繼絶滅絶雖乆義不得廢也送終之式必有定期以雨後期既非怠慢禮成于備故𫝊稱禮以明之毛伯求金亦但稱非禮武氏子來但言未𦵏所以示人君既𦵏訖乃得行成君之制宜非仲尼所改之例故𫝊禮以居之因成文以示義也凡崩薨卒者見經一百五十不書𦵏者四十八或魯慢而不往或亂而不𦵏或諱而見隠或喪而不成直言時事之詳畧無較例也呉楚之𦵏僭而不典故絶而不書以懲求名之偽也周禮太史氏掌喪事考其徳行而賜之諡及周之衰天子不能帥禮則臣子亦自奉諡皆因𦵏而成其禮故𦵏乃稱諡自卒而外赴者皆正爵而稱名慎始考終不敢違大典也書𦵏者皆從主人私稱客主之敬各有夲末謙敬各得其所而後二國之禮制成也賈頴云君弑不書𦵏賊不討也案蔡世子般弑其君國人不討而書𦵏宋長萬弑君國人醢之而不書𦵏此違經𫝊者也薨𦵏蔡桓侯獨不稱公劉賈許曰桓卒而季歸無臣子之辭也蔡侯無子以弟承位羣臣無廢主社稷不乏祀故𫝊稱蔡人嘉之非所貶也把伯稱子𫝊為三發蔡侯有貶𫝊亦宜説史書謬誤疑在闕文也凡公所出朝聘奔喪𦵏皆止書如不言其事此春秋之常宣十年公如齊劉賈許曰不書奔喪諱過也于聘例既不宜獨生此義又諱過之意欲依成十年公如晉所諱在于不書晉侯𦵏亦復不同也大夫卒例第六案此篇見永樂大典惟篇目佚今從本書第十四篇崩薨卒例補隠元年冬十有二月云云公子益師卒傳曰衆父卒公不與小歛故不書日五年冬十有二月辛巳公子彄卒傳曰冬十有二月辛巳臧僖伯卒公曰叔父有憾于寡人寡人弗敢忘𦵏之加一等文十四年秋云云九月甲申公孫敖卒于齊傳曰穆伯請重賂以求復惠叔以為請許之將來九月卒于齊告喪請𦵏不許十五年夏云云齊人歸公孫敖之喪傳曰齊人或為孟氏謀曰魯爾親也飾棺寘諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立于朝以待命許之取而殯之齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也𦵏視共仲宣八年夏六月公子遂如齊至黄乃復辛巳有事于太廟仲遂卒于垂王午猶繹萬入去籥傳曰有事于太廟襄仲卒而繹非禮也襄五年冬云云十有二月云云辛未季孫行父卒傳曰季文子卒大夫入歛公在位宰尤家噐為葬備昭十五年春云云二月癸酉有事于武宮籥入叔弓卒去樂卒事傳曰禘叔弓涖事籥入而卒去樂卒事禮也定五年夏云云六月丙申季孫意如卒傳曰季平子行東野還未至丙申卒于房右大夫卒三十一錯綜其七以包通之釋例曰君之卿佐是謂股肱股肱或虧何痛如之疾則親問焉死則親其小歛大歛案隠元年傳正義引釋例死作喪其與作慎終歸厚之義也故仲尼修春秋卿佐之喪公不與小歛大歛則不書日示薄厚戒將來也案永大典奥也字作之心二字從隠元年正義所引釋例改正即親新死小歛為文案親字隠元年正義引釋例作以則但臨大歛及不臨其喪亦同不書日也公子彄季文子經皆書日𫝊又因事以見恩厚此皆丘明所以申尋二例互相起發之意也公孫敖縱情棄命既已絶位非大夫也而備書于經者惠叔毁請于朝感子以赦父敦公族之恩崇仁孝之教故傳曰為孟氏且國故也仲遂叔弓皆遇祭事而卒得失之義存于所書之辭各如其事故𫝊得直言舉禮以正之也𫝊稱朝聘而終以尸將事又有朝聘而已遭喪之禮今仲遂至黄而復道死于垂明不以尸將事也垂實齊地故書之魯大夫卒其境内則不書地𫝊稱季平子行東野卒于房是也其或公疾在外大夫不卒于國案不字永樂大典脱從隠元年正義所引釋例増而猶存其日者君子不責人以所不得備非不欲臨也案備字以下六字永樂大典無之從隠元年正義所引釋例増入其生見經𫝊死而不書卒者皆不得以卿禮終也凡日月者所以紀逺近明先後蓋記事之常録各隨事而存其日月不有闕也國史集而書于策則簡其精麤合其同異率意以約文案春秋朝聘侵伐執殺大夫土功之屬或時或月皆不書日要盟戰敗崩薨卒𦵏之屬亦不皆同然已頗多書日自文公已上書日者二百四十九宣公已下亦俱六公書日者四百三十二計年數略同而日數加倍此則久逺遺落不與近同也承他國之告既有詳略且魯國故典亦又參差去其日月則或害事之先後備其日月則古史有所不載故春秋皆不以日月為例唯卿佐之喪獨託日以見例者事之得失既未足襃貶人君然亦非死者之罪無辭可以寄文而人臣輕賤死日可略故特假日以見義日食傳曰不書朔與日官失之也甲乙者厯之紀也晦朔者日月之㑹也日食不可以不存晦朔晦朔須甲乙而可推故日食必以書朔日為例于大夫之卒唯以不存甲乙為義丘明之𫝊月無徴文日之為例者二事而已其餘詳略皆無義例也而諸儒溺于公羊穀梁之説横為左氏造日月襃貶之例經傳久逺本有其異義者猶尚難通况以他書驅合左氏引二條之例以施諸日無例之月妄以生義此所以乖誤而謬戾也僖三十三年冬十二月公至自齊乙巳公薨于小寢隕霜不殺草李梅實晉人陳人鄭人伐許凡四事皆當共繫十二月賈氏唯以二事繫月云月者為公薨不憂隕霜李梅實也然則假設不憂即不得書月不得書月則無縁知霜不殺草之月又告至伐許在何月為可去此亂註記詭惑後世也温之㑹有日而無月賈氏云欲上月則嫌異㑹欲下月則嫌異月故但書日即如賈氏例本自可書月而懸屬下事奚獨于有日而無月者十四處未聞所解説此一事而復自違邾文公卒公使弔焉不敬因云弔有闕故不書日把伯益姑卒經亦不書日而傳曰弔如同盟禮也復不申解公孫敖出奔賈氏曰日者以罪廢命大討也公子慶父弑君出奔應在大討而經不書日何以又不説盟之見經百有三事其五十三不書日五十書日賈氏許氏曰盟載詳者日月備易者日月略詳易之别殊無其證清邱之盟恤病討貳也湨梁之盟同討不庭辭無詳易而湨梁書日清邱不書日此比甚多皆散他例略因此論舉數事焉先世通儒而乖妄若此者由于左氏與公羊穀梁闕闕者謂左氏不傳春秋世無盟主聽㫁可惑假取二傳以救當時之事然亦後進君子所當悟思也春秋釋例卷一
